<script>
const SLIDES=[
{type:"title",bg:"navy",
html:`<div class="eyebrow">TOGAF Foundation · Day 17 of 20</div><h1 class="title-h">Stakeholder Management &amp; Views</h1><div class="title-rule"></div><p class="title-sub">How architects identify, understand, and communicate with stakeholders — through concerns, viewpoints, views, and a structured Communications Plan.</p><div class="title-tags"><span class="title-tag">📊 5 topics</span><span class="title-tag">🎙 Narrated</span><span class="title-tag">⭐ Week 5 · Day 1</span></div>`,
voice:`Welcome to Day 17 — Monday of Week 5. Today is Stakeholder Management and Views. Architecture only succeeds if stakeholders understand and support it. TOGAF provides a structured approach: map stakeholders, understand their concerns, build viewpoints to address those concerns, create views to communicate the architecture, and plan your engagement across the ADM. Let's go.`},

{type:"section",bg:"coral",
html:`<div class="sec-num">01</div><div class="sec-lbl">Section One</div><h2 class="sec-h">Stakeholder Map &amp; Analysis Technique</h2><p class="sec-desc">Identifying who your stakeholders are and how to prioritise engagement with them.</p>`,
voice:`Section one: the stakeholder map and analysis technique. Before you can communicate architecture effectively, you need to know who you're communicating with.`},

{type:"content",
html:`<div class="clbl">The stakeholder map</div><h2 class="ch">Interest × Influence Matrix</h2>
<div class="box coral"><div class="box-lbl">The technique</div><p>TOGAF uses an <strong>Interest × Influence matrix</strong> to classify stakeholders into four quadrants. This determines the communication strategy for each stakeholder group — how much effort to invest and what form engagement should take.</p></div>
<div class="matrix">
  <div class="quad" style="background:var(--purple2);border-color:rgba(167,139,250,.2)"><div class="quad-lbl" style="color:var(--purple)">High Interest, High Influence</div><div class="quad-body">Key players — manage closely. These stakeholders can make or break the architecture. Regular, detailed engagement. Example: CIO, Chief Architect, key business sponsors.</div></div>
  <div class="quad" style="background:var(--blue2);border-color:rgba(96,165,250,.2)"><div class="quad-lbl" style="color:var(--blue)">Low Interest, High Influence</div><div class="quad-body">Keep satisfied — they have power but may not engage deeply unless dissatisfied. Periodic updates, clear executive summaries. Example: CFO, Board members.</div></div>
  <div class="quad" style="background:var(--amber2);border-color:rgba(251,191,36,.2)"><div class="quad-lbl" style="color:var(--amber)">High Interest, Low Influence</div><div class="quad-body">Keep informed — they care deeply but can't override decisions. Regular communication prevents resistance. Example: end users, IT operations staff.</div></div>
  <div class="quad" style="background:var(--navy3);border-color:rgba(255,255,255,.05)"><div class="quad-lbl" style="color:var(--slate)">Low Interest, Low Influence</div><div class="quad-body">Monitor — minimal engagement needed. Light-touch communication. Example: peripheral business units unaffected by the change.</div></div>
</div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t">The stakeholder map is a <strong>Phase A activity</strong> — done at the start of the Architecture Vision to understand who needs to be engaged and how. The quadrant determines engagement strategy, not just communication frequency.</div></div>`,
voice:`The stakeholder analysis technique uses an Interest by Influence matrix with four quadrants. High interest and high influence stakeholders are key players — manage them closely with regular, detailed engagement. These are the CIO, Chief Architect, and key business sponsors — they can make or break the architecture. Low interest but high influence stakeholders need to be kept satisfied — they have power but may not engage deeply unless they become dissatisfied. Periodic updates and executive summaries work here — CFO, Board members. High interest but low influence stakeholders need to be kept informed — they care deeply but can't override decisions. Regular communication prevents resistance building up. End users and IT operations staff typically fall here. Low interest and low influence stakeholders just need to be monitored — minimal engagement, light-touch communication. The stakeholder map is created in Phase A as a core activity of the Architecture Vision.`},

{type:"section",bg:"purple",
html:`<div class="sec-num">02</div><div class="sec-lbl">Section Two</div><h2 class="sec-h">Architecture Concerns &amp; Viewpoints</h2><p class="sec-desc">The chain from stakeholder concerns to viewpoints — how architects respond to what stakeholders care about.</p>`,
voice:`Section two: architecture concerns and viewpoints. This is the intellectual chain that turns stakeholder needs into architectural communication tools.`},

{type:"content",
html:`<div class="clbl">The concern-viewpoint chain</div><h2 class="ch">From Concern to Viewpoint</h2>
<div class="chain-row">
  <div class="chain-box"><div class="chain-term" style="color:var(--coral)">Stakeholder</div><div class="chain-desc">A person or group with an interest in the architecture outcome</div></div>
  <div class="chain-arrow">→</div>
  <div class="chain-box"><div class="chain-term" style="color:var(--amber)">Concern</div><div class="chain-desc">What the stakeholder cares about — their specific interest, worry, or question about the architecture</div></div>
</div>
<div class="chain-row">
  <div class="chain-box"><div class="chain-term" style="color:var(--amber)">Concern</div><div class="chain-desc">e.g. "Will this system be available 99.9% of the time?"</div></div>
  <div class="chain-arrow">→</div>
  <div class="chain-box"><div class="chain-term" style="color:var(--purple)">Viewpoint</div><div class="chain-desc">A template that specifies how to address this concern in an architecture description</div></div>
</div>
<div class="chain-row">
  <div class="chain-box"><div class="chain-term" style="color:var(--purple)">Viewpoint</div><div class="chain-desc">Availability Viewpoint: shows redundancy, failover, and service level architecture</div></div>
  <div class="chain-arrow">→</div>
  <div class="chain-box"><div class="chain-term" style="color:var(--blue)">View</div><div class="chain-desc">The actual diagram or document produced using the viewpoint template</div></div>
</div>
<div class="box teal"><div class="box-lbl">Key insight</div><p>A <strong>Viewpoint is the template</strong> — it defines what questions to answer, what notation to use, and what stakeholders it addresses. A <strong>View is the content</strong> — the specific diagram or document produced by applying the viewpoint to this particular architecture.</p></div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t"><strong>Concern → Viewpoint → View</strong>. Viewpoint = template (reusable). View = content (specific to this architecture). One viewpoint can produce many views across different architectures.</div></div>`,
voice:`The intellectual chain for architecture communication runs from stakeholder to concern to viewpoint to view. A stakeholder is a person or group with an interest in the architecture outcome. Their concern is what they specifically care about — their worry or question about the architecture. For example: will this system be available 99.9% of the time? A viewpoint is the template that specifies how to address that concern in an architecture description — the Availability Viewpoint shows redundancy, failover, and service level architecture. And the view is the actual diagram or document produced by applying the viewpoint to this specific architecture. The key distinction: a viewpoint is a reusable template. A view is the specific content produced. One viewpoint — say the Security Viewpoint — can produce many different views across different architectures. The exam summary: concern generates a viewpoint, viewpoint is a template, view is the output.`},

{type:"section",bg:"blue",
html:`<div class="sec-num">03</div><div class="sec-lbl">Section Three</div><h2 class="sec-h">Architecture Views vs Viewpoints</h2><p class="sec-desc">The precise TOGAF distinction — tested directly on the Foundation exam.</p>`,
voice:`Section three: views versus viewpoints. This distinction is tested directly on the TOGAF Foundation exam — let's nail it.`},

{type:"content",
html:`<div class="clbl">The precise distinction</div><h2 class="ch">View vs Viewpoint — Nailed</h2>
<div class="vvp-row">
  <div class="vvp-box vp"><div class="vvp-lbl">Viewpoint</div><div class="vvp-body">A <strong>specification</strong> of the conventions for constructing and using a view. Answers: who is this for, what concerns does it address, what notation is used, what model types are included, and what questions does it answer? A viewpoint is <strong>reusable</strong> — defined once, applied many times across different architecture projects.</div></div>
  <div class="vvp-box vw"><div class="vvp-lbl">View</div><div class="vvp-body">A <strong>representation</strong> of the architecture from the perspective defined by the viewpoint. Contains the actual content — diagrams, tables, text — that shows this architecture's answer to the concerns of those stakeholders. A view is <strong>specific</strong> to this particular architecture.</div></div>
</div>
<div class="blist">
  <div class="bi"><div class="bd"></div><div class="bt"><strong>Analogy:</strong> A viewpoint is like a form template. A view is a completed, filled-in instance of that form.</div></div>
  <div class="bi"><div class="bd"></div><div class="bt">Multiple viewpoints can apply to the <em>same stakeholder</em> — they have multiple concerns.</div></div>
  <div class="bi"><div class="bd"></div><div class="bt">Multiple stakeholders can use the <em>same viewpoint</em> — they share the same concern.</div></div>
  <div class="bi"><div class="bd"></div><div class="bt">TOGAF encourages building a <strong>library of viewpoints</strong> — standard viewpoints reused across architecture engagements.</div></div>
</div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t"><strong>Viewpoint = template (reusable). View = the actual content (specific to this architecture).</strong> If the exam says "a representation of the architecture from the perspective of…" — that's a <strong>View</strong>. If it says "a specification for constructing a view" — that's a <strong>Viewpoint</strong>.</div></div>`,
voice:`The view versus viewpoint distinction is one of the most commonly tested in the TOGAF Foundation exam. A viewpoint is a specification — a template defining the conventions for constructing a view. It answers: who is this for, what concerns does it address, what notation is used, what questions does it answer? A viewpoint is reusable — defined once, applied many times. A view is a representation — the actual content, the diagrams, tables, and text that show this particular architecture's answer to those stakeholder concerns. A view is specific to this architecture. The analogy: a viewpoint is a form template. A view is a completed, filled-in instance. Multiple viewpoints can apply to the same stakeholder — they have multiple concerns. Multiple stakeholders can use the same viewpoint — they share a concern. Exam shortcut: if the description says "representation of the architecture" — that's a View. If it says "specification for constructing a view" — that's a Viewpoint.`},

{type:"section",bg:"teal",
html:`<div class="sec-num">04</div><div class="sec-lbl">Section Four</div><h2 class="sec-h">The Communications Plan</h2><p class="sec-desc">How architects plan, schedule, and execute stakeholder engagement across the ADM.</p>`,
voice:`Section four: the Communications Plan. Having the right views is only useful if they reach the right people at the right time.`},

{type:"content",
html:`<div class="clbl">Planning engagement</div><h2 class="ch">The Communications Plan</h2>
<div class="box teal"><div class="box-lbl">What it is</div><p>The <strong>Communications Plan</strong> is a Phase A output that defines how architecture information will be communicated to stakeholders throughout the ADM cycle. It is a formal plan — not an ad hoc arrangement.</p></div>
<div class="comms-row"><div class="comms-icon">👥</div><div class="comms-text"><strong>Who</strong> — which stakeholder groups will receive which communications</div></div>
<div class="comms-row"><div class="comms-icon">📄</div><div class="comms-text"><strong>What</strong> — what architecture content will be communicated: views, summaries, full architecture documents, status reports</div></div>
<div class="comms-row"><div class="comms-icon">📅</div><div class="comms-text"><strong>When</strong> — the schedule for communications: ADM phase milestones, regular updates, ad hoc briefings</div></div>
<div class="comms-row"><div class="comms-icon">📬</div><div class="comms-text"><strong>How</strong> — the format and channel: formal presentations, written reports, workshops, dashboards, email briefings</div></div>
<div class="comms-row"><div class="comms-icon">👤</div><div class="comms-text"><strong>Who owns it</strong> — the specific architect or team responsible for each communication activity</div></div>
<div class="comms-row"><div class="comms-icon">↩️</div><div class="comms-text"><strong>Feedback mechanism</strong> — how stakeholder responses, concerns, and objections will be captured and fed back into the ADM</div></div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t">The Communications Plan is a <strong>Phase A output</strong>. It covers: who, what, when, how, ownership, and feedback. It is <strong>updated throughout the ADM</strong> as stakeholders and their concerns evolve.</div></div>`,
voice:`The Communications Plan is a Phase A output — it's produced at the start of the architecture engagement and updated throughout the ADM. It defines six things. Who: which stakeholder groups receive which communications. What: which architecture content — views, summaries, full documents, status reports. When: the schedule for communications — ADM phase milestones, regular updates, ad hoc briefings. How: the format and channel — formal presentations, written reports, workshops, dashboards. Who owns it: the specific architect or team responsible for each activity. And the feedback mechanism: how stakeholder responses and concerns are captured and fed back into the ADM. This is a formal plan, not an ad hoc arrangement. It's created in Phase A and kept alive throughout the cycle.`},

{type:"section",bg:"green",
html:`<div class="sec-num">05</div><div class="sec-lbl">Section Five</div><h2 class="sec-h">Stakeholder Engagement Across ADM Phases</h2><p class="sec-desc">How stakeholder engagement evolves through the ADM cycle — from identification to delivery.</p>`,
voice:`Section five: stakeholder engagement across ADM phases. Engagement isn't just a Phase A activity — it continues throughout the entire cycle.`},

{type:"content",
html:`<div class="clbl">Engagement through the ADM</div><h2 class="ch">Stakeholders in Every Phase</h2>
<div class="box green"><div class="box-lbl">Phase A — Architecture Vision</div><p>Stakeholder identification, interest-influence mapping, concerns captured, Communications Plan created. Stakeholders sign off on the Statement of Architecture Work, which formally authorises the architecture engagement.</p></div>
<div class="blist">
  <div class="bi"><div class="bd" style="background:var(--blue)"></div><div class="bt"><strong>Phases B, C, D (BDAT):</strong> Stakeholder reviews at key checkpoints. Domain-specific views presented. Stakeholder concerns about specific domain choices are resolved and documented.</div></div>
  <div class="bi"><div class="bd" style="background:var(--purple)"></div><div class="bt"><strong>Phase E (Opportunities):</strong> Stakeholders review and prioritise work packages. Business stakeholders weigh in on transition architecture sequencing — their priorities shape the roadmap.</div></div>
  <div class="bi"><div class="bd" style="background:var(--amber)"></div><div class="bt"><strong>Phase F (Migration):</strong> Implementation and Migration Plan presented for stakeholder sign-off. Business stakeholders confirm they can accommodate the transition schedule.</div></div>
  <div class="bi"><div class="bd" style="background:var(--teal)"></div><div class="bt"><strong>Phase G (Governance):</strong> Stakeholders are informed of compliance review outcomes. Business sponsors confirm that deviations (dispensations) are acceptable from their perspective.</div></div>
  <div class="bi"><div class="bd" style="background:var(--green)"></div><div class="bt"><strong>Phase H (Change):</strong> Change drivers from stakeholders are a key input. Stakeholders present new requirements that trigger change requests.</div></div>
</div>
<div class="sg">
  <div class="sc"><div class="sn">01</div><div class="st"><strong>4-quadrant map</strong> — Interest × Influence determines engagement strategy.</div></div>
  <div class="sc"><div class="sn">02</div><div class="st"><strong>Concern → Viewpoint → View</strong> — the communication chain.</div></div>
  <div class="sc"><div class="sn">03</div><div class="st"><strong>View = content. Viewpoint = template.</strong> Viewpoints are reusable.</div></div>
  <div class="sc"><div class="sn">04</div><div class="st"><strong>Comms Plan</strong> — Phase A output. Who, what, when, how, owner, feedback.</div></div>
</div>`,
voice:`Stakeholder engagement runs through every ADM phase. In Phase A it starts with identification and mapping, concerns are captured, and the Communications Plan is created. Stakeholders sign off on the Statement of Architecture Work. In Phases B, C, and D stakeholder reviews happen at key checkpoints — domain-specific views are presented and concerns about specific architectural choices are resolved. In Phase E stakeholders review and prioritise work packages — their priorities shape the transition roadmap. In Phase F they sign off on the Migration Plan and confirm they can accommodate the transition schedule. In Phase G they're informed of compliance review outcomes and business sponsors confirm dispensations are acceptable. In Phase H change drivers from stakeholders are a key input — they present new requirements that trigger change requests. The session summary: four-quadrant Interest by Influence map determines engagement strategy. Concern generates a viewpoint, viewpoint is a template, view is the content. Views are specific, viewpoints are reusable. And the Communications Plan is the Phase A output that structures all of this.`},

{type:"title",bg:"end",
html:`<div class="eyebrow">Day 17 Complete</div><h1 class="title-h" style="font-size:clamp(22px,5.5vw,38px)">Stakeholder &amp; Views — done.</h1><div class="title-rule"></div><p class="title-sub" style="margin-bottom:24px">Next: <strong>Day 18 — Reference Models: TRM &amp; III-RM</strong>. TOGAF's two Foundation Architecture reference models — the Technical Reference Model and the Integrated Information Infrastructure Reference Model.</p>
<div style="display:flex;flex-direction:column;gap:10px;max-width:320px">
  <a href="togaf-day17.html" style="display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--teal3);border:1px solid rgba(45,212,191,.25);border-radius:10px;text-decoration:none;color:var(--teal);font-size:14px;font-weight:500"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h10"/></svg>Open reading version · Take the quiz</a>

</div>`,
voice:`Day 17 complete. Stakeholder management isn't a soft skill added on top of architecture — it's built into the TOGAF framework through the stakeholder map, the concern-viewpoint-view chain, and the Communications Plan. Every architectural deliverable exists to address a stakeholder concern. Take the quiz. Day 18 covers the Reference Models — TRM and III-RM — which are TOGAF's two Foundation Architecture models. See you there.`},

const BG={navy:"var(--navy2)",coral:"linear-gradient(135deg,#1A0A0E,#2A0D15)",purple:"linear-gradient(135deg,#120E2A,#1A1235)",blue:"linear-gradient(135deg,#0A1525,#0D1F3A)",teal:"linear-gradient(135deg,#0A1F2F,#0D2A3A)",green:"linear-gradient(135deg,#0A1A10,#0D2218)",end:"linear-gradient(135deg,#080E1A,#0D1526 60%,#152035)"};
let cur=0,play=false,spdIdx=1,utt=null,tx=0,anim=false;
const SPDS=[0.8,1,1.2,1.5];
const wrap=document.getElementById("slides-wrap");
document.getElementById("stotal").textContent=SLIDES.length;
SLIDES.forEach((s,i)=>{const d=document.createElement("div");d.className="slide slide-"+(s.type||"content");d.id="sl"+i;d.style.background=BG[s.bg]||BG.navy;d.innerHTML=`<div class="slide-body">${s.html}</div>`;if(i===0)d.classList.add("active");wrap.appendChild(d);});
function goTo(i,dir){if(anim||i<0||i>=SLIDES.length)return;anim=true;stopSp();const f=document.getElementById("sl"+cur),t=document.getElementById("sl"+i);f.classList.remove("active");t.classList.add("active");f.classList.add(dir>0?"exit-left":"exit-right");t.classList.add(dir>0?"enter-right":"enter-left");t.querySelector(".slide-body").scrollTop=0;setTimeout(()=>{f.classList.remove("exit-left","exit-right","active");t.classList.remove("enter-right","enter-left");anim=false;cur=i;upUI();if(play)spk();},420);}
function nextSlide(){if(cur<SLIDES.length-1)goTo(cur+1,1);}function prevSlide(){if(cur>0)goTo(cur-1,-1);}
function upUI(){document.getElementById("snum").textContent=cur+1;document.getElementById("progress-fill").style.width=((cur+1)/SLIDES.length*100)+"%";document.getElementById("btn-prev").disabled=cur===0;document.getElementById("btn-next").disabled=cur===SLIDES.length-1;}
function spk(){stopSp();if(!("speechSynthesis"in window))return;const txt=SLIDES[cur].voice;if(!txt){if(play)setTimeout(nextSlide,800);return;}utt=new SpeechSynthesisUtterance(txt);utt.rate=SPDS[spdIdx];utt.lang="en-GB";const vs=speechSynthesis.getVoices();const p=vs.find(v=>v.lang.startsWith("en")&&(v.name.includes("Daniel")||v.name.includes("Samantha")||v.name.includes("Google UK")))||vs.find(v=>v.lang.startsWith("en"))||vs[0];if(p)utt.voice=p;utt.onstart=()=>setSt("speaking");utt.onend=()=>{setSt("");if(play&&cur<SLIDES.length-1)setTimeout(nextSlide,600);else{play=false;upPlay();}};utt.onerror=()=>setSt("");speechSynthesis.speak(utt);}
function stopSp(){if("speechSynthesis"in window)speechSynthesis.cancel();utt=null;setSt("");}
function togglePlay(){play=!play;upPlay();if(play)spk();else stopSp();}
function upPlay(){document.getElementById("play-icon").innerHTML=play?'<rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor"/><rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M4 3l11 6-11 6V3z"/>';}
function setSt(s){const el=document.getElementById("vs");el.innerHTML=s==="speaking"?`<div class="vd"><div class="vdot"></div><div class="vdot"></div><div class="vdot"></div></div><span>Narrating…</span>`:(s||"");}
function cycleSpeed(){spdIdx=(spdIdx+1)%SPDS.length;document.getElementById("spdbtn").textContent=SPDS[spdIdx]+"×";if(play){stopSp();setTimeout(spk,100);}}
function markDone(){try{const d=JSON.parse(localStorage.getItem("togaf_done")||"{}");d[17]=true;localStorage.setItem("togaf_done",JSON.stringify(d));}catch(e){}const b=document.getElementById("btn-done");b.style.background="var(--teal3)";b.style.borderColor="var(--teal)";b.querySelector("svg").style.stroke="var(--teal)";goTo(SLIDES.length-1,1);}
document.getElementById("start-btn").addEventListener("click",()=>{document.getElementById("start-overlay").style.display="none";document.getElementById("deck").style.display="flex";upUI();if("speechSynthesis"in window){const p=new SpeechSynthesisUtterance(" ");p.volume=0;speechSynthesis.speak(p);setTimeout(()=>{play=true;upPlay();spk();},400);}});
wrap.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown")nextSlide();if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevSlide();if(e.key===" "){e.preventDefault();togglePlay();}});
</script>
</body>
