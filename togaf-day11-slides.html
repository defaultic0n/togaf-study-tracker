<script>
const SLIDES=[
{type:"title",bg:"navy",
html:`<div class="title-eyebrow">TOGAF Foundation · Day 11 of 20</div><h1 class="title-h">ADM Requirements Management</h1><div class="title-rule"></div><p class="title-sub">The only phase that runs continuously throughout the entire ADM cycle — managing requirements so they never get lost and always drive architecture decisions.</p><div class="title-tags"><span class="title-tag">📊 5 topics</span><span class="title-tag">🎙 Narrated</span><span class="title-tag">⭐ Week 3</span></div>`,
voice:`Welcome to Day 11 — Wednesday of Week 3. Today is ADM Requirements Management — the one phase in the ADM cycle that never stops. While every other phase has a clear start and end, Requirements Management runs in parallel with all of them from Preliminary through Phase H. We'll cover why it's continuous, how requirements impact each ADM phase, what the Architecture Requirements Specification contains, how requirements are stored, and how requirements trigger change control. Let's go.`},

{type:"section",bg:"blue",
html:`<div class="section-num">01</div><div class="section-label">Section One</div><h2 class="section-h">Requirements Management — A Continuous Phase</h2><p class="section-desc">Why this phase never stops — and what that means for the entire ADM cycle.</p>`,
voice:`Section one: Requirements Management as a continuous phase. This is the most structurally unusual feature of the ADM.`},

{type:"content",
html:`<div class="content-label">Always running</div><h2 class="content-h">The Phase That Never Stops</h2>
<div class="callout teal"><div class="callout-label">Definition</div><p>Requirements Management is the <strong>continuous ADM phase</strong> that manages the identification, storage, and feeding of requirements into and out of all other ADM phases. It runs from the Preliminary Phase through Phase H — never stopping.</p></div>
<div class="bullet-list">
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>All other phases</strong> have a defined start, middle, and end</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Requirements Management</strong> runs alongside every phase simultaneously</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text">Requirements <em>feed into</em> phases: each phase receives requirements it must satisfy</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text">Requirements <em>emerge from</em> phases: each phase may identify new requirements or change existing ones</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text">The repository of requirements is <strong>always live</strong> — it changes as the ADM progresses</div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>Exam tip:</strong> Requirements Management is the <strong>only continuous phase</strong> in the ADM. If asked "which phase runs throughout the entire ADM cycle?" — always answer Requirements Management.</div></div>`,
voice:`Requirements Management is the only continuous phase in the ADM. Every other phase — Preliminary, A through H — has a defined start and end. Requirements Management runs alongside all of them simultaneously. It works in two directions. Requirements feed into each phase: Phase A receives requirements about what the architecture must achieve. Phase B receives requirements about business capabilities. Phase C about data and applications. And so on. But requirements also emerge from phases: as each phase progresses, new requirements are discovered or existing ones change. The requirements repository is always live. For the exam: if asked which phase runs throughout the entire ADM cycle, always answer Requirements Management.`},

{type:"section",bg:"teal",
html:`<div class="section-num">02</div><div class="section-label">Section Two</div><h2 class="section-h">Requirements Impact on ADM Phases</h2><p class="section-desc">How requirements flow into and out of each ADM phase throughout the cycle.</p>`,
voice:`Section two: how requirements impact each ADM phase. The bidirectional flow of requirements is what makes this phase so important.`},

{type:"content",
html:`<div class="content-label">Phase by phase</div><h2 class="content-h">Requirements Flow Through the ADM</h2>
<div class="phase-grid">
  <div class="phase-card"><div class="phase-name">Phase A (Vision)</div><div class="phase-desc">Receives: business goals and constraints as requirements. Produces: refined requirements from stakeholder concerns.</div></div>
  <div class="phase-card"><div class="phase-name">Phase B (Business)</div><div class="phase-desc">Receives: business requirements for capabilities and processes. Produces: updated requirements as gaps are identified.</div></div>
  <div class="phase-card"><div class="phase-name">Phase C (IS)</div><div class="phase-desc">Receives: data and application requirements from Phase B. Produces: integration and data quality requirements.</div></div>
  <div class="phase-card"><div class="phase-name">Phase D (Technology)</div><div class="phase-desc">Receives: platform and infrastructure requirements. Produces: technology standards requirements.</div></div>
  <div class="phase-card"><div class="phase-name">Phase E (Opps)</div><div class="phase-desc">Receives: requirements for work package scope. Produces: implementation constraints as requirements.</div></div>
  <div class="phase-card"><div class="phase-name">Phase F (Migration)</div><div class="phase-desc">Receives: prioritisation criteria as requirements. Produces: scheduling and resource requirements.</div></div>
  <div class="phase-card"><div class="phase-name">Phase G (Gov)</div><div class="phase-desc">Receives: conformance requirements from Architecture Contracts. Produces: compliance gap requirements.</div></div>
  <div class="phase-card"><div class="phase-name">Phase H (Change)</div><div class="phase-desc">Receives: change drivers as new requirements. Produces: updated requirements from approved changes.</div></div>
</div>`,
voice:`Here's how requirements flow through every phase. Phase A receives business goals and constraints as requirements, and produces refined requirements from stakeholder concerns. Phase B receives business requirements for capabilities and processes, and produces updated requirements as gaps are identified. Phase C receives data and application requirements from Phase B, producing integration and data quality requirements. Phase D receives platform requirements, producing technology standards requirements. Phase E receives requirements for work package scope. Phase F receives prioritisation criteria. Phase G receives conformance requirements from Architecture Contracts. And Phase H receives change drivers as new requirements, producing updated requirements from approved changes. Every phase is in a constant dialogue with Requirements Management.`},

{type:"section",bg:"purple",
html:`<div class="section-num">03</div><div class="section-label">Section Three</div><h2 class="section-h">Architecture Requirements Specification</h2><p class="section-desc">The formal document that captures requirements and drives architectural decision-making.</p>`,
voice:`Section three: the Architecture Requirements Specification. This is the key formal output of Requirements Management.`},

{type:"content",
html:`<div class="content-label">The key document</div><h2 class="content-h">Architecture Requirements Specification</h2>
<div class="callout purple"><div class="callout-label">Definition</div><p>The <strong>Architecture Requirements Specification</strong> provides a set of quantitative statements about the business, technical, and architecture requirements that must be met. It is updated continuously as requirements evolve through the ADM.</p></div>
<div class="req-type-row"><span class="req-badge" style="background:var(--blue2);color:var(--blue)">Business</span><div class="req-desc">Business capability requirements, strategic goals, business constraints. Typically originate in Phase A and B.</div></div>
<div class="req-type-row"><span class="req-badge" style="background:var(--teal3);color:var(--teal)">Functional</span><div class="req-desc">What the solution must do — specific functionality, behaviours, and capabilities required of information systems.</div></div>
<div class="req-type-row"><span class="req-badge" style="background:var(--purple2);color:var(--purple)">Non-Functional</span><div class="req-desc">Quality attributes: performance, security, availability, scalability, usability. Often called quality-of-service requirements.</div></div>
<div class="req-type-row"><span class="req-badge" style="background:var(--amber2);color:var(--amber)">Technical</span><div class="req-desc">Technology standards compliance, integration requirements, infrastructure constraints. Typically from Phases C and D.</div></div>
<div class="req-type-row"><span class="req-badge" style="background:var(--green2);color:var(--green)">Architecture</span><div class="req-desc">Principles compliance, conformance requirements, architecture pattern adherence.</div></div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text">The Architecture Requirements Specification is <strong>continuously updated</strong> — not a one-time deliverable. It evolves as each ADM phase adds, changes, or removes requirements.</div></div>`,
voice:`The Architecture Requirements Specification is the key formal document produced by Requirements Management. It captures five types of requirements. Business requirements — capabilities, goals, and constraints originating in Phase A and B. Functional requirements — what the solution must do, specific behaviours and capabilities. Non-functional requirements — quality attributes like performance, security, availability, and scalability. Technical requirements — standards compliance, integration requirements, and infrastructure constraints from Phases C and D. And Architecture requirements — principles compliance and conformance requirements. Crucially, the Architecture Requirements Specification is continuously updated — it is not a one-time deliverable. Every phase can add, change, or remove requirements.`},

{type:"section",bg:"amber",
html:`<div class="section-num">04</div><div class="section-label">Section Four</div><h2 class="section-h">Storing and Managing Requirements</h2><p class="section-desc">How the Architecture Repository acts as the system of record for all requirements.</p>`,
voice:`Section four: storing and managing requirements. Requirements must be formally stored and traceable throughout the ADM.`},

{type:"content",
html:`<div class="content-label">The repository role</div><h2 class="content-h">Requirements in the Architecture Repository</h2>
<div class="callout amber"><div class="callout-label">Storage location</div><p>All requirements are stored in the <strong>Architecture Repository</strong> — the enterprise's single source of truth for all architecture-related information. Requirements are structured, version-controlled, and linked to the architecture elements they affect.</p></div>
<div class="bullet-list">
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Traceability</strong> — every requirement links to the business driver that created it and the architecture element that satisfies it</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Version control</strong> — requirements change; every version is retained so the evolution of requirements can be understood</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Status tracking</strong> — each requirement has a status: proposed, approved, implemented, deferred, or withdrawn</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Priority</strong> — requirements are prioritised (mandatory, high, medium, low) to guide decision-making when trade-offs are needed</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Impact assessment</strong> — changes to requirements are assessed for impact on the architecture before being approved</div></div>
</div>
<div class="callout green"><div class="callout-label">Requirements and the Architecture Landscape</div><p>Requirements link not just to current architecture elements but to the <strong>Architecture Landscape</strong> — the baseline, transition, and target architectures. A requirement may be satisfiable in the baseline, or only after a transition architecture, or only in the target. This phasing is captured in requirements management.</p></div>`,
voice:`Requirements are stored in the Architecture Repository — the enterprise's single source of truth for all architecture information. Five things matter for requirements storage. Traceability: every requirement links to the business driver that created it and the architecture element that satisfies it. Version control: requirements change over time, so every version is retained. Status tracking: each requirement has a status — proposed, approved, implemented, deferred, or withdrawn. Priority: requirements are prioritised as mandatory, high, medium, or low to guide trade-off decisions. And impact assessment: changes to requirements are assessed for their impact on the architecture before being approved. Requirements also link to the Architecture Landscape — a requirement might be satisfied in the baseline, or only after a transition architecture, or only in the final target.`},

{type:"section",bg:"coral",
html:`<div class="section-num">05</div><div class="section-label">Section Five</div><h2 class="section-h">Requirements and Change Control</h2><p class="section-desc">How new and changed requirements trigger formal change control throughout the ADM.</p>`,
voice:`Section five: how requirements interact with change control. This is where Requirements Management connects back to Phase H.`},

{type:"content",
html:`<div class="content-label">Change triggers</div><h2 class="content-h">Requirements Driving Change</h2>
<div class="callout coral"><div class="callout-label">The change connection</div><p>New requirements or changes to existing requirements can arise at any point in the ADM — from external business changes, technology shifts, or regulatory changes. Each one must be formally assessed for its <strong>impact on the current architecture</strong> before being accepted.</p></div>
<div class="bullet-list">
  <div class="bullet"><div class="bullet-dot" style="background:var(--coral)"></div><div class="bullet-text"><strong>New requirement identified</strong> → assessed for impact → approved → fed to relevant ADM phase → architecture updated</div></div>
  <div class="bullet"><div class="bullet-dot" style="background:var(--amber)"></div><div class="bullet-text"><strong>Existing requirement changes</strong> → impact assessed → approved change → may trigger Phase H Architecture Change Management</div></div>
  <div class="bullet"><div class="bullet-dot" style="background:var(--teal)"></div><div class="bullet-text"><strong>Requirement conflicts</strong> → adjudicated by Architecture Board → resolution recorded in Governance Log</div></div>
</div>
<div class="callout blue"><div class="callout-label">Requirements vs change requests</div><p>A <strong>requirement</strong> describes what the architecture must achieve. A <strong>change request</strong> is a formal request to modify the approved architecture. When new requirements cannot be satisfied by the current approved architecture, they generate change requests that go through Phase H — Architecture Change Management.</p></div>
<div class="sum-grid">
  <div class="sum-card"><div class="sum-num">01</div><div class="sum-text"><strong>Only continuous phase</strong> — runs alongside every other ADM phase, never stops.</div></div>
  <div class="sum-card"><div class="sum-num">02</div><div class="sum-text"><strong>Bidirectional flow</strong> — requirements feed into phases and emerge from phases.</div></div>
  <div class="sum-card"><div class="sum-num">03</div><div class="sum-text"><strong>Architecture Requirements Specification</strong> — the living document capturing 5 requirement types.</div></div>
  <div class="sum-card"><div class="sum-num">04</div><div class="sum-text"><strong>Repository storage</strong> — traceable, versioned, prioritised, status-tracked.</div></div>
</div>`,
voice:`Requirements and change control interact continuously. A new requirement is identified, assessed for its impact on the architecture, approved, fed to the relevant ADM phase, and the architecture is updated accordingly. A change to an existing requirement follows the same path, but may trigger Phase H — Architecture Change Management — if the approved architecture needs to be formally modified. Requirement conflicts are adjudicated by the Architecture Board, with the resolution recorded in the Governance Log. The key distinction to remember: a requirement describes what the architecture must achieve. A change request is a formal request to modify the approved architecture. When new requirements cannot be satisfied by the current approved architecture, they escalate into change requests going through Phase H.`},

{type:"title",bg:"end",
html:`<div class="title-eyebrow">Day 11 Complete</div><h1 class="title-h" style="font-size:clamp(24px,6vw,40px)">Requirements Mgmt — done.</h1><div class="title-rule"></div><p class="title-sub" style="margin-bottom:24px">Next up: <strong>Day 12 — ADM Guidelines &amp; Techniques</strong>. The practical tools and approaches that help you apply the ADM effectively — iteration, risk management, security, and SOA.</p>
<div style="display:flex;flex-direction:column;gap:10px;max-width:320px">
  <a href="togaf-day11.html" style="display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--teal3);border:1px solid rgba(45,212,191,.25);border-radius:10px;text-decoration:none;color:var(--teal);font-size:14px;font-weight:500"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h10"/></svg>Open reading version · Take the quiz</a>
  <button onclick="markDone()" style="display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--teal);border:none;border-radius:10px;color:var(--navy);font-size:14px;font-weight:600;cursor:pointer;justify-content:center"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2.5 8.5l4 4 7-8"/></svg>Mark Day 11 as done</button>
</div>`,
voice:`Day 11 is complete. Requirements Management is the only continuous ADM phase — running in parallel with every other phase, feeding requirements in and capturing new requirements as they emerge. The Architecture Requirements Specification is the living document that captures business, functional, non-functional, technical, and architecture requirements. All stored in the Architecture Repository with full traceability and version control. And new or changed requirements that the current architecture can't satisfy generate change requests for Phase H. Take the quiz on the reading version. Day 12 covers ADM Guidelines and Techniques — the practical toolbox for applying the ADM effectively. See you there.`},
];

let cur=0,play=false,spdIdx=1,utt=null,tx=0,anim=false;
const SPDS=[0.8,1,1.2,1.5];
const wrap=document.getElementById("slides-wrap");
document.getElementById("slide-total").textContent=SLIDES.length;
function getBg(b){return{navy:"var(--navy2)",blue:"linear-gradient(135deg,#0A1525,#0D1F3A)",teal:"linear-gradient(135deg,#0A1F2F,#0D2A3A)",purple:"linear-gradient(135deg,#120E2A,#1A1235)",amber:"linear-gradient(135deg,#1A1000,#251800)",coral:"linear-gradient(135deg,#1A0A0E,#2A0D15)",end:"linear-gradient(135deg,#080E1A,#0D1526 60%,#152035)"}[b]||"var(--navy2)";}
SLIDES.forEach((s,i)=>{const d=document.createElement("div");d.className="slide slide-"+(s.type||"content");d.id="s"+i;d.style.background=getBg(s.bg);d.innerHTML=`<div class="slide-body">${s.html}</div>`;if(i===0)d.classList.add("active");wrap.appendChild(d);});
function goTo(i,dir){if(anim||i<0||i>=SLIDES.length)return;anim=true;stopSp();const f=document.getElementById("s"+cur),t=document.getElementById("s"+i);f.classList.remove("active");t.classList.add("active");f.classList.add(dir>0?"exit-left":"exit-right");t.classList.add(dir>0?"enter-right":"enter-left");t.querySelector(".slide-body").scrollTop=0;setTimeout(()=>{f.classList.remove("exit-left","exit-right","active");t.classList.remove("enter-right","enter-left");anim=false;cur=i;upUI();if(play)spk();},420);}
function nextSlide(){if(cur<SLIDES.length-1)goTo(cur+1,1);}
function prevSlide(){if(cur>0)goTo(cur-1,-1);}
function upUI(){document.getElementById("slide-num").textContent=cur+1;document.getElementById("progress-fill").style.width=((cur+1)/SLIDES.length*100)+"%";document.getElementById("btn-prev").disabled=cur===0;document.getElementById("btn-next").disabled=cur===SLIDES.length-1;}
function spk(){stopSp();if(!("speechSynthesis"in window))return;const txt=SLIDES[cur].voice;if(!txt){if(play)setTimeout(nextSlide,800);return;}utt=new SpeechSynthesisUtterance(txt);utt.rate=SPDS[spdIdx];utt.lang="en-GB";const vs=speechSynthesis.getVoices();const p=vs.find(v=>v.lang.startsWith("en")&&(v.name.includes("Daniel")||v.name.includes("Samantha")||v.name.includes("Karen")||v.name.includes("Google UK")))||vs.find(v=>v.lang.startsWith("en"))||vs[0];if(p)utt.voice=p;utt.onstart=()=>setSt("speaking");utt.onend=()=>{setSt("");if(play&&cur<SLIDES.length-1)setTimeout(nextSlide,600);else if(cur===SLIDES.length-1){play=false;upPlay();}};utt.onerror=()=>setSt("");speechSynthesis.speak(utt);}
function stopSp(){if("speechSynthesis"in window)speechSynthesis.cancel();utt=null;setSt("");}
function togglePlay(){play=!play;upPlay();if(play)spk();else stopSp();}
function upPlay(){document.getElementById("play-icon").innerHTML=play?'<rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor"/><rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M4 3l11 6-11 6V3z"/>';}
function setSt(s){const el=document.getElementById("voice-status");el.innerHTML=s==="speaking"?`<div class="voice-dots"><div class="voice-dot"></div><div class="voice-dot"></div><div class="voice-dot"></div></div><span>Narrating…</span>`:s||"";}
function cycleSpeed(){spdIdx=(spdIdx+1)%SPDS.length;document.getElementById("speed-btn").textContent=SPDS[spdIdx]+"×";if(play){stopSp();setTimeout(spk,100);}}
function markDone(){try{const d=JSON.parse(localStorage.getItem("togaf_done")||"{}");d[11]=true;localStorage.setItem("togaf_done",JSON.stringify(d));}catch(e){}const b=document.getElementById("btn-done");b.style.background="var(--teal3)";b.style.borderColor="var(--teal)";b.querySelector("svg").style.stroke="var(--teal)";goTo(SLIDES.length-1,1);}
document.getElementById("start-btn").addEventListener("click",()=>{document.getElementById("start-overlay").style.display="none";document.getElementById("deck").style.display="flex";upUI();if("speechSynthesis"in window){const p=new SpeechSynthesisUtterance(" ");p.volume=0;speechSynthesis.speak(p);setTimeout(()=>{play=true;upPlay();spk();},400);}});
wrap.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown")nextSlide();if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevSlide();if(e.key===" "){e.preventDefault();togglePlay();}});
if("speechSynthesis"in window)speechSynthesis.onvoiceschanged=()=>{};
</script>
