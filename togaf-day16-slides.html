<script>
const SLIDES=[
{type:"title",bg:"navy",
html:`<div class="eyebrow">TOGAF Foundation · Day 16 of 20</div><h1 class="title-h">Architecture Governance</h1><div class="title-rule"></div><p class="title-sub">The structures, authorities, contracts, and processes that keep architecture decisions binding — from board composition to compliance frameworks.</p><div class="title-tags"><span class="title-tag">📊 5 topics</span><span class="title-tag">🎙 Narrated</span><span class="title-tag">🏁 Week 4 finale</span></div>`,
voice:`Welcome to Day 16 — Thursday of Week 4, and the final session of Week 4. Today is Architecture Governance — the mechanisms that ensure architecture decisions actually stick. Understanding governance is essential for the exam because it ties together the Architecture Board, Architecture Contracts, the Compliance framework, and the distinction between IT governance and architecture governance. Let's close out Week 4.`},

{type:"section",bg:"blue",
html:`<div class="sec-num">01</div><div class="sec-lbl">Section One</div><h2 class="sec-h">Governance Definition &amp; Levels</h2><p class="sec-desc">What architecture governance is and the hierarchy of governance levels it operates within.</p>`,
voice:`Section one: governance definition and levels. Governance is one of those terms that means different things in different contexts — TOGAF is precise about it.`},

{type:"content",
html:`<div class="clbl">What governance means</div><h2 class="ch">Governance in TOGAF</h2>
<div class="box blue"><div class="box-lbl">Definition</div><p>Architecture Governance is the <strong>practice and orientation by which enterprise architectures and other architectures are managed and controlled</strong>. It ensures architectural decisions are made consistently, are formally recorded, and are enforced across the enterprise.</p></div>
<div class="gov-level"><div class="gov-name">Corporate Governance</div><div class="gov-desc">The highest level — board-level oversight of the entire organisation. Sets the strategic direction, risk appetite, and accountability structures within which all other governance operates.</div></div>
<div class="gov-level"><div class="gov-name">Technology Governance</div><div class="gov-desc">Governs how technology is acquired, deployed, and managed. Includes IT governance frameworks like COBIT. Ensures technology investments align with corporate strategy.</div></div>
<div class="gov-level"><div class="gov-name">IT Governance</div><div class="gov-desc">Operationalises technology governance — covering IT service management, project governance, vendor management, and security compliance across the IT function.</div></div>
<div class="gov-level"><div class="gov-name">Architecture Governance</div><div class="gov-desc">The most specific level for TOGAF — governing how architectural decisions are made, recorded, and enforced. Operates within and supports the three higher levels.</div></div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t">The hierarchy is: <strong>Corporate → Technology → IT → Architecture</strong>. Architecture governance is at the bottom — the most specific — but it supports and is accountable to all levels above it.</div></div>`,
voice:`TOGAF defines architecture governance as the practice and orientation by which enterprise architectures are managed and controlled. Governance in TOGAF operates within a four-level hierarchy. Corporate Governance at the top — board-level oversight, strategic direction, risk appetite. Technology Governance — how technology is acquired and deployed, aligned with corporate strategy. IT Governance — operationalises technology governance across IT service management, projects, vendors, and security. And Architecture Governance at the bottom — the most specific level, governing how architectural decisions are made, recorded, and enforced. The exam hierarchy to remember: Corporate, Technology, IT, Architecture — from broadest to most specific. Architecture governance operates within and supports all three levels above it.`},

{type:"section",bg:"purple",
html:`<div class="sec-num">02</div><div class="sec-lbl">Section Two</div><h2 class="sec-h">Architecture Board: Composition &amp; Responsibilities</h2><p class="sec-desc">Who sits on the Architecture Board and what it is actually responsible for.</p>`,
voice:`Section two: the Architecture Board. The Board is the heart of architecture governance — understanding its composition and responsibilities is essential for the exam.`},

{type:"content",
html:`<div class="clbl">The governance body</div><h2 class="ch">Architecture Board</h2>
<div class="box purple"><div class="box-lbl">What it is</div><p>The Architecture Board is the <strong>cross-functional governance body</strong> responsible for reviewing and maintaining the overall direction and management of all enterprise architectures. It is the primary authority for all architectural decisions in the enterprise.</p></div>
<div class="board-card"><div class="board-role">Typical Members</div><div class="board-desc">Chief Architect (usually chairs) · Domain architects (Business, Data, Application, Technology) · Architecture Sponsor (CIO/CTO or delegate) · Business unit representatives · External advisors where relevant. May be enterprise-wide or specific to a domain or programme.</div></div>
<div class="board-card"><div class="board-role">Core Responsibilities</div><div class="board-desc">Approve and maintain Architecture Principles · Review and approve Target Architecture documents · Manage Architecture Contracts · Conduct architecture compliance reviews · Grant or refuse dispensations · Resolve architecture conflicts between projects · Escalate governance breaches to senior leadership · Maintain the Governance Log</div></div>
<div class="board-card"><div class="board-role">What the Board is NOT</div><div class="board-desc">Not a design team — the Board reviews and approves, it doesn't design architectures. Not a project steering committee — that's separate. Not a rubber stamp — the Board has real authority to reject non-conforming work.</div></div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t">The Architecture Board has <strong>real governance authority</strong> — it can reject work, require changes, and grant or refuse dispensations. It is not advisory. Its decisions are binding within the scope of the Architecture Contract.</div></div>`,
voice:`The Architecture Board is the cross-functional governance body responsible for reviewing and maintaining all enterprise architectures. Typical membership includes the Chief Architect who usually chairs, domain architects for Business, Data, Application, and Technology, the Architecture Sponsor as the CIO or delegate, business unit representatives, and external advisors where relevant. Core responsibilities: approve and maintain Architecture Principles, review and approve Target Architecture documents, manage Architecture Contracts, conduct compliance reviews, grant or refuse dispensations, resolve architecture conflicts between projects, escalate governance breaches, and maintain the Governance Log. Three things the Board is NOT: not a design team — it reviews and approves, it doesn't design. Not a project steering committee. And not a rubber stamp — it has real authority to reject non-conforming work. Exam tip: the Board has real governance authority. Its decisions are binding within the scope of the Architecture Contract.`},

{type:"section",bg:"amber",
html:`<div class="sec-num">03</div><div class="sec-lbl">Section Three</div><h2 class="sec-h">Architecture Contracts: Purpose &amp; Content</h2><p class="sec-desc">The formal agreement that gives the Architecture Board its authority over implementation.</p>`,
voice:`Section three: Architecture Contracts. We covered these briefly in Phase G — here we go deeper on what they contain and why they matter.`},

{type:"content",
html:`<div class="clbl">The governance anchor</div><h2 class="ch">Architecture Contracts</h2>
<div class="box amber"><div class="box-lbl">Definition</div><p>An Architecture Contract is a <strong>joint agreement between development partners and sponsors</strong> on the deliverables, quality, and fitness-for-purpose of an architecture. It gives the Architecture Board formal authority to require conformance.</p></div>
<div class="contract-row"><div class="cr-icon">📋</div><div class="cr-text"><strong>Architectural statement</strong> — what architecture will be implemented; which Target Architecture applies.</div></div>
<div class="contract-row"><div class="cr-icon">✅</div><div class="cr-text"><strong>Conformance requirements</strong> — specific standards, principles, and architecture elements the implementation must comply with.</div></div>
<div class="contract-row"><div class="cr-icon">📏</div><div class="cr-text"><strong>Service levels and quality criteria</strong> — performance, availability, security, and usability requirements the solution must meet.</div></div>
<div class="contract-row"><div class="cr-icon">⚠️</div><div class="cr-text"><strong>Dispensations already granted</strong> — any approved deviations from conformance requirements, with conditions attached.</div></div>
<div class="contract-row"><div class="cr-icon">🔄</div><div class="cr-text"><strong>Change control procedures</strong> — how new dispensations are requested; how the contract itself is amended.</div></div>
<div class="contract-row"><div class="cr-icon">👁</div><div class="cr-text"><strong>Governance procedures</strong> — review schedule, milestone gates, reporting requirements, and escalation path.</div></div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t">Contracts are <strong>drafted in Phase F</strong>, finalised and signed in <strong>Phase G</strong>. Two types: <strong>Design Contracts</strong> (governing architecture work) and <strong>Business and IT Interface Contracts</strong> (governing IT delivery to the business).</div></div>`,
voice:`Architecture Contracts are formal joint agreements between development partners and sponsors. Six key contents to know. The architectural statement: what architecture will be implemented. Conformance requirements: specific standards and principles the implementation must meet. Service levels and quality criteria: performance, security, availability requirements. Dispensations already granted: approved deviations with conditions. Change control procedures: how new dispensations are requested and how the contract is amended. And governance procedures: the review schedule, milestone gates, and escalation path. Two exam points. Contracts are drafted in Phase F and finalised in Phase G. And there are two types: Design Contracts governing architecture work, and Business and IT Interface Contracts governing IT delivery to the business.`},

{type:"section",bg:"teal",
html:`<div class="sec-num">04</div><div class="sec-lbl">Section Four</div><h2 class="sec-h">Compliance vs Conformance Revisited</h2><p class="sec-desc">The precise TOGAF distinction between these two closely related terms.</p>`,
voice:`Section four: compliance versus conformance. This distinction appeared in Phase G — here we nail it down precisely because the exam tests it directly.`},

{type:"content",
html:`<div class="clbl">Two related but distinct concepts</div><h2 class="ch">Compliance vs Conformance</h2>
<div class="compare-grid">
  <div class="compare-box"><div class="compare-hd a">Conformance</div><div class="compare-body"><strong style="color:var(--white2)">Question asked:</strong> Does this match the approved architecture?<br><br><strong style="color:var(--white2)">Scope:</strong> Architectural designs and decisions<br><br><strong style="color:var(--white2)">Assessed by:</strong> Architecture Board<br><br><strong style="color:var(--white2)">Focus:</strong> Is this building what the architecture specified?</div></div>
  <div class="compare-box"><div class="compare-hd b">Compliance</div><div class="compare-body"><strong style="color:var(--white2)">Question asked:</strong> Does this meet all applicable standards?<br><br><strong style="color:var(--white2)">Scope:</strong> Standards, regulations, contracts, principles<br><br><strong style="color:var(--white2)">Assessed by:</strong> Board + governance functions<br><br><strong style="color:var(--white2)">Focus:</strong> Is this meeting all required obligations?</div></div>
</div>
<div class="blist">
  <div class="bi"><div class="bd"></div><div class="bt">A non-conforming implementation <strong>cannot be compliant</strong> — conformance is a prerequisite for compliance</div></div>
  <div class="bi"><div class="bd"></div><div class="bt">A conforming implementation may still be <strong>non-compliant</strong> if it fails to meet regulatory or contractual obligations outside the architecture</div></div>
  <div class="bi"><div class="bd"></div><div class="bt"><strong>Dispensations</strong> allow a specific non-conformance to proceed — formally approved by the Architecture Board and recorded in the Governance Log</div></div>
</div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t"><strong>Conformance = matches the architecture. Compliance = meets all standards and obligations.</strong> Conformance is necessary but not sufficient for compliance. A dispensation permits a specific non-conformance — it doesn't change the architecture.</div></div>`,
voice:`The distinction between compliance and conformance is tested directly on the exam. Conformance asks: does this match the approved architecture? It covers architectural designs and decisions, assessed by the Architecture Board. Compliance asks: does this meet all applicable standards and obligations? It covers standards, regulations, Architecture Contracts, and principles — assessed by the Board plus other governance functions. Three critical relationships. A non-conforming implementation cannot be compliant — conformance is a prerequisite. A conforming implementation may still be non-compliant if it fails regulatory or contractual obligations outside the architecture. And dispensations allow a specific non-conformance to proceed — formally approved by the Architecture Board and recorded in the Governance Log. The exam summary: conformance equals matches the architecture. Compliance equals meets all standards and obligations.`},

{type:"section",bg:"green",
html:`<div class="sec-num">05</div><div class="sec-lbl">Section Five</div><h2 class="sec-h">IT Governance vs Architecture Governance</h2><p class="sec-desc">How these two governance frameworks relate — and where they differ.</p>`,
voice:`Section five: IT governance versus architecture governance. These are complementary frameworks — understanding how they differ prevents exam confusion.`},

{type:"content",
html:`<div class="clbl">Two governance frameworks</div><h2 class="ch">IT Governance vs Architecture Governance</h2>
<div class="compare-grid">
  <div class="compare-box"><div class="compare-hd a">IT Governance</div><div class="compare-body">Frameworks: COBIT, ITIL, ISO 38500<br><br>Focus: IT service delivery, risk management, compliance, vendor management, project portfolio<br><br>Scope: How IT operates day-to-day and delivers services<br><br>Authority: IT leadership, IT steering committee</div></div>
  <div class="compare-box"><div class="compare-hd b">Architecture Governance</div><div class="compare-body">Frameworks: TOGAF, SABSA, Zachman<br><br>Focus: Architecture quality, design decisions, standards conformance, strategic alignment<br><br>Scope: What gets built and how it aligns to the target architecture<br><br>Authority: Architecture Board, Chief Architect</div></div>
</div>
<div class="box green"><div class="box-lbl">How they work together</div><p>IT Governance and Architecture Governance are <strong>complementary, not competing</strong>. Architecture Governance ensures the right things are designed. IT Governance ensures those things are built, operated, and managed correctly. A project needs both — architectural conformance approval from the Architecture Board, and IT governance approval from the IT steering committee.</p></div>
<div class="sg">
  <div class="sc"><div class="sn">01</div><div class="st"><strong>4 governance levels</strong> — Corporate → Technology → IT → Architecture.</div></div>
  <div class="sc"><div class="sn">02</div><div class="st"><strong>Architecture Board</strong> — cross-functional, real authority, not advisory.</div></div>
  <div class="sc"><div class="sn">03</div><div class="st"><strong>Contracts</strong> — drafted Phase F, signed Phase G. Two types.</div></div>
  <div class="sc"><div class="sn">04</div><div class="st"><strong>Conformance ≠ Compliance</strong> — conformance is necessary but not sufficient.</div></div>
</div>`,
voice:`IT governance and architecture governance are complementary frameworks, not competing ones. IT governance — using frameworks like COBIT, ITIL, and ISO 38500 — focuses on IT service delivery, risk management, vendor management, and project portfolio. It governs how IT operates day-to-day. Architecture governance — using TOGAF, SABSA, or Zachman — focuses on architecture quality, design decisions, standards conformance, and strategic alignment. It governs what gets built and how it aligns to the target architecture. They work together: architecture governance ensures the right things are designed. IT governance ensures those things are built, operated, and managed correctly. A project needs both: architectural conformance approval from the Architecture Board, and IT governance approval from the IT steering committee. Week 4 summary: four governance levels from Corporate down to Architecture. Architecture Board has real, binding authority. Contracts drafted in Phase F, signed in Phase G. And conformance is necessary but not sufficient for compliance.`},

voice:`Day 16 and Week 4 are complete. You've now covered all the TOGAF structural frameworks: the Content Framework, Enterprise Continuum and Repository, Architecture Capability, and Architecture Governance. Week 5 is the final push — Stakeholder Management and Views, the Reference Models, a full review of all domains, and the Mock Exam. Four sessions standing between you and exam day. Take the Day 16 quiz, then get ready for Week 5. See you Monday.`},

const BG={navy:"var(--navy2)",blue:"linear-gradient(135deg,#0A1525,#0D1F3A)",purple:"linear-gradient(135deg,#120E2A,#1A1235)",amber:"linear-gradient(135deg,#1A1000,#251800)",teal:"linear-gradient(135deg,#0A1F2F,#0D2A3A)",green:"linear-gradient(135deg,#0A1A10,#0D2218)",end:"linear-gradient(135deg,#080E1A,#0D1526 60%,#152035)"};
let cur=0,play=false,spdIdx=1,utt=null,tx=0,anim=false;
const SPDS=[0.8,1,1.2,1.5];
const wrap=document.getElementById("slides-wrap");
document.getElementById("stotal").textContent=SLIDES.length;
SLIDES.forEach((s,i)=>{const d=document.createElement("div");d.className="slide slide-"+(s.type||"content");d.id="sl"+i;d.style.background=BG[s.bg]||BG.navy;d.innerHTML=`<div class="slide-body">${s.html}</div>`;if(i===0)d.classList.add("active");wrap.appendChild(d);});
function goTo(i,dir){if(anim||i<0||i>=SLIDES.length)return;anim=true;stopSp();const f=document.getElementById("sl"+cur),t=document.getElementById("sl"+i);f.classList.remove("active");t.classList.add("active");f.classList.add(dir>0?"exit-left":"exit-right");t.classList.add(dir>0?"enter-right":"enter-left");t.querySelector(".slide-body").scrollTop=0;setTimeout(()=>{f.classList.remove("exit-left","exit-right","active");t.classList.remove("enter-right","enter-left");anim=false;cur=i;upUI();if(play)spk();},420);}
function nextSlide(){if(cur<SLIDES.length-1)goTo(cur+1,1);}function prevSlide(){if(cur>0)goTo(cur-1,-1);}
function upUI(){document.getElementById("snum").textContent=cur+1;document.getElementById("progress-fill").style.width=((cur+1)/SLIDES.length*100)+"%";document.getElementById("btn-prev").disabled=cur===0;document.getElementById("btn-next").disabled=cur===SLIDES.length-1;}
function spk(){stopSp();if(!("speechSynthesis"in window))return;const txt=SLIDES[cur].voice;if(!txt){if(play)setTimeout(nextSlide,800);return;}utt=new SpeechSynthesisUtterance(txt);utt.rate=SPDS[spdIdx];utt.lang="en-GB";const vs=speechSynthesis.getVoices();const p=vs.find(v=>v.lang.startsWith("en")&&(v.name.includes("Daniel")||v.name.includes("Samantha")||v.name.includes("Google UK")))||vs.find(v=>v.lang.startsWith("en"))||vs[0];if(p)utt.voice=p;utt.onstart=()=>setSt("speaking");utt.onend=()=>{setSt("");if(play&&cur<SLIDES.length-1)setTimeout(nextSlide,600);else{play=false;upPlay();}};utt.onerror=()=>setSt("");speechSynthesis.speak(utt);}
function stopSp(){if("speechSynthesis"in window)speechSynthesis.cancel();utt=null;setSt("");}
function togglePlay(){play=!play;upPlay();if(play)spk();else stopSp();}
function upPlay(){document.getElementById("play-icon").innerHTML=play?'<rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor"/><rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M4 3l11 6-11 6V3z"/>';}
function setSt(s){const el=document.getElementById("vs");el.innerHTML=s==="speaking"?`<div class="vd"><div class="vdot"></div><div class="vdot"></div><div class="vdot"></div></div><span>Narrating…</span>`:(s||"");}
function cycleSpeed(){spdIdx=(spdIdx+1)%SPDS.length;document.getElementById("spdbtn").textContent=SPDS[spdIdx]+"×";if(play){stopSp();setTimeout(spk,100);}}
function markDone(){try{const d=JSON.parse(localStorage.getItem("togaf_done")||"{}");d[16]=true;localStorage.setItem("togaf_done",JSON.stringify(d));}catch(e){}const b=document.getElementById("btn-done");b.style.background="var(--teal3)";b.style.borderColor="var(--teal)";b.querySelector("svg").style.stroke="var(--teal)";goTo(SLIDES.length-1,1);}
document.getElementById("start-btn").addEventListener("click",()=>{document.getElementById("start-overlay").style.display="none";document.getElementById("deck").style.display="flex";upUI();if("speechSynthesis"in window){const p=new SpeechSynthesisUtterance(" ");p.volume=0;speechSynthesis.speak(p);setTimeout(()=>{play=true;upPlay();spk();},400);}});
wrap.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown")nextSlide();if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevSlide();if(e.key===" "){e.preventDefault();togglePlay();}});
</script>
