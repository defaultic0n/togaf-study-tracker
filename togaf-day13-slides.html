    <button class="ctrl-btn" id="btn-next" onclick="nextSlide()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3l5 5-5 5"/></svg></button>

  </div>

<script>
const DAY_NUM = 13;
const SLIDES = [{type:"title",bg:"navy",html:`<div class="title-eyebrow">TOGAF Foundation · Day 13 of 20</div><h1 class="title-h">Architecture Content Framework</h1><div class="title-rule"></div><p class="title-sub">What architecture produces — deliverables, artefacts, building blocks, and the metamodel that connects them all.</p><div class="title-tags"><span class="title-tag">📊 5 topics</span><span class="title-tag">🎙 Narrated</span><span class="title-tag">⭐ Week 4</span></div>`,voice:`Welcome to Day 13 — Monday of Week 4. Today is the Architecture Content Framework — the part of TOGAF that defines what architecture actually produces. We cover the three output types: deliverables, artefacts, and building blocks. Then the crucial ABB versus SBB distinction. Then the Content Metamodel. Then building block reusability. And finally, which key deliverable belongs to which ADM phase. Let's go.`},
{type:"section",bg:"teal",html:`<div class="section-num">01</div><div class="section-label">Section One</div><h2 class="section-h">Three Output Types</h2><p class="section-desc">Deliverables, artefacts, and building blocks — each with a precise meaning. Not interchangeable.</p>`,voice:`Section one: the three output types. These are the most commonly confused terms in the Content Framework.`},
{type:"content",bg:"navy",html:`<div class="content-label">The key distinction</div><h2 class="content-h">Deliverable vs Artefact vs Building Block</h2>
<div class="callout teal"><div class="callout-label">Deliverable</div><p>Contractually specified and formally reviewed or approved by the Architecture Board. The top-level work product. Example: Architecture Definition Document, Statement of Architecture Work.</p></div>
<div class="callout blue"><div class="callout-label">Artefact</div><p>An architectural work product that describes an aspect of architecture. Contained within deliverables. Examples: Application Interaction Matrix, Data Dissemination Diagram, Org Map.</p></div>
<div class="callout purple"><div class="callout-label">Building Block</div><p>A reusable component of business or IT capability that can be combined with others to deliver architectures and solutions. Examples: CRM capability (ABB), Salesforce (SBB).</p></div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>Key rule:</strong> Deliverables contain artefacts. Artefacts describe building blocks. They are NOT interchangeable. A deliverable is contractually agreed; an artefact describes; a building block implements.</div></div>`,voice:`Three output types, three distinct meanings. A Deliverable is contractually specified and formally reviewed or approved by the Architecture Board. The Architecture Definition Document and Statement of Architecture Work are deliverables. An Artefact is an architectural work product that describes an aspect of the architecture — it lives inside deliverables. Application Interaction Matrices and Data Dissemination Diagrams are artefacts. A Building Block is a reusable component — a capability or solution that can be combined with others. The key rule: deliverables contain artefacts, artefacts describe building blocks. Not interchangeable.`},
{type:"section",bg:"blue",html:`<div class="section-num">02</div><div class="section-label">Section Two</div><h2 class="section-h">ABBs vs SBBs</h2><p class="section-desc">Architecture Building Blocks are technology-independent. Solution Building Blocks are specific products. The mapping between them happens in Phase E.</p>`,voice:`Section two: Architecture Building Blocks versus Solution Building Blocks. This is the most-tested Content Framework distinction.`},
{type:"content",bg:"navy",html:`<div class="content-label">The ABB-SBB distinction</div><h2 class="content-h">ABB vs SBB</h2>
<div class="two-col-grid">
  <div class="col-card"><div class="col-head" style="color:var(--blue)">Architecture BB (ABB)</div><div class="col-body">Technology-independent. Defines WHAT a capability does. Created in Phases B, C, D. Lives in Architecture Continuum.<br><br>Example: "Customer Relationship Management capability"</div></div>
  <div class="col-card"><div class="col-head" style="color:var(--green)">Solution BB (SBB)</div><div class="col-body">Technology-specific product. Implements an ABB. First mapped in Phase E. Lives in Solutions Continuum.<br><br>Example: "Salesforce Sales Cloud"</div></div>
</div>
<div class="callout amber"><div class="callout-label">The mapping moment</div><p>ABBs are defined in Phases B–D as technology-independent components. In Phase E — Opportunities and Solutions — ABBs are mapped to candidate SBBs for the first time. This is the first point where specific products appear in the ADM.</p></div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>ABBs in B-D</strong> (Architecture Continuum, tech-neutral). <strong>SBBs in Phase E</strong> (Solutions Continuum, named products). ABB→SBB mapping is a key Phase E activity.</div></div>`,voice:`ABBs and SBBs. An Architecture Building Block is technology-independent — it defines what a capability does, not how it is implemented. ABBs are created in Phases B, C, and D and live in the Architecture Continuum. A Solution Building Block is technology-specific — it is a named product or solution that implements an ABB. SBBs are identified in Phase E and live in the Solutions Continuum. The critical moment: in Phase E — Opportunities and Solutions — ABBs are mapped to candidate SBBs for the first time. This is the first point in the ADM where specific technology products are named. Before Phase E, everything is technology-independent.`},
{type:"section",bg:"purple",html:`<div class="section-num">03</div><div class="section-label">Section Three</div><h2 class="section-h">The Content Metamodel</h2><p class="section-desc">The vocabulary and grammar of architecture — defining entity types and their relationships.</p>`,voice:`Section three: the Content Metamodel. This is the formal vocabulary underlying all TOGAF architecture descriptions.`},
{type:"content",bg:"navy",html:`<div class="content-label">Vocabulary of architecture</div><h2 class="content-h">Content Metamodel</h2>
<div class="callout purple"><div class="callout-label">Definition</div><p>The Architecture Content Metamodel defines the types of architectural entities and relationships between them — providing a common vocabulary for all architecture descriptions. It ensures consistency and traceability across all ADM phases.</p></div>
<div class="bullet-list">
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><em>Entity types</em>: Actor, Role, Business Service, Function, Process, Data Entity, Logical/Physical App Component, Logical/Physical Tech Component</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><em>Relationship types</em>: realises, supports, uses, assigns to — connecting entities across the BDAT domains</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><em>Traceability</em>: business goal → capability → function → application → technology component — fully traceable chain</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><em>Extensible</em>: organisations can add custom entity types and relationships, provided they are documented and governed</div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text">Metamodel = <strong>vocabulary and grammar of architecture</strong>. Enables traceability from business goals to technology components. Can be extended but must be documented.</div></div>`,voice:`The Content Metamodel defines the types of architectural entities and the relationships between them. Think of it as the vocabulary and grammar of architecture. Entity types include Actor, Role, Business Service, Function, Process, Data Entity, and Logical and Physical Application and Technology Components. Relationship types include realises, supports, uses, and assigns to — connecting entities across the Business, Data, Application, and Technology domains. The metamodel enables full traceability: from a business goal down through capabilities, functions, applications, and technology components. It can be extended with custom entity types and relationships, provided extensions are documented and governed.`},
{type:"section",bg:"green",html:`<div class="section-num">04</div><div class="section-label">Section Four</div><h2 class="section-h">Building Block Reusability</h2><p class="section-desc">The core value of building blocks — designed once, referenced many times.</p>`,voice:`Section four: building block reusability. This is why the building block concept matters so much in TOGAF.`},
{type:"content",bg:"navy",html:`<div class="content-label">Reuse value</div><h2 class="content-h">What Makes a Good Building Block</h2>
<div class="bullet-list">
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Clear interface</strong> — well-defined boundary hiding internal complexity</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Loosely coupled</strong> — can change internally without breaking dependent blocks</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Well specified</strong> — testable, with defined acceptance criteria</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Documented</strong> — stored in the Architecture Repository for discovery</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Addresses a real business need</strong> — purpose-driven, not technology-driven</div></div>
</div>
<div class="callout teal"><div class="callout-label">Storage and discovery</div><p>Building blocks are stored in the Architecture Repository. Organisation-specific BBs live in the Architecture Landscape. Generic/industry BBs live in the Reference Library. Teams search the Repository before creating new BBs to maximise reuse.</p></div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text">Good BB characteristics: <strong>clear interface, loosely coupled, well specified, documented, purpose-driven</strong>. Stored in Architecture Repository. Search before creating new.</div></div>`,voice:`Good building blocks have five characteristics. A clear interface — well-defined boundary hiding internal complexity. Loose coupling — changing internally without breaking dependent blocks. Well specified — testable with defined acceptance criteria. Documented — stored in the Architecture Repository for discovery and reuse. And purpose-driven — addressing a real business need, not just a technology capability. Organisation-specific building blocks live in the Architecture Landscape within the Repository. Generic and industry building blocks live in the Reference Library. The rule: always search the Repository before creating a new building block. Most of the time, a reusable block already exists.`},
{type:"section",bg:"amber",html:`<div class="section-num">05</div><div class="section-label">Section Five</div><h2 class="section-h">Key Deliverables Per ADM Phase</h2><p class="section-desc">Which deliverable belongs to which phase — high-frequency exam content.</p>`,voice:`Section five: key deliverables per ADM phase. This is one of the most tested areas in the Foundation exam.`},
{type:"content",bg:"navy",html:`<div class="content-label">Phase-by-phase</div><h2 class="content-h">Primary Deliverables</h2>
<div class="def-list">
  <div class="def-item"><div class="def-term">Preliminary Phase</div><div class="def-text">Architecture Principles · Tailored Architecture Framework</div></div>
  <div class="def-item"><div class="def-term">Phase A</div><div class="def-text">Statement of Architecture Work ★ · Architecture Vision</div></div>
  <div class="def-item"><div class="def-term">Phases B, C, D</div><div class="def-text">Architecture Definition Document (one chapter each phase) ★</div></div>
  <div class="def-item"><div class="def-term">Phase E</div><div class="def-text">Architecture Roadmap (initial) ★ · Transition Architecture definitions</div></div>
  <div class="def-item"><div class="def-term">Phase F</div><div class="def-text">Implementation &amp; Migration Plan ★ · Architecture Roadmap (final)</div></div>
  <div class="def-item"><div class="def-term">Phase G</div><div class="def-text">Signed Architecture Contracts ★ · Compliance Assessments</div></div>
  <div class="def-item"><div class="def-term">Phase H</div><div class="def-text">Architecture Change Request records · Updated ADD</div></div>
</div>
<div class="sum-grid">
  <div class="sum-card"><div class="sum-num">KEY 1</div><div class="sum-text"><strong>Architecture Roadmap</strong> first appears in Phase E — never before.</div></div>
  <div class="sum-card"><div class="sum-num">KEY 2</div><div class="sum-text"><strong>ADD</strong> grows across B, C, D — complete by end of Phase D.</div></div>
  <div class="sum-card"><div class="sum-num">KEY 3</div><div class="sum-text"><strong>SoAW</strong> is Phase A's primary output, not its input.</div></div>
  <div class="sum-card"><div class="sum-num">KEY 4</div><div class="sum-text"><strong>Contracts</strong> drafted in F, signed in G.</div></div>
</div>`,voice:`Key deliverables by phase. Preliminary produces the Architecture Principles and Tailored Framework. Phase A produces the Statement of Architecture Work — this is the primary output, not an input — and the Architecture Vision. Phases B, C, and D each produce a chapter of the Architecture Definition Document. Phase E produces the initial Architecture Roadmap — this is the first time the Roadmap appears, never before. Phase F produces the Implementation and Migration Plan and the final Roadmap. Phase G produces signed Architecture Contracts and Compliance Assessments. Phase H produces Change Request records and an updated ADD. Four keys to memorise: Roadmap first in Phase E. ADD grows across B, C, D. Statement of Architecture Work is Phase A's output. Contracts drafted in F, signed in G.`},

let cur=0,play=false,spdIdx=1,utt=null,tx=0,anim=false;
const SPDS=[0.8,1,1.2,1.5];
const wrap=document.getElementById("slides-wrap");
document.getElementById("slide-total").textContent=SLIDES.length;
function getBg(b){const m={navy:"var(--navy2)",teal:"linear-gradient(135deg,#0A1F2F,#0D2A3A)",blue:"linear-gradient(135deg,#0A1525,#0D1F3A)",purple:"linear-gradient(135deg,#120E2A,#1A1235)",green:"linear-gradient(135deg,#0A1A10,#0D2218)",amber:"linear-gradient(135deg,#1A1000,#251800)",coral:"linear-gradient(135deg,#1A0A0E,#2A0D15)",gold:"linear-gradient(135deg,#1A1200,#251A00)",end:"linear-gradient(135deg,#080E1A,#0D1526 60%,#152035)"};return m[b]||"var(--navy2)";}
SLIDES.forEach((s,i)=>{const d=document.createElement("div");d.className="slide slide-"+(s.type||"content");d.id="s"+i;d.style.background=getBg(s.bg);d.innerHTML=`<div class="slide-body">${s.html}</div>`;if(i===0)d.classList.add("active");wrap.appendChild(d);});
function goTo(i,dir){if(anim||i<0||i>=SLIDES.length)return;anim=true;stopSp();const f=document.getElementById("s"+cur),t=document.getElementById("s"+i);f.classList.remove("active");t.classList.add("active");f.classList.add(dir>0?"exit-left":"exit-right");t.classList.add(dir>0?"enter-right":"enter-left");t.querySelector(".slide-body").scrollTop=0;setTimeout(()=>{f.classList.remove("exit-left","exit-right","active");t.classList.remove("enter-right","enter-left");anim=false;cur=i;upUI();if(play)spk();},420);}
function nextSlide(){if(cur<SLIDES.length-1)goTo(cur+1,1);}
function prevSlide(){if(cur>0)goTo(cur-1,-1);}
function upUI(){document.getElementById("slide-num").textContent=cur+1;document.getElementById("progress-fill").style.width=((cur+1)/SLIDES.length*100)+"%";document.getElementById("btn-prev").disabled=cur===0;document.getElementById("btn-next").disabled=cur===SLIDES.length-1;}
function spk(){stopSp();if(!("speechSynthesis"in window))return;const txt=SLIDES[cur].voice;if(!txt){if(play)setTimeout(nextSlide,800);return;}utt=new SpeechSynthesisUtterance(txt);utt.rate=SPDS[spdIdx];utt.lang="en-GB";const vs=speechSynthesis.getVoices();const p=vs.find(v=>v.lang.startsWith("en")&&(v.name.includes("Daniel")||v.name.includes("Samantha")||v.name.includes("Karen")||v.name.includes("Google UK")))||vs.find(v=>v.lang.startsWith("en"))||vs[0];if(p)utt.voice=p;utt.onstart=()=>setSt("speaking");utt.onend=()=>{setSt("");if(play&&cur<SLIDES.length-1)setTimeout(nextSlide,600);else if(cur===SLIDES.length-1){play=false;upPlay();}};utt.onerror=()=>setSt("");speechSynthesis.speak(utt);}
function stopSp(){if("speechSynthesis"in window)speechSynthesis.cancel();utt=null;setSt("");}
function togglePlay(){play=!play;upPlay();if(play)spk();else stopSp();}
function upPlay(){document.getElementById("play-icon").innerHTML=play?'<rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor"/><rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M4 3l11 6-11 6V3z"/>';}
function setSt(s){const el=document.getElementById("voice-status");el.innerHTML=s==="speaking"?`<div class="voice-dots"><div class="voice-dot"></div><div class="voice-dot"></div><div class="voice-dot"></div></div><span>Narrating…</span>`:s||"";}
function cycleSpeed(){spdIdx=(spdIdx+1)%SPDS.length;document.getElementById("speed-btn").textContent=SPDS[spdIdx]+"×";if(play){stopSp();setTimeout(spk,100);}}
function markDone(){try{const d=JSON.parse(localStorage.getItem("togaf_done")||"{}");d[13]=true;localStorage.setItem("togaf_done",JSON.stringify(d));}catch(e){}const b=document.getElementById("btn-done");b.style.background="var(--teal3)";b.style.borderColor="var(--teal)";b.querySelector("svg").style.stroke="var(--teal)";goTo(SLIDES.length-1,1);}
document.getElementById("start-btn").addEventListener("click",()=>{document.getElementById("start-overlay").style.display="none";document.getElementById("deck").style.display="flex";upUI();if("speechSynthesis"in window){const p=new SpeechSynthesisUtterance(" ");p.volume=0;speechSynthesis.speak(p);setTimeout(()=>{play=true;upPlay();spk();},400);}});
wrap.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown")nextSlide();if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevSlide();if(e.key===" "){e.preventDefault();togglePlay();}});
if("speechSynthesis"in window)speechSynthesis.onvoiceschanged=()=>{};

</script>
