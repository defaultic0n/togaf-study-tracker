<script>
const SLIDES=[
{type:"title",bg:"navy",
html:`<div class="title-eyebrow">TOGAF Foundation · Day 6 of 20</div><h1 class="title-h">Phase D:<br>Technology Architecture</h1><div class="title-rule"></div><p class="title-sub">The last of the three detailed phases — defining the technology infrastructure that makes business, data, and applications actually work.</p><div class="title-tags"><span class="title-tag">📊 5 topics</span><span class="title-tag">🎙 Narrated</span><span class="title-tag">⭐ Week 2</span></div>`,
voice:`Welcome to Day 6. Today is Phase D — Technology Architecture, the T in BDAT. This is the final detailed architecture phase before we move into delivery planning in Phases E and F. We'll cover the BDAT stack and where Phase D fits, technology components and standards, the Application Platform service taxonomy, the key artefacts including the Technology Portfolio Catalogue and Environments diagram, and the complete inputs and outputs. Let's go.`},

{type:"section",bg:"amber",
html:`<div class="section-num">01</div><div class="section-label">Section One</div><h2 class="section-h">Phase D Overview</h2><p class="section-desc">The technology layer — and why it's designed last in the BDAT sequence.</p>`,
voice:`Section one: Phase D overview. The most important thing to understand is where Phase D sits in the BDAT stack and why technology is always designed last.`},

{type:"content",
html:`<div class="content-label">The BDAT stack</div><h2 class="content-h">Technology — Always Designed Last</h2>
<div class="layer-stack">
  <div class="layer b"><span class="layer-icon">🏢</span><div><div class="layer-name">Phase B — Business</div><div class="layer-desc">Strategy, capabilities, value streams, org structure</div></div></div>
  <div class="layer d"><span class="layer-icon">🗄</span><div><div class="layer-name">Phase C — Data</div><div class="layer-desc">Entities, data components, data flows, data governance</div></div></div>
  <div class="layer a"><span class="layer-icon">📱</span><div><div class="layer-name">Phase C — Application</div><div class="layer-desc">Logical/physical apps, integration, portfolio</div></div></div>
  <div class="layer t"><span class="layer-icon">⚙️</span><div><div class="layer-name">Phase D — Technology ← TODAY</div><div class="layer-desc">Infrastructure, platforms, networks, standards</div></div></div>
</div>
<div class="callout teal"><div class="callout-label">Why top-down?</div><p>Technology serves the business — not the other way around. TOGAF designs business strategy first (B), then information systems (C), then the technology to run them (D). <strong>Technology choices are always driven by what the business and applications need.</strong></p></div>`,
voice:`Here's the BDAT stack. Business Architecture is designed first in Phase B — strategy, capabilities, value streams. Then Phase C designs the Data Architecture and Application Architecture. Finally, Phase D designs the Technology Architecture — the infrastructure that makes everything else run. The reason technology is always designed last is fundamental: technology should serve the business, not constrain it. By designing business and information systems first, we ensure technology choices are driven by what the business actually needs.`},

{type:"section",bg:"amber",
html:`<div class="section-num">02</div><div class="section-label">Section Two</div><h2 class="section-h">Technology Components &amp; Standards</h2><p class="section-desc">What goes into the technology layer and how standards govern what can be selected.</p>`,
voice:`Section two: Technology Components and Standards. Phase D identifies and categorises all the technology infrastructure elements needed to support the application and data layers.`},

{type:"content",
html:`<div class="content-label">What technology architecture contains</div><h2 class="content-h">Components and Standards</h2>
<div class="def-list">
  <div class="def-item"><div class="def-term">Logical Technology Component</div><div class="def-text">Technology capability defined independently of products. E.g. "Relational Database Management Service" — what is needed, not which product.</div></div>
  <div class="def-item"><div class="def-term">Physical Technology Component</div><div class="def-text">Specific technology product. E.g. "Oracle Database 21c" implements the logical RDBMS component. Technology-specific.</div></div>
  <div class="def-item"><div class="def-term">Technology Standards</div><div class="def-text">Approved technology products, versions, configurations. Stored in the Standards Library. Constrain physical component selection — must use approved products.</div></div>
  <div class="def-item"><div class="def-term">Technology Portfolio</div><div class="def-text">Complete inventory of all technology components — hardware, software, middleware, cloud services — both baseline (current) and target (future).</div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text">Same <strong>logical / physical distinction</strong> as Phase C. Logical = technology-independent. Physical = specific products. <strong>Standards constrain</strong> which physical products can be chosen.</div></div>`,
voice:`Technology Architecture contains four key elements. Logical Technology Components define what is needed without specifying products — "Relational Database Management Service" is a logical component. Physical Technology Components are the specific products that implement them — Oracle Database 21c is a physical component. Technology Standards are the approved products, versions, and configurations stored in the Standards Library of the Architecture Repository. And the Technology Portfolio is the complete inventory of all technology components, baseline and target. The same logical-to-physical design approach applies here as in Phase C — design logical first, then select physical products that comply with standards.`},

{type:"section",bg:"teal",
html:`<div class="section-num">03</div><div class="section-label">Section Three</div><h2 class="section-h">Platform Services &amp; Application Platform</h2><p class="section-desc">The shared infrastructure services that all applications depend on.</p>`,
voice:`Section three: Platform Services and the Application Platform. This is a key TOGAF concept — the shared technical foundation that all application components run on.`},

{type:"content",
html:`<div class="content-label">The platform taxonomy</div><h2 class="content-h">Application Platform Services</h2>
<div class="callout teal"><div class="callout-label">Application Platform</div><p>The <strong>complete set of technology services</strong> required to run application components. Phase D must define and design this platform in its entirety.</p></div>
<div class="svc-grid">
  <div class="svc-card"><div class="svc-name">Data Interchange</div><div class="svc-desc">APIs, messaging, queuing, event streaming — connecting applications</div></div>
  <div class="svc-card"><div class="svc-name">Data Management</div><div class="svc-desc">Databases, caching, storage — persisting and retrieving data</div></div>
  <div class="svc-card"><div class="svc-name">Security Services</div><div class="svc-desc">Authentication, authorisation, encryption, audit logging</div></div>
  <div class="svc-card"><div class="svc-name">OS Services</div><div class="svc-desc">Process management, file systems, scheduling, memory</div></div>
  <div class="svc-card"><div class="svc-name">Network Services</div><div class="svc-desc">Connectivity, routing, load balancing, DNS, firewall</div></div>
  <div class="svc-card"><div class="svc-name">Location &amp; Directory</div><div class="svc-desc">Identity directories, service registries, service discovery</div></div>
</div>
<div class="callout amber"><div class="callout-label">Cloud and hybrid</div><p>Modern platforms span on-premise, private cloud, and public cloud (IaaS, PaaS, SaaS). Phase D models this hybrid reality — where data resides, how apps communicate across boundaries, and compliance constraints per location.</p></div>`,
voice:`The Application Platform is the complete set of technology services required to run application components. TOGAF organises it into six service categories. Data Interchange Services — APIs, messaging, queuing — connect applications to each other. Data Management Services — databases, caching, storage — persist and retrieve data. Security Services — authentication, authorisation, encryption — provide the security fabric. Operating System Services provide the fundamental compute layer. Network Services provide connectivity and routing. And Location and Directory Services handle identity and service discovery. In modern enterprises, this platform typically spans on-premise infrastructure and public cloud. Phase D must model this hybrid reality.`},

{type:"section",bg:"purple",
html:`<div class="section-num">04</div><div class="section-label">Section Four</div><h2 class="section-h">Phase D Artefacts</h2><p class="section-desc">Catalogues, matrices, and diagrams — the artefacts that document the technology architecture.</p>`,
voice:`Section four: Phase D artefacts. The same three types apply as in Phase B and C — catalogues, matrices, and diagrams — but now at the technology level.`},

{type:"content",
html:`<div class="content-label">Key artefacts</div><h2 class="content-h">Documenting Technology Architecture</h2>
<div class="art-row"><span class="art-badge" style="background:var(--teal3);color:var(--teal)">Catalogue</span><div><div class="art-name-s">Technology Portfolio Catalogue</div><div class="art-desc-s">Complete inventory of all technology components — hardware, software, middleware, cloud — baseline and target.</div></div></div>
<div class="art-row"><span class="art-badge" style="background:var(--teal3);color:var(--teal)">Catalogue</span><div><div class="art-name-s">Technology Standards Catalogue</div><div class="art-desc-s">Approved technology products, versions, and configurations.</div></div></div>
<div class="art-row"><span class="art-badge" style="background:var(--blue2);color:var(--blue)">Matrix</span><div><div class="art-name-s">Application / Technology Matrix ★</div><div class="art-desc-s">Maps Phase C applications to Phase D technology components. The C-to-D dependency bridge.</div></div></div>
<div class="art-row"><span class="art-badge" style="background:var(--purple2);color:var(--purple)">Diagram</span><div><div class="art-name-s">Environments and Locations Diagram ★</div><div class="art-desc-s">Where technology components are deployed — data centres, cloud regions, offices, DR sites.</div></div></div>

<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>App / Technology Matrix</strong> links Phase C to Phase D. <strong>Environments and Locations</strong> shows where everything runs. Both are exam favourites.</div></div>`,
voice:`The key Phase D artefacts are: the Technology Portfolio Catalogue — the complete inventory of all technology components. The Technology Standards Catalogue — approved products and versions. The Application / Technology Matrix — starred because it's the bridge between Phase C applications and their Phase D technology dependencies. The Environments and Locations Diagram — also starred — showing where all technology components are deployed across data centres, cloud regions, offices, and disaster recovery sites. And the Platform Decomposition Diagram, showing the hierarchical breakdown of the Application Platform. For the exam: the Application / Technology Matrix and the Environments and Locations Diagram are the most tested.`},

{type:"content",
html:`<div class="content-label">IO and summary</div><h2 class="content-h">Phase D Complete Picture</h2>
<div class="io-grid">
  <div class="io-box"><div class="io-header in">Key Inputs</div><ul class="io-list"><li><strong style="color:var(--blue)">IS Architecture (Phase C) ★</strong></li><li>Architecture Vision (Phase A)</li><li>Architecture Principles</li><li>Architecture Repository + Standards Library</li><li>Existing Technology docs</li><li>IT strategy and tech roadmap</li></ul></div>
  <div class="io-box"><div class="io-header out">Key Outputs</div><ul class="io-list"><li><strong style="color:var(--teal)">Baseline Tech Architecture ★</strong></li><li><strong style="color:var(--teal)">Target Tech Architecture ★</strong></li><li><strong style="color:var(--teal)">Technology Gap Analysis ★</strong></li><li>Technology Portfolio Catalogue</li><li>Environments &amp; Locations Diagram</li><li>Architecture Definition Doc (D)</li></ul></div>
</div>
<div class="callout amber"><div class="callout-label">Transition to Phase E</div><p>Phase D completes the architecture. All gaps from B + C + D are consolidated in <strong>Phase E — Opportunities and Solutions</strong>, which plans the projects needed to close them. Phase D is the last design phase; E and F are delivery planning.</p></div>
<div class="sum-grid">
  <div class="sum-card"><div class="sum-num">01</div><div class="sum-text"><strong>Phase D = Technology</strong> — the T in BDAT, designed last. Infrastructure serving business.</div></div>

</div>`,
voice:`Here's the complete Phase D picture. Primary input: the Information Systems Architecture from Phase C — this scopes all the technology needed. Key outputs: Baseline Technology Architecture, Target Technology Architecture, and Technology Gap Analysis. The Architecture Definition Document now has chapters for Business, Information Systems, and Technology — all three detailed phases are complete. After Phase D, all gaps from Phases B, C, and D are consolidated in Phase E — Opportunities and Solutions — which plans the projects needed to close them. Phase D is the last design phase. Phases E and F are delivery planning. Four key takeaways: Technology is designed last because it serves the business. Logical before physical, standards constrain choices. The Application Platform has six service categories. And the Application / Technology Matrix is the critical bridge between Phase C and Phase D.`},

html:`<div class="title-eyebrow">Day 6 Complete</div><h1 class="title-h" style="font-size:clamp(24px,6vw,40px)">Phase D — done.</h1><div class="title-rule"></div><p class="title-sub" style="margin-bottom:24px">Next up: <strong>Day 7 — Phase E: Opportunities &amp; Solutions</strong>. The architecture design is complete — now we plan how to deliver it.</p>

voice:`Day 6 is complete. Phase D done — the BDAT architecture stack is now fully designed. Take the quiz on the reading version to lock in your learning. Day 7 is a significant turning point: Phase E — Opportunities and Solutions. This is where the architecture shifts from design to delivery planning, consolidating all the gaps from Phases B, C, and D into a coherent implementation roadmap. See you there.`},

let cur=0,play=false,spdIdx=1,utt=null,tx=0,anim=false;
const SPDS=[0.8,1,1.2,1.5];
const wrap=document.getElementById("slides-wrap");
document.getElementById("slide-total").textContent=SLIDES.length;
function bg(b){return{navy:"var(--navy2)",amber:"linear-gradient(135deg,#1A1000,#251800)",teal:"linear-gradient(135deg,#0A1F2F,#0D2A3A)",blue:"linear-gradient(135deg,#0A1525,#0D1F3A)",purple:"linear-gradient(135deg,#120E2A,#1A1235)",green:"linear-gradient(135deg,#0A1A10,#0D2218)",coral:"linear-gradient(135deg,#1A0A0E,#2A0D15)",end:"linear-gradient(135deg,#080E1A,#0D1526 60%,#152035)"}[b]||"var(--navy2)";}
SLIDES.forEach((s,i)=>{const d=document.createElement("div");d.className="slide slide-"+(s.type||"content");d.id="s"+i;d.style.background=bg(s.bg);d.innerHTML=`<div class="slide-body">${s.html}</div>`;if(i===0)d.classList.add("active");wrap.appendChild(d);});
function goTo(i,dir){if(anim||i<0||i>=SLIDES.length)return;anim=true;stopSp();const f=document.getElementById("s"+cur),t=document.getElementById("s"+i);f.classList.remove("active");t.classList.add("active");f.classList.add(dir>0?"exit-left":"exit-right");t.classList.add(dir>0?"enter-right":"enter-left");t.querySelector(".slide-body").scrollTop=0;setTimeout(()=>{f.classList.remove("exit-left","exit-right","active");t.classList.remove("enter-right","enter-left");anim=false;cur=i;upUI();if(play)spk();},420);}
function nextSlide(){if(cur<SLIDES.length-1)goTo(cur+1,1);}
function prevSlide(){if(cur>0)goTo(cur-1,-1);}
function upUI(){document.getElementById("slide-num").textContent=cur+1;document.getElementById("progress-fill").style.width=((cur+1)/SLIDES.length*100)+"%";document.getElementById("btn-prev").disabled=cur===0;document.getElementById("btn-next").disabled=cur===SLIDES.length-1;}
function spk(){stopSp();if(!("speechSynthesis"in window))return;const txt=SLIDES[cur].voice;if(!txt){if(play)setTimeout(nextSlide,800);return;}utt=new SpeechSynthesisUtterance(txt);utt.rate=SPDS[spdIdx];utt.lang="en-GB";const vs=speechSynthesis.getVoices();const p=vs.find(v=>v.lang.startsWith("en")&&(v.name.includes("Daniel")||v.name.includes("Samantha")||v.name.includes("Karen")||v.name.includes("Google UK")))||vs.find(v=>v.lang.startsWith("en"))||vs[0];if(p)utt.voice=p;utt.onstart=()=>setSt("speaking");utt.onend=()=>{setSt("");if(play&&cur<SLIDES.length-1)setTimeout(nextSlide,600);else if(cur===SLIDES.length-1){play=false;upPlay();}};utt.onerror=()=>setSt("");speechSynthesis.speak(utt);}
function stopSp(){if("speechSynthesis"in window)speechSynthesis.cancel();utt=null;setSt("");}
function togglePlay(){play=!play;upPlay();if(play)spk();else stopSp();}
function upPlay(){document.getElementById("play-icon").innerHTML=play?'<rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor"/><rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M4 3l11 6-11 6V3z"/>';}
function setSt(s){const el=document.getElementById("voice-status");el.innerHTML=s==="speaking"?`<div class="voice-dots"><div class="voice-dot"></div><div class="voice-dot"></div><div class="voice-dot"></div></div><span>Narrating…</span>`:s||"";}
function cycleSpeed(){spdIdx=(spdIdx+1)%SPDS.length;document.getElementById("speed-btn").textContent=SPDS[spdIdx]+"×";if(play){stopSp();setTimeout(spk,100);}}
function markDone(){try{const d=JSON.parse(localStorage.getItem("togaf_done")||"{}");d[6]=true;localStorage.setItem("togaf_done",JSON.stringify(d));}catch(e){}const b=document.getElementById("btn-done");b.style.background="var(--teal3)";b.style.borderColor="var(--teal)";b.querySelector("svg").style.stroke="var(--teal)";goTo(SLIDES.length-1,1);}
document.getElementById("start-btn").addEventListener("click",()=>{document.getElementById("start-overlay").style.display="none";document.getElementById("deck").style.display="flex";upUI();if("speechSynthesis"in window){const p=new SpeechSynthesisUtterance(" ");p.volume=0;speechSynthesis.speak(p);setTimeout(()=>{play=true;upPlay();spk();},400);}});
wrap.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown")nextSlide();if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevSlide();if(e.key===" "){e.preventDefault();togglePlay();}});
if("speechSynthesis"in window)speechSynthesis.onvoiceschanged=()=>{};
document.getElementById("deck").style.display="none";
</script>
