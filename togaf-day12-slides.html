<script>
const SLIDES=[
{type:"title",bg:"navy",
html:`<div class="title-eyebrow">TOGAF Foundation · Day 12 of 20</div><h1 class="title-h">ADM Guidelines<br>&amp; Techniques</h1><div class="title-rule"></div><p class="title-sub">The practical toolkit for applying the ADM — iteration patterns, security, SOA, transformation readiness, and risk management.</p><div class="title-tags"><span class="title-tag">📊 5 topics</span><span class="title-tag">🎙 Narrated</span><span class="title-tag">🏁 Week 3 finale</span></div>`,
voice:`Welcome to Day 12 — the final session of Week 3. Today is ADM Guidelines and Techniques. The ADM is a flexible framework, not a rigid script. This session covers the practical tools that help you apply it in the real world. We'll cover the three ADM iteration patterns, security as a cross-cutting concern, SOA in the ADM, the Business Transformation Readiness Assessment, and TOGAF's risk management approach. Let's close out Week 3 strong.`},

{type:"section",bg:"teal",
html:`<div class="section-num">01</div><div class="section-label">Section One</div><h2 class="section-h">ADM Iteration Patterns</h2><p class="section-desc">The ADM is designed to be iterated — not just run once. Three patterns govern how.</p>`,
voice:`Section one: ADM Iteration Patterns. The ADM is depicted as a cycle for good reason — it is designed to be repeated.`},

{type:"content",
html:`<div class="content-label">Three iteration patterns</div><h2 class="content-h">How the ADM Gets Repeated</h2>
<div class="iter-list">
  <div class="iter-card"><div class="iter-head arch">🔄 Architecture Iteration</div><div class="iter-body">Full ADM cycle repeated — completing B through H, then returning to A for the next architecture engagement. The standard pattern for enterprises running an ongoing architecture practice.</div></div>
  <div class="iter-card"><div class="iter-head trans">🔄 Transition Iteration</div><div class="iter-body">Iterating within Phases E and F to plan multiple transition architectures. Rather than one massive transition, each E/F iteration plans one coherent transition step in detail.</div></div>
  <div class="iter-card"><div class="iter-head cap">🔄 Capability Iteration</div><div class="iter-body">Multiple simultaneous or sequential ADM cycles at different scopes — enterprise-level and business-unit level simultaneously. Each feeds into the others through the Architecture Repository.</div></div>
</div>
<div class="callout teal"><div class="callout-label">Scope flexibility</div><p>Not every cycle covers all BDAT domains. An iteration focused on a platform refresh might only touch Phase D. A business transformation might focus on Phase B. The ADM adapts to the need.</p></div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>Three patterns:</strong> Architecture (full cycle), Transition (within E/F), Capability (multiple scoped cycles). Iteration is a design feature — not a workaround.</div></div>`,
voice:`The ADM supports three iteration patterns. Architecture Iteration repeats the full ADM cycle — completing Phases B through H, then returning to Phase A for the next engagement. This is the standard pattern for enterprises with an ongoing architecture practice. Transition Iteration iterates within Phases E and F to plan multiple transition architectures — instead of one massive transformation plan, each iteration plans one transition step in detail. Capability Iteration runs multiple simultaneous ADM cycles at different scopes — one at enterprise level and separate cycles for business units or specific capabilities, all feeding into each other through the Architecture Repository. Not every cycle needs to cover all BDAT domains — the ADM adapts to what's actually needed.`},

{type:"section",bg:"blue",
html:`<div class="section-num">02</div><div class="section-label">Section Two</div><h2 class="section-h">Security Architecture in the ADM</h2><p class="section-desc">Security is not a Phase D afterthought — it's woven into every phase.</p>`,
voice:`Section two: Security Architecture in the ADM. The most important thing to know: security is a cross-cutting concern, not a technology domain.`},

{type:"content",
html:`<div class="content-label">Cross-cutting concern</div><h2 class="content-h">Security Through Every Phase</h2>
<div class="callout blue"><div class="callout-label">Core principle</div><p>Security is <strong>integrated throughout the ADM</strong> — not added at the end. Every phase has security considerations. Treating security as a Phase D technology concern is one of the most common architecture mistakes.</p></div>
<div class="sec-grid">
  <div class="sec-card"><div class="sec-phase">Phase A — Vision</div><div class="sec-desc">Security stakeholders identified. Regulatory constraints (GDPR, PCI-DSS) captured as requirements.</div></div>
  <div class="sec-card"><div class="sec-phase">Phase B — Business</div><div class="sec-desc">Business security policies defined. Access control principles. Governance controls.</div></div>
  <div class="sec-card"><div class="sec-phase">Phase C — IS</div><div class="sec-desc">Data classification applied. Application security controls — auth, encryption, audit logging.</div></div>
  <div class="sec-card"><div class="sec-phase">Phase D — Technology</div><div class="sec-desc">Security platform services — identity management, PKI, SIEM, network security.</div></div>
  <div class="sec-card"><div class="sec-phase">Phase G — Governance</div><div class="sec-desc">Security conformance in contracts. Compliance reviews. Pen testing as milestone gate.</div></div>
  <div class="sec-card"><div class="sec-phase">Phase H — Change</div><div class="sec-desc">New security threats assessed as change drivers. Security architecture updated accordingly.</div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text">Security spans <strong>Business (policies) → IS (data classification, app controls) → Technology (platform services)</strong>. Never just Phase D. The exam tests this.</div></div>`,
voice:`Security must be integrated throughout the ADM — not bolted on at the end. Every phase has specific security activities. Phase A: identify security stakeholders and capture regulatory constraints like GDPR and PCI-DSS. Phase B: define business security policies, access control principles, and governance controls. Phase C: apply data classification to data entities and specify application security controls — authentication, encryption, audit logging. Phase D: specify the security services in the Application Platform — identity management, PKI, SIEM, network security. Phase G: include security conformance requirements in Architecture Contracts and conduct security reviews at milestone gates. Phase H: assess new security threats as change drivers. The exam frequently presents security as a Phase D concern only. That is wrong. Security spans Business architecture, Information Systems architecture, and Technology architecture.`},

{type:"section",bg:"purple",
html:`<div class="section-num">03</div><div class="section-label">Section Three</div><h2 class="section-h">SOA in the ADM</h2><p class="section-desc">Service-Oriented Architecture — how it fits into the TOGAF framework.</p>`,
voice:`Section three: SOA in the ADM. Service-Oriented Architecture is explicitly supported by TOGAF as a design approach.`},

{type:"content",
html:`<div class="content-label">Services in TOGAF</div><h2 class="content-h">SOA Concepts</h2>
<div class="callout purple"><div class="callout-label">Where SOA lives</div><p>SOA is primarily addressed in <strong>Phase C — Application Architecture</strong>. Applications are designed as reusable services with defined interfaces. SOA aligns with the Enterprise Continuum through services as ABBs and SBBs.</p></div>
<div class="soa-list">
  <div class="soa-item"><div class="soa-term">Service</div><div class="soa-desc">A discrete, reusable business capability exposed through a well-defined interface. Can be independently deployed and discovered.</div></div>
  <div class="soa-item"><div class="soa-term">Service Contract</div><div class="soa-desc">The formal specification of a service — what it accepts, returns, and guarantees. The application-level equivalent of an Architecture Contract.</div></div>
  <div class="soa-item"><div class="soa-term">Loose Coupling</div><div class="soa-desc">Services communicate through interfaces without internal dependencies. Enables independent change and reduces cascade failures.</div></div>
  <div class="soa-item"><div class="soa-term">Service Reuse</div><div class="soa-desc">A service built for one function consumed by multiple others. Directly supports Enterprise Continuum reusability goals.</div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text">SOA is primarily addressed in <strong>Phase C</strong>. Services become ABBs and SBBs in the Enterprise Continuum. If asked which phase SOA applies to — <strong>Phase C</strong>.</div></div>`,
voice:`SOA is explicitly supported by TOGAF and is primarily addressed in Phase C — Application Architecture. Four core SOA concepts matter for TOGAF. A Service is a discrete, reusable business capability exposed through a well-defined interface — independently deployable and discoverable. A Service Contract formally specifies a service's interface — what it accepts, what it returns, and what quality it guarantees. It's the application-level equivalent of an Architecture Contract. Loose Coupling means services communicate through interfaces without internal dependencies, enabling independent change. And Service Reuse means a service built for one business function can be consumed by multiple others — directly supporting the Enterprise Continuum's reusability goals. SOA services become Architecture Building Blocks and Solution Building Blocks in the Enterprise Continuum. For the exam: SOA is primarily Phase C.`},

{type:"section",bg:"green",
html:`<div class="section-num">04</div><div class="section-label">Section Four</div><h2 class="section-h">Business Transformation Readiness Assessment</h2><p class="section-desc">Eight dimensions that determine whether an organisation can actually execute its transformation.</p>`,
voice:`Section four: the Business Transformation Readiness Assessment. Even the best architecture fails if the organisation isn't ready to change.`},

{type:"content",
html:`<div class="content-label">Eight readiness dimensions</div><h2 class="content-h">Is the Organisation Ready?</h2>
<div class="callout green"><div class="callout-label">Used in Phases A and E</div><p>Phase A: informs scope and constraints of the Architecture Vision. Phase E: readiness gaps become explicit <strong>work packages</strong> in the implementation plan.</p></div>
<div class="ready-grid">
  <div class="ready-card"><div class="ready-name">Vision</div><div class="ready-desc">Clear, compelling, shared picture of the target state?</div></div>
  <div class="ready-card"><div class="ready-name">Desire &amp; Will</div><div class="ready-desc">Genuine desire and political will from key leaders?</div></div>
  <div class="ready-card"><div class="ready-name">Need</div><div class="ready-desc">Recognised urgent business need — not comfortable status quo?</div></div>
  <div class="ready-card"><div class="ready-name">Funding</div><div class="ready-desc">Committed, sustained funding for the full programme?</div></div>
  <div class="ready-card"><div class="ready-name">Ability</div><div class="ready-desc">Skills, capabilities, and capacity to deliver?</div></div>
  <div class="ready-card"><div class="ready-name">Governance</div><div class="ready-desc">Effective structures for decisions, escalations, accountability?</div></div>
  <div class="ready-card"><div class="ready-name">Enterprise Capacity</div><div class="ready-desc">Can the org transform while keeping operations running?</div></div>
  <div class="ready-card"><div class="ready-name">HR Readiness</div><div class="ready-desc">Staffing, training, change management plans in place?</div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text">Used in <strong>Phase A</strong> (scope/constraints) and <strong>Phase E</strong> (readiness gaps become work packages). Know all 8 dimensions.</div></div>`,
voice:`The Business Transformation Readiness Assessment evaluates eight dimensions. Vision — is there a clear, compelling, shared picture of where the transformation is going? Desire and Will — do key leaders genuinely want this and have the political will to drive it? Need — is there a recognised, urgent business need, or are people comfortable with the status quo? Funding — is there committed, sustained funding for the full programme? Ability — does the organisation have the skills, capabilities, and capacity to actually deliver? Governance — are there effective structures for decisions, escalations, and accountability? Enterprise Capacity — can the organisation transform while keeping normal operations running? And HR Readiness — are staffing, training, and change management plans in place? This assessment is used in Phase A to inform scope and constraints, and in Phase E where readiness gaps become explicit work packages.`},

{type:"section",bg:"amber",
html:`<div class="section-num">05</div><div class="section-label">Section Five</div><h2 class="section-h">Risk Management in TOGAF</h2><p class="section-desc">Four mitigation options, two risk levels, and where risks are recorded.</p>`,
voice:`Section five: risk management in TOGAF. Risk runs throughout the ADM — and TOGAF provides a clear approach to handling it.`},

{type:"content",
html:`<div class="content-label">Four mitigation options</div><h2 class="content-h">Managing Architecture Risk</h2>
<div class="callout amber"><div class="callout-label">Two risk levels</div><p><strong>Initial risk</strong> — assessed before any mitigation is applied. <strong>Residual risk</strong> — what remains after mitigation controls are in place. Both are documented. Residual risks above threshold require escalation.</p></div>
<div class="risk-list">
  <div class="risk-row"><span class="risk-badge" style="background:rgba(251,113,133,.2);color:var(--coral)">Avoid</span><div class="risk-desc">Change the plan to eliminate the risk entirely. Best option when cost of avoidance is low relative to risk impact.</div></div>
  <div class="risk-row"><span class="risk-badge" style="background:var(--blue2);color:var(--blue)">Transfer</span><div class="risk-desc">Shift the risk to another party through insurance, contracts, or outsourcing. Risk doesn't disappear — it moves.</div></div>
  <div class="risk-row"><span class="risk-badge" style="background:var(--amber2);color:var(--amber)">Mitigate</span><div class="risk-desc">Reduce likelihood or impact through controls, safeguards, or contingency plans. Most common approach.</div></div>
  <div class="risk-row"><span class="risk-badge" style="background:var(--green2);color:var(--green)">Accept</span><div class="risk-desc">Formally acknowledge and monitor the risk. Used when cost of mitigation exceeds impact, or risk is unavoidable.</div></div>
</div>
<div class="callout teal"><div class="callout-label">Where risks are recorded</div><p>All accepted and transferred risks are recorded in the <strong>Governance Log</strong> within the Architecture Repository — creating an audit trail visible to the Architecture Board.</p></div>
<div class="sum-grid">
  <div class="sum-card"><div class="sum-num">01</div><div class="sum-text"><strong>3 iteration patterns</strong> — Architecture, Transition, Capability. Deliberate design feature.</div></div>
  <div class="sum-card"><div class="sum-num">02</div><div class="sum-text"><strong>Security is cross-cutting</strong> — every phase from A to H. Not just Phase D.</div></div>
  <div class="sum-card"><div class="sum-num">03</div><div class="sum-text"><strong>SOA = Phase C</strong> — services as reusable ABBs/SBBs. Loose coupling + service contracts.</div></div>
  <div class="sum-card"><div class="sum-num">04</div><div class="sum-text"><strong>Readiness = 8 dimensions</strong> — Phases A and E. Gaps become work packages.</div></div>
</div>`,
voice:`Risk management in TOGAF starts with two levels. Initial risk is assessed before any mitigation. Residual risk is what remains after controls are applied. Both are documented. Four mitigation options are available. Avoid — change the plan to eliminate the risk entirely, best when avoidance is cheaper than the impact. Transfer — shift the risk to another party through insurance, contracts, or outsourcing — the risk moves, it doesn't disappear. Mitigate — reduce likelihood or impact through controls and contingency plans, the most common approach. Accept — formally acknowledge and monitor the risk, used when mitigation cost exceeds the impact or the risk is unavoidable. All accepted and transferred risks are recorded in the Governance Log within the Architecture Repository, creating a visible audit trail for the Architecture Board. Four week-3 takeaways: three iteration patterns — Architecture, Transition, Capability. Security is cross-cutting across every phase. SOA is primarily Phase C. And the Readiness Assessment has 8 dimensions, used in Phases A and E.`},

html:`<div class="title-eyebrow">Day 12 Complete · Week 3 Done! 🎉</div><h1 class="title-h" style="font-size:clamp(22px,5.5vw,38px)">Guidelines &amp; Techniques — done.<br>Week 3 — done!</h1><div class="title-rule"></div><p class="title-sub" style="margin-bottom:24px">Week 4 covers the core TOGAF frameworks: <strong>Architecture Content Framework, Enterprise Continuum &amp; Repository, Architecture Capability, and Architecture Governance</strong>.</p>
<div style="display:flex;flex-direction:column;gap:10px;max-width:320px">

</div>`,
voice:`Congratulations — Day 12 done, Week 3 done! You've now covered the entire ADM from Phase A through Phase H, plus Requirements Management and the ADM's practical guidelines and techniques. That's the full process cycle of TOGAF complete. Take the Day 12 quiz to cement the week's learning. Week 4 moves into the core frameworks that underpin the ADM — the Architecture Content Framework, the Enterprise Continuum and Repository, Architecture Capability, and Architecture Governance. These are the structural foundations of TOGAF. See you in Week 4.`},

let cur=0,play=false,spdIdx=1,utt=null,tx=0,anim=false;
const SPDS=[0.8,1,1.2,1.5];
const wrap=document.getElementById("slides-wrap");
document.getElementById("slide-total").textContent=SLIDES.length;
function getBg(b){return{navy:"var(--navy2)",teal:"linear-gradient(135deg,#0A1F2F,#0D2A3A)",blue:"linear-gradient(135deg,#0A1525,#0D1F3A)",purple:"linear-gradient(135deg,#120E2A,#1A1235)",green:"linear-gradient(135deg,#0A1A10,#0D2218)",amber:"linear-gradient(135deg,#1A1000,#251800)",coral:"linear-gradient(135deg,#1A0A0E,#2A0D15)",end:"linear-gradient(135deg,#080E1A,#0D1526 60%,#152035)"}[b]||"var(--navy2)";}
SLIDES.forEach((s,i)=>{const d=document.createElement("div");d.className="slide slide-"+(s.type||"content");d.id="s"+i;d.style.background=getBg(s.bg);d.innerHTML=`<div class="slide-body">${s.html}</div>`;if(i===0)d.classList.add("active");wrap.appendChild(d);});
function goTo(i,dir){if(anim||i<0||i>=SLIDES.length)return;anim=true;stopSp();const f=document.getElementById("s"+cur),t=document.getElementById("s"+i);f.classList.remove("active");t.classList.add("active");f.classList.add(dir>0?"exit-left":"exit-right");t.classList.add(dir>0?"enter-right":"enter-left");t.querySelector(".slide-body").scrollTop=0;setTimeout(()=>{f.classList.remove("exit-left","exit-right","active");t.classList.remove("enter-right","enter-left");anim=false;cur=i;upUI();if(play)spk();},420);}
function nextSlide(){if(cur<SLIDES.length-1)goTo(cur+1,1);}
function prevSlide(){if(cur>0)goTo(cur-1,-1);}
function upUI(){document.getElementById("slide-num").textContent=cur+1;document.getElementById("progress-fill").style.width=((cur+1)/SLIDES.length*100)+"%";document.getElementById("btn-prev").disabled=cur===0;document.getElementById("btn-next").disabled=cur===SLIDES.length-1;}
function spk(){stopSp();if(!("speechSynthesis"in window))return;const txt=SLIDES[cur].voice;if(!txt){if(play)setTimeout(nextSlide,800);return;}utt=new SpeechSynthesisUtterance(txt);utt.rate=SPDS[spdIdx];utt.lang="en-GB";const vs=speechSynthesis.getVoices();const p=vs.find(v=>v.lang.startsWith("en")&&(v.name.includes("Daniel")||v.name.includes("Samantha")||v.name.includes("Karen")||v.name.includes("Google UK")))||vs.find(v=>v.lang.startsWith("en"))||vs[0];if(p)utt.voice=p;utt.onstart=()=>setSt("speaking");utt.onend=()=>{setSt("");if(play&&cur<SLIDES.length-1)setTimeout(nextSlide,600);else if(cur===SLIDES.length-1){play=false;upPlay();}};utt.onerror=()=>setSt("");speechSynthesis.speak(utt);}
function stopSp(){if("speechSynthesis"in window)speechSynthesis.cancel();utt=null;setSt("");}
function togglePlay(){play=!play;upPlay();if(play)spk();else stopSp();}
function upPlay(){document.getElementById("play-icon").innerHTML=play?'<rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor"/><rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M4 3l11 6-11 6V3z"/>';}
function setSt(s){const el=document.getElementById("voice-status");el.innerHTML=s==="speaking"?`<div class="voice-dots"><div class="voice-dot"></div><div class="voice-dot"></div><div class="voice-dot"></div></div><span>Narrating…</span>`:s||"";}
function cycleSpeed(){spdIdx=(spdIdx+1)%SPDS.length;document.getElementById("speed-btn").textContent=SPDS[spdIdx]+"×";if(play){stopSp();setTimeout(spk,100);}}
function markDone(){try{const d=JSON.parse(localStorage.getItem("togaf_done")||"{}");d[12]=true;localStorage.setItem("togaf_done",JSON.stringify(d));}catch(e){}const b=document.getElementById("btn-done");b.style.background="var(--teal3)";b.style.borderColor="var(--teal)";b.querySelector("svg").style.stroke="var(--teal)";goTo(SLIDES.length-1,1);}
document.getElementById("start-btn").addEventListener("click",()=>{document.getElementById("start-overlay").style.display="none";document.getElementById("deck").style.display="flex";upUI();if("speechSynthesis"in window){const p=new SpeechSynthesisUtterance(" ");p.volume=0;speechSynthesis.speak(p);setTimeout(()=>{play=true;upPlay();spk();},400);}});
wrap.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown")nextSlide();if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevSlide();if(e.key===" "){e.preventDefault();togglePlay();}});
if("speechSynthesis"in window)speechSynthesis.onvoiceschanged=()=>{};
</script>
