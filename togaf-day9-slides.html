<script>
const SLIDES=[
{type:"title",bg:"navy",
html:`<div class="title-eyebrow">TOGAF Foundation · Day 9 of 20</div><h1 class="title-h">Phase G:<br>Implementation Governance</h1><div class="title-rule"></div><p class="title-sub">Week 3 starts with governance. Phase G is the architecture team's role during delivery — not building, but ensuring what gets built matches what was designed.</p><div class="title-tags"><span class="title-tag">📊 5 topics</span><span class="title-tag">🎙 Narrated</span><span class="title-tag">⚖ Week 3</span></div>`,
voice:`Welcome to Day 9 and Week 3. This week we shift into governance territory. Today is Phase G — Implementation Governance. After Phase F's approved plan, the delivery teams start building. Phase G is the architecture team's role during that period — not managing projects, but providing governance oversight to ensure what's being built actually matches what was designed. We'll cover Phase G's objective, Architecture Contracts, the conformance versus compliance distinction, the compliance review process, and the complete inputs and outputs. Let's begin.`},

{type:"section",bg:"green",
html:`<div class="section-num">01</div><div class="section-label">Section One</div><h2 class="section-h">Phase G Objective &amp; Role</h2><p class="section-desc">The architecture team transitions from designers to governance authorities.</p>`,
voice:`Section one: the objective and role of Phase G. This is a fundamental change in what the architecture team does.`},

{type:"content",
html:`<div class="content-label">The governance shift</div><h2 class="content-h">What Phase G Does</h2>
<div class="callout teal"><div class="callout-label">Objective</div><p>Phase G ensures that <strong>implementation projects deliver architecture conformance</strong> — what gets built matches the Target Architecture designed in Phases B–D and planned in E–F. It provides ongoing oversight throughout delivery.</p></div>
<div class="bullet-list">
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Phases B–F:</strong> architects were designers and planners</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Phase G:</strong> architects become <em>governance authorities</em> — reviewing, checking, raising issues</div></div>
  <div class="bullet"><div class="bullet-dot" style="background:var(--coral)"></div><div class="bullet-text"><strong>NOT project management</strong> — that's the delivery team's job</div></div>
  <div class="bullet"><div class="bullet-dot" style="background:var(--coral)"></div><div class="bullet-text"><strong>NOT technical QA</strong> — that's testing and quality assurance</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Architecture conformance oversight</strong> — ensuring implementations stay true to the approved design</div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>Exam tip:</strong> Phase G is the first governance phase. It covers the <em>delivery period</em>. Phase H handles changes <em>after</em> delivery. Architecture Board plays the central role.</div></div>`,
voice:`Phase G provides architecture conformance oversight throughout the delivery programme. In Phases B through F, the architecture team were designers and planners. In Phase G they become governance authorities — reviewing what delivery teams are building, checking it against the architecture contracts, and raising issues when implementations diverge from the approved design. Phase G is not project management — that's the delivery programme's job. It's not technical quality assurance either. It is specifically architecture conformance oversight. The Architecture Board plays the central governance role.`},

{type:"section",bg:"green",
html:`<div class="section-num">02</div><div class="section-label">Section Two</div><h2 class="section-h">Architecture Contracts</h2><p class="section-desc">The formal handshake between architecture team and delivery teams — drafted in Phase F, enforced in Phase G.</p>`,
voice:`Section two: Architecture Contracts. These are the foundational tool of Phase G.`},

{type:"content",
html:`<div class="content-label">The contract tool</div><h2 class="content-h">What Architecture Contracts Contain</h2>
<div class="callout green"><div class="callout-label">Definition</div><p>An <strong>Architecture Contract</strong> is a joint agreement between development partners and sponsors on the deliverables, quality, and fitness-for-purpose of an architecture. Drafted in Phase F, activated in Phase G.</p></div>
<div class="contract-list">
  <div class="contract-row">Scope of the work to be performed</div>
  <div class="contract-row">Architecture requirements the deliverable must meet</div>
  <div class="contract-row">Standards and guidelines that must be followed</div>
  <div class="contract-row">Acceptance criteria — how conformance will be verified</div>
  <div class="contract-row">Governance and reporting arrangements</div>
  <div class="contract-row">Escalation procedures for non-conformances</div>
  <div class="contract-row">Any approved dispensations from architecture requirements</div>
</div>
<div class="callout purple"><div class="callout-label">Two contract types</div><p><strong>Development Partner contracts</strong> — govern suppliers or internal teams implementing components. <strong>Business User contracts</strong> — govern business units that will operate the architecture.</p></div>`,
voice:`An Architecture Contract is a joint agreement between development partners and sponsors on what gets delivered, its quality, and its fitness-for-purpose. Contracts are drafted in Phase F and activated in Phase G. They contain: the scope of the work, the architecture requirements the deliverable must meet, the standards and guidelines to follow, the acceptance criteria defining how conformance will be verified, governance and reporting arrangements, escalation procedures for non-conformances, and any approved dispensations. TOGAF identifies two contract types: Development Partner contracts governing teams implementing architecture components, and Business User contracts governing the business units that will operate the implemented architecture.`},

{type:"content",
html:`<div class="content-label">Contract enforcement</div><h2 class="content-h">Dispensations &amp; Non-Conformances</h2>
<div class="callout amber"><div class="callout-label">When full conformance can't be achieved</div><p>When a delivery team cannot meet a contract requirement — due to technical constraints, cost, or changed circumstances — they submit a request for a <strong>dispensation</strong>: a formal exception approved by the Architecture Board.</p></div>
<div class="bullet-list">
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Dispensation</strong> — formal, board-approved exception to a contract requirement. Documented in Architecture Repository.</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>Non-conformance with dispensation</strong> — acceptable, governance record maintained</div></div>
  <div class="bullet"><div class="bullet-dot" style="background:var(--coral)"></div><div class="bullet-text"><strong>Non-conformance without dispensation</strong> — a governance issue requiring escalation and remediation</div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>Contracts drafted Phase F → enforced Phase G.</strong> A <strong>dispensation</strong> = formally approved exception when full conformance cannot be achieved.</div></div>`,
voice:`When a delivery team can't meet a contract requirement, they submit a request for a dispensation — a formal exception approved by the Architecture Board. A dispensation is an accepted departure from the architecture requirement, documented in the Architecture Repository. Non-conformance with an approved dispensation is acceptable. Non-conformance without a dispensation is a governance issue requiring escalation. For the exam: contracts are drafted in Phase F and enforced in Phase G. A dispensation is a formally approved exception — not the same as ignoring the requirement.`},

{type:"section",bg:"blue",
html:`<div class="section-num">03</div><div class="section-label">Section Three</div><h2 class="section-h">Conformance vs Compliance</h2><p class="section-desc">Two terms that look similar but mean very different things. Getting them right matters.</p>`,
voice:`Section three: the conformance versus compliance distinction. This is a classic TOGAF exam trap.`},

{type:"content",
html:`<div class="content-label">Critical distinction</div><h2 class="content-h">Two Different Checks</h2>
<div class="compare-grid">
  <div class="compare-box"><div class="compare-head conf">Architecture Conformance</div><div class="compare-body"><strong style="color:var(--teal)">Matching the architecture design.</strong><br><br>Does the implementation match the Architecture Definition Document and Architecture Contracts?<br><br>Checked by: architecture team / Architecture Board.</div></div>
  <div class="compare-box"><div class="compare-head comp">Architecture Compliance</div><div class="compare-body"><strong style="color:var(--blue)">Meeting external standards.</strong><br><br>Does the implementation meet external regulations, legal requirements, and organisational policies?<br><br>Checked by: compliance function, legal, audit.</div></div>
</div>
<div class="callout teal"><div class="callout-label">Why it matters</div><p>An implementation can be architecturally <em>conformant</em> but not <em>compliant</em> — it matches the design but violates GDPR. Conversely, it can be <em>compliant</em> but <em>non-conformant</em> — it meets regulations but deviates from the architecture. <strong>Phase G checks conformance. Compliance is a separate organisational function.</strong></p></div>`,
voice:`Here's the critical distinction. Architecture Conformance means matching the architecture design — does the implementation match the Architecture Definition Document and Architecture Contracts? This is checked by the architecture team and the Architecture Board. Architecture Compliance means meeting external standards — does the implementation meet external regulations, legal requirements, and organisational policies? This is checked by the compliance function, legal teams, and audit. An implementation can be conformant but not compliant — it matches the design but violates GDPR. It can also be compliant but non-conformant — it meets regulations but deviates from the architecture. Phase G checks conformance. Compliance is separate.`},

{type:"content",
html:`<div class="content-label">Conformance levels</div><h2 class="content-h">Degrees of Conformance</h2>
<div class="level-list">
  <div class="level-row"><span class="level-badge" style="background:var(--teal3);color:var(--teal)">Fully</span><span class="level-desc">Meets all architecture requirements. Ideal outcome.</span></div>
  <div class="level-row"><span class="level-badge" style="background:var(--blue2);color:var(--blue)">Partially</span><span class="level-desc">Meets most requirements, with approved exceptions. Acceptable with documented dispensations.</span></div>
  <div class="level-row"><span class="level-badge" style="background:var(--amber2);color:var(--amber)">Dispensation</span><span class="level-desc">Formally approved departure from architecture requirements. Architecture Board sign-off required.</span></div>
  <div class="level-row"><span class="level-badge" style="background:var(--coral2);color:var(--coral)">Non-conformant</span><span class="level-desc">Departs from architecture without dispensation. Governance issue — must be escalated and resolved.</span></div>
</div>
<div class="callout gold"><div class="callout-label">Not applicable</div><p>Some requirements may be rated <strong>Not Applicable</strong> to a specific implementation — the Architecture Board must confirm this classification.</p></div>`,
voice:`TOGAF recognises four degrees of architectural conformance. Fully conformant — the implementation meets all architecture requirements. This is the ideal. Partially conformant — meets most requirements with approved exceptions documented as dispensations. Non-conformant with dispensation — the Architecture Board has formally approved the departure. And non-conformant without dispensation — this is a governance issue that must be escalated and resolved. Some requirements may also be classified as Not Applicable to a specific implementation, but this must be confirmed by the Architecture Board.`},

{type:"section",bg:"purple",
html:`<div class="section-num">04</div><div class="section-label">Section Four</div><h2 class="section-h">Architecture Compliance Review</h2><p class="section-desc">The structured review process that checks implementations against architecture contracts.</p>`,
voice:`Section four: the Architecture Compliance Review process. This is the primary Phase G mechanism for checking conformance.`},

{type:"content",
html:`<div class="content-label">Five-step process</div><h2 class="content-h">How Reviews Work</h2>
<div class="callout purple"><div class="callout-label">Definition</div><p>A <strong>scrutiny of the compliance of a specific project against established architectural criteria</strong> — assessing conformance to the Architecture Contract and the Architecture Definition Document.</p></div>
<div class="step-list">
  <div class="step-row"><div class="step-num">1</div><div class="step-content"><div class="step-title">Schedule the review</div><div class="step-desc">At key delivery milestones defined in the Architecture Contract.</div></div></div>
  <div class="step-row"><div class="step-num">2</div><div class="step-content"><div class="step-title">Prepare review materials</div><div class="step-desc">Delivery team provides design specs, test evidence, deviation logs. Architecture team prepares compliance checklist.</div></div></div>
  <div class="step-row"><div class="step-num">3</div><div class="step-content"><div class="step-title">Conduct the review</div><div class="step-desc">Architecture team assesses implementation against Architecture Contract and Architecture Definition Document.</div></div></div>
  <div class="step-row"><div class="step-num">4</div><div class="step-content"><div class="step-title">Document findings</div><div class="step-desc">Produce Compliance Assessment — rating each requirement conformant, partial, non-conformant, or N/A.</div></div></div>
  <div class="step-row"><div class="step-num">5</div><div class="step-content"><div class="step-title">Escalate and resolve</div><div class="step-desc">Non-conformances → Architecture Board → remediation, dispensation, or sponsor decision.</div></div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text">Primary Phase G activity = <strong>Architecture Compliance Review</strong>. Primary output = <strong>Compliance Assessment</strong>. Significant non-conformances → <strong>Phase H</strong> via Change Request.</div></div>`,
voice:`The Architecture Compliance Review is the primary Phase G activity. It's a structured scrutiny of a project against established architectural criteria. Five steps. First: schedule the review at key delivery milestones defined in the contract. Second: prepare materials — the delivery team provides design specs and test evidence, the architecture team prepares the compliance checklist. Third: conduct the review, assessing the implementation against the Architecture Contract and Architecture Definition Document. Fourth: document findings in a Compliance Assessment, rating each requirement. Fifth: escalate non-conformances to the Architecture Board for decisions on remediation, dispensation, or escalation to the sponsor. For the exam: primary Phase G activity is the Architecture Compliance Review. Primary output is the Compliance Assessment. Significant non-conformances feed into Phase H via Change Requests.`},

{type:"section",bg:"teal",
html:`<div class="section-num">05</div><div class="section-label">Section Five</div><h2 class="section-h">Inputs, Outputs &amp; Phase G→H Link</h2><p class="section-desc">The complete picture and how Phase G connects to Phase H.</p>`,
voice:`Section five: Phase G inputs, outputs, and the critical link to Phase H.`},

{type:"content",
html:`<div class="content-label">Complete picture</div><h2 class="content-h">IO &amp; Summary</h2>
<div class="io-grid">
  <div class="io-box"><div class="io-hd in">Key Inputs</div><ul class="io-ul"><li><strong style="color:var(--blue)">Migration Plan (Phase F) ★</strong></li><li><strong style="color:var(--blue)">Architecture Contracts (Phase F) ★</strong></li><li>Architecture Definition Document</li><li>Architecture Vision and Principles</li><li>Governance framework</li></ul></div>
  <div class="io-box"><div class="io-hd out">Key Outputs</div><ul class="io-ul"><li><strong style="color:var(--teal)">Compliance Assessments ★</strong></li><li><strong style="color:var(--teal)">Change Requests (→ Phase H) ★</strong></li><li>Signed Architecture Contracts</li><li>Updated Architecture Repository</li><li>Architecture-compliant systems</li></ul></div>
</div>
<div class="callout amber"><div class="callout-label">Phase G → Phase H</div><p>When a compliance review finds a significant non-conformance or a delivery team proposes a change, Phase G raises a <strong>Change Request</strong> → feeds Phase H (Architecture Change Management) → which decides: update architecture, grant dispensation, or require remediation.</p></div>
<div class="sum-grid">
  <div class="sum-card"><div class="sum-num">01</div><div class="sum-text"><strong>Phase G = governance during delivery</strong> — architecture conformance oversight, not project management.</div></div>
  <div class="sum-card"><div class="sum-num">02</div><div class="sum-text"><strong>Architecture Contracts</strong> — drafted Phase F, enforced Phase G. Dispensation = approved exception.</div></div>
  <div class="sum-card"><div class="sum-num">03</div><div class="sum-text"><strong>Conformance ≠ Compliance</strong> — Phase G checks conformance. Compliance is external standards.</div></div>
  <div class="sum-card"><div class="sum-num">04</div><div class="sum-text"><strong>Compliance Review → Assessment</strong> — non-conformances → Architecture Board → Change Request → Phase H.</div></div>
</div>`,
voice:`Here's the complete Phase G picture. Primary inputs: the Implementation and Migration Plan from Phase F and the Architecture Contracts drafted in Phase F. Primary outputs: Compliance Assessments — the formal records of each review — and Change Requests that feed into Phase H when non-conformances require architecture-level decisions. Phase G and Phase H work as a governance pair: Phase G monitors during delivery, Phase H responds to deviations. The key linkage is the Change Request — Phase G produces it, Phase H processes it. Four key takeaways: Phase G is governance during delivery. Architecture Contracts are drafted in Phase F and enforced in Phase G. Conformance is about matching the design; compliance is about external standards. And compliance reviews produce assessments, with non-conformances escalating to Phase H.`},

{type:"title",bg:"end",
html:`<div class="title-eyebrow">Day 9 Complete</div><h1 class="title-h" style="font-size:clamp(24px,6vw,40px)">Phase G — done.</h1><div class="title-rule"></div><p class="title-sub" style="margin-bottom:24px">Next up: <strong>Day 10 — Phase H: Architecture Change Management</strong>. What happens when the architecture needs to change during or after delivery?</p>
<div style="display:flex;flex-direction:column;gap:10px;max-width:320px">
  <a href="togaf-day9.html" style="display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--teal3);border:1px solid rgba(45,212,191,.25);border-radius:10px;text-decoration:none;color:var(--teal);font-size:14px;font-weight:500"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h10"/></svg>Reading version · Take the quiz</a>
  <button onclick="markDone()" style="display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--teal);border:none;border-radius:10px;color:var(--navy);font-size:14px;font-weight:600;cursor:pointer;justify-content:center"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2.5 8.5l4 4 7-8"/></svg>Mark Day 9 as done</button>
</div>`,
voice:`Day 9 complete. Phase G is the architecture team's governance role during delivery — checking that implementations conform to the approved architecture via Architecture Contracts and Compliance Reviews, and raising Change Requests when they don't. Take the quiz on the reading version. Day 10 is Phase H — Architecture Change Management — which handles what happens when the architecture itself needs to change in response to delivery discoveries, business evolution, or technology changes. See you there.`},
];

let cur=0,play=false,spdIdx=1,utt=null,tx=0,anim=false;
const SPDS=[0.8,1,1.2,1.5];
const wrap=document.getElementById("slides-wrap");
document.getElementById("slide-total").textContent=SLIDES.length;
function getBg(b){return{navy:"var(--navy2)",green:"linear-gradient(135deg,#0A1A10,#0D2218)",blue:"linear-gradient(135deg,#0A1525,#0D1F3A)",teal:"linear-gradient(135deg,#0A1F2F,#0D2A3A)",purple:"linear-gradient(135deg,#120E2A,#1A1235)",coral:"linear-gradient(135deg,#1A0A0E,#2A0D15)",amber:"linear-gradient(135deg,#1A1000,#251800)",end:"linear-gradient(135deg,#080E1A,#0D1526 60%,#152035)"}[b]||"var(--navy2)";}
SLIDES.forEach((s,i)=>{const d=document.createElement("div");d.className="slide slide-"+(s.type||"content");d.id="s"+i;d.style.background=getBg(s.bg);d.innerHTML=`<div class="slide-body">${s.html}</div>`;if(i===0)d.classList.add("active");wrap.appendChild(d);});
function goTo(i,dir){if(anim||i<0||i>=SLIDES.length)return;anim=true;stopSp();const f=document.getElementById("s"+cur),t=document.getElementById("s"+i);f.classList.remove("active");t.classList.add("active");f.classList.add(dir>0?"exit-left":"exit-right");t.classList.add(dir>0?"enter-right":"enter-left");t.querySelector(".slide-body").scrollTop=0;setTimeout(()=>{f.classList.remove("exit-left","exit-right","active");t.classList.remove("enter-right","enter-left");anim=false;cur=i;upUI();if(play)spk();},420);}
function nextSlide(){if(cur<SLIDES.length-1)goTo(cur+1,1);}
function prevSlide(){if(cur>0)goTo(cur-1,-1);}
function upUI(){document.getElementById("slide-num").textContent=cur+1;document.getElementById("progress-fill").style.width=((cur+1)/SLIDES.length*100)+"%";document.getElementById("btn-prev").disabled=cur===0;document.getElementById("btn-next").disabled=cur===SLIDES.length-1;}
function spk(){stopSp();if(!("speechSynthesis"in window))return;const txt=SLIDES[cur].voice;if(!txt){if(play)setTimeout(nextSlide,800);return;}utt=new SpeechSynthesisUtterance(txt);utt.rate=SPDS[spdIdx];utt.lang="en-GB";const vs=speechSynthesis.getVoices();const p=vs.find(v=>v.lang.startsWith("en")&&(v.name.includes("Daniel")||v.name.includes("Samantha")||v.name.includes("Karen")||v.name.includes("Google UK")))||vs.find(v=>v.lang.startsWith("en"))||vs[0];if(p)utt.voice=p;utt.onstart=()=>setSt("speaking");utt.onend=()=>{setSt("");if(play&&cur<SLIDES.length-1)setTimeout(nextSlide,600);else if(cur===SLIDES.length-1){play=false;upPlay();}};utt.onerror=()=>setSt("");speechSynthesis.speak(utt);}
function stopSp(){if("speechSynthesis"in window)speechSynthesis.cancel();utt=null;setSt("");}
function togglePlay(){play=!play;upPlay();if(play)spk();else stopSp();}
function upPlay(){document.getElementById("play-icon").innerHTML=play?'<rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor"/><rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M4 3l11 6-11 6V3z"/>';}
function setSt(s){const el=document.getElementById("voice-status");el.innerHTML=s==="speaking"?`<div class="voice-dots"><div class="voice-dot"></div><div class="voice-dot"></div><div class="voice-dot"></div></div><span>Narrating…</span>`:s||"";}
function cycleSpeed(){spdIdx=(spdIdx+1)%SPDS.length;document.getElementById("speed-btn").textContent=SPDS[spdIdx]+"×";if(play){stopSp();setTimeout(spk,100);}}
function markDone(){try{const d=JSON.parse(localStorage.getItem("togaf_done")||"{}");d[9]=true;localStorage.setItem("togaf_done",JSON.stringify(d));}catch(e){}const b=document.getElementById("btn-done");b.style.background="var(--teal3)";b.style.borderColor="var(--teal)";b.querySelector("svg").style.stroke="var(--teal)";goTo(SLIDES.length-1,1);}
document.getElementById("start-btn").addEventListener("click",()=>{document.getElementById("start-overlay").style.display="none";document.getElementById("deck").style.display="flex";upUI();if("speechSynthesis"in window){const p=new SpeechSynthesisUtterance(" ");p.volume=0;speechSynthesis.speak(p);setTimeout(()=>{play=true;upPlay();spk();},400);}});
wrap.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown")nextSlide();if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevSlide();if(e.key===" "){e.preventDefault();togglePlay();}});
if("speechSynthesis"in window)speechSynthesis.onvoiceschanged=()=>{};
</script>
