<script>
const SLIDES=[
{type:"title",bg:"navy",
html:`<div class="eyebrow">TOGAF Foundation · Day 18 of 20</div><h1 class="title-h">Reference Models:<br>TRM &amp; III-RM</h1><div class="title-rule"></div><p class="title-sub">TOGAF's two Foundation Architecture reference models — the Technical Reference Model and the Integrated Information Infrastructure Reference Model.</p><div class="title-tags"><span class="title-tag">📊 5 topics</span><span class="title-tag">🎙 Narrated</span><span class="title-tag">⭐ Week 5 · Day 2</span></div>`,
voice:`Welcome to Day 18 — Tuesday of Week 5. Today we cover TOGAF's two built-in reference models: the Technical Reference Model, known as the TRM, and the Integrated Information Infrastructure Reference Model, known as the III-RM. These are Foundation Architectures in the Enterprise Continuum — pre-built reference points that every enterprise can use as a starting point for their own architecture. Understanding both models is key for the TOGAF Foundation exam.`},

{type:"section",bg:"blue",
html:`<div class="sec-num">01</div><div class="sec-lbl">Section One</div><h2 class="sec-h">Technical Reference Model (TRM) Overview</h2><p class="sec-desc">What the TRM is, where it sits in the Enterprise Continuum, and why it matters.</p>`,
voice:`Section one: the Technical Reference Model overview. The TRM is TOGAF's most detailed built-in reference architecture.`},

{type:"content",
html:`<div class="clbl">The foundation model</div><h2 class="ch">Technical Reference Model</h2>
<div class="box blue"><div class="box-lbl">Definition</div><p>The <strong>Technical Reference Model (TRM)</strong> provides a fundamental taxonomy and set of generic platform service categories for describing an Application Platform. It is a <strong>Foundation Architecture</strong> in the Enterprise Continuum — the most generic, universally applicable starting point for technology architecture.</p></div>
<div class="blist">
  <div class="bi"><div class="bd"></div><div class="bt"><strong>Foundation Architecture</strong> — sits at the far left of the Enterprise Continuum, applicable to any enterprise, any industry</div></div>
  <div class="bi"><div class="bd"></div><div class="bt"><strong>Two-layer model</strong> — Application Software (what the business uses) sits on top of an Application Platform (the services that support it)</div></div>
  <div class="bi"><div class="bd"></div><div class="bt"><strong>Taxonomy</strong> — the TRM provides a standard vocabulary for describing and classifying platform services, enabling consistent communication across teams</div></div>
  <div class="bi"><div class="bd"></div><div class="bt"><strong>Primary use in Phase D</strong> — architects use the TRM taxonomy when designing or evaluating the Technology Architecture</div></div>
</div>
<div class="continuum-row">
  <div class="cont-box" style="background:var(--blue2)"><div class="cont-lbl" style="color:var(--blue)">Foundation</div><div class="cont-desc">TRM, III-RM — generic, universal</div></div>
  <div class="cont-box" style="background:var(--teal3)"><div class="cont-lbl" style="color:var(--teal)">Common Systems</div><div class="cont-desc">Reusable patterns across industries</div></div>
  <div class="cont-box" style="background:var(--purple2)"><div class="cont-lbl" style="color:var(--purple)">Industry</div><div class="cont-desc">Industry-specific architectures</div></div>
  <div class="cont-box" style="background:var(--amber2)"><div class="cont-lbl" style="color:var(--amber)">Organisation</div><div class="cont-desc">Enterprise-specific architectures</div></div>
</div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t">The TRM is a <strong>Foundation Architecture</strong> — the most generic level of the Enterprise Continuum. It is used primarily in <strong>Phase D (Technology Architecture)</strong> to describe and classify platform services.</div></div>`,
voice:`The Technical Reference Model provides a fundamental taxonomy and set of generic platform service categories for describing an Application Platform. Three things to know. First, it's a Foundation Architecture — sitting at the far left of the Enterprise Continuum, applicable to any enterprise in any industry. Second, it's a two-layer model: Application Software — what the business uses — sits on top of an Application Platform — the services that support it. Third, it provides a standard taxonomy — a shared vocabulary for describing and classifying platform services consistently across teams. The TRM sits at the Foundation level of the Enterprise Continuum: Foundation → Common Systems → Industry → Organisation-Specific. And its primary use is in Phase D, when architects design or evaluate the Technology Architecture.`},

{type:"section",bg:"teal",
html:`<div class="sec-num">02</div><div class="sec-lbl">Section Two</div><h2 class="sec-h">TRM Taxonomy &amp; Application Platform Services</h2><p class="sec-desc">The categories of services that make up the TRM's Application Platform.</p>`,
voice:`Section two: the TRM taxonomy. This is the detailed classification of platform services — the heart of the TRM.`},

{type:"content",
html:`<div class="clbl">The platform services</div><h2 class="ch">TRM Application Platform Taxonomy</h2>
<div class="box teal"><div class="box-lbl">The two layers</div><p>The TRM's <strong>Application Software</strong> layer is where business applications sit — the ERP, CRM, analytics, and custom applications. The <strong>Application Platform</strong> beneath it provides the infrastructure services that all applications use — communication, data, security, and operating environment.</p></div>
<div class="trm-diagram">
  <div class="trm-top"><div class="trm-top-lbl">Application Software</div><div class="trm-top-desc">Business applications, ERP, CRM, analytics, custom apps</div></div>
  <div class="trm-mid"><div class="trm-mid-lbl">Application Platform Interface (API)</div><div class="trm-mid-desc">The boundary between applications and platform services</div></div>
  <div class="trm-services">
    <div class="trm-svc">Data Interchange</div>
    <div class="trm-svc">Data Management</div>
    <div class="trm-svc">Data Interchange</div>
    <div class="trm-svc">Security</div>
    <div class="trm-svc">OS Services</div>
    <div class="trm-svc">Network Services</div>
    <div class="trm-svc">Location &amp; Directory</div>
    <div class="trm-svc">Transaction Processing</div>
    <div class="trm-svc">User Interface</div>
  </div>
</div>
<div class="blist">
  <div class="bi"><div class="bd"></div><div class="bt"><strong>Data Interchange services</strong> — data exchange, messaging, EDI between applications</div></div>
  <div class="bi"><div class="bd"></div><div class="bt"><strong>Data Management services</strong> — database management, data warehouse, file access</div></div>
  <div class="bi"><div class="bd"></div><div class="bt"><strong>Security services</strong> — identity management, access control, encryption, audit</div></div>
  <div class="bi"><div class="bd"></div><div class="bt"><strong>Network services</strong> — communications protocols, remote access, bandwidth management</div></div>
  <div class="bi"><div class="bd"></div><div class="bt"><strong>Location and Directory services</strong> — naming, directory services, geographic services</div></div>
</div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t">Know the <strong>two TRM layers</strong>: Application Software (top) and Application Platform (bottom). The Application Platform Interface separates them. Key service categories: Data Interchange, Data Management, Security, Network, OS, Location/Directory.</div></div>`,
voice:`The TRM has two layers separated by the Application Platform Interface. Above the API sits the Application Software layer — business applications, ERP, CRM, analytics, and custom applications. Below the API is the Application Platform — the infrastructure services all applications consume. The key platform service categories to know: Data Interchange services for data exchange, messaging, and EDI between applications. Data Management services for database management, data warehouse, and file access. Security services for identity management, access control, encryption, and audit. Network services for communications protocols and remote access. Operating system services for process management and memory. Location and directory services for naming and geographic services. And transaction processing and user interface services. For the exam: know the two layers — Application Software on top, Application Platform below, separated by the Application Platform Interface.`},

{type:"section",bg:"purple",
html:`<div class="sec-num">03</div><div class="sec-lbl">Section Three</div><h2 class="sec-h">Integrated Information Infrastructure Reference Model</h2><p class="sec-desc">The III-RM — TOGAF's second Foundation Architecture for networked, distributed environments.</p>`,
voice:`Section three: the III-RM. Where the TRM describes a single platform, the III-RM addresses how multiple systems communicate across an enterprise and beyond.`},

{type:"content",
html:`<div class="clbl">The second reference model</div><h2 class="ch">III-RM</h2>
<div class="box purple"><div class="box-lbl">Definition</div><p>The <strong>Integrated Information Infrastructure Reference Model (III-RM)</strong> is a Foundation Architecture that addresses the <strong>seamless flow of information</strong> across heterogeneous systems and organisations. It extends the TRM to the distributed, networked enterprise.</p></div>
<div class="iiirm-card"><div class="iiirm-title">Origins and purpose</div><div class="iiirm-desc">The III-RM originated from the Open Group's work on open distributed processing. Its primary purpose is to enable different systems, from different vendors, in different organisations, to share information without barriers — the concept of "boundaryless information flow."</div></div>
<div class="iiirm-card"><div class="iiirm-title">Three functional areas</div><div class="iiirm-desc"><strong style="color:var(--white2)">Brokerage services</strong> — find and connect information providers to consumers. Includes directories, traders, and registration services. <strong style="color:var(--white2)">Connectivity services</strong> — the communication infrastructure enabling systems to interoperate. <strong style="color:var(--white2)">Application platform services</strong> — extends the TRM platform services to the distributed context.</div></div>
<div class="iiirm-card"><div class="iiirm-title">Relationship to TRM</div><div class="iiirm-desc">The III-RM builds on the TRM — it uses TRM's Application Platform Services as a foundation and extends them for distributed, multi-vendor, cross-enterprise information sharing. Both are Foundation Architectures in the Enterprise Continuum.</div></div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t">III-RM = distributed information sharing across heterogeneous systems. <strong>TRM = single platform services. III-RM = cross-enterprise information flow.</strong> Both are Foundation Architectures. III-RM extends and builds on TRM.</div></div>`,
voice:`The III-RM — Integrated Information Infrastructure Reference Model — is the second Foundation Architecture in the Enterprise Continuum. Where the TRM describes the services within a single Application Platform, the III-RM addresses how information flows across multiple platforms, vendors, and organisations. It has three functional areas. Brokerage services: finding and connecting information providers to consumers — directories, traders, registration services. Connectivity services: the communication infrastructure enabling systems to interoperate. And Application Platform services: extending the TRM services to the distributed context. The relationship between them: the III-RM builds on the TRM, using TRM's Application Platform Services as its foundation and extending them for cross-enterprise information sharing. Exam shortcut: TRM equals single platform services. III-RM equals cross-enterprise distributed information flow. III-RM extends TRM. Both are Foundation Architectures.`},

{type:"section",bg:"amber",
html:`<div class="sec-num">04</div><div class="sec-lbl">Section Four</div><h2 class="sec-h">Boundaryless Information Flow</h2><p class="sec-desc">The key concept underpinning the III-RM — and why it matters for enterprise architecture.</p>`,
voice:`Section four: boundaryless information flow. This is the conceptual goal that the III-RM is designed to achieve.`},

{type:"content",
html:`<div class="clbl">The core concept</div><h2 class="ch">Boundaryless Information Flow</h2>
<div class="box amber"><div class="box-lbl">Definition</div><p><strong>Boundaryless information flow</strong> is the Open Group's vision for the ideal information environment: any person can access any information they are entitled to, from any application, at any time, using any device — regardless of the underlying technology or organisational boundary.</p></div>
<div class="blist">
  <div class="bi"><div class="bd" style="background:var(--amber)"></div><div class="bt"><strong>Any person</strong> — people, automated processes, and systems acting as consumers of information</div></div>
  <div class="bi"><div class="bd" style="background:var(--amber)"></div><div class="bt"><strong>Authorised access</strong> — "entitled to" means security and privacy are built in — boundaryless doesn't mean unsecured</div></div>
  <div class="bi"><div class="bd" style="background:var(--amber)"></div><div class="bt"><strong>Any application</strong> — information is not locked in silos; it flows freely across application boundaries</div></div>
  <div class="bi"><div class="bd" style="background:var(--amber)"></div><div class="bt"><strong>Any time</strong> — real-time or near-real-time availability, not constrained by batch processes or business hours</div></div>
  <div class="bi"><div class="bd" style="background:var(--amber)"></div><div class="bt"><strong>Any device</strong> — device-independent access, from desktop to mobile to embedded systems</div></div>
</div>
<div class="box teal"><div class="box-lbl">Why it matters for architecture</div><p>Boundaryless information flow is the <strong>aspirational target state</strong> for enterprise information architecture. Every integration decision, data architecture choice, and technology platform selection should be evaluated against this goal. It explains why the III-RM focuses on open standards, interoperability, and broker-mediated access.</p></div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t"><strong>Boundaryless information flow</strong> is the Open Group's vision — and the conceptual foundation of the III-RM. It means authorised access to any information, from anywhere, at any time, on any device. Security is implicit — "authorised" means it's not uncontrolled.</div></div>`,
voice:`Boundaryless information flow is the Open Group's vision for the ideal information environment — and the conceptual foundation of the III-RM. It has five dimensions. Any person — or automated process or system acting as a consumer of information. Authorised access — "entitled to" is critical here. Boundaryless doesn't mean unsecured — security and privacy are built in. Any application — information isn't locked in silos; it flows freely across application boundaries. Any time — real-time or near-real-time, not constrained by batch processes. And any device — device-independent access from desktop to mobile to embedded systems. This is the aspirational target state for enterprise information architecture. Every integration decision, data architecture choice, and technology selection should be evaluated against this goal. The exam key: boundaryless information flow means authorised, any-time, any-device access to any information. Security is implicit — it's not unlimited access.`},

{type:"section",bg:"green",
html:`<div class="sec-num">05</div><div class="sec-lbl">Section Five</div><h2 class="sec-h">Using Reference Models in Phase D</h2><p class="sec-desc">How architects practically apply the TRM and III-RM when designing Technology Architecture.</p>`,
voice:`Section five: using reference models in Phase D. Knowing the models is one thing — knowing how to apply them is what the exam tests.`},

{type:"content",
html:`<div class="clbl">Practical application</div><h2 class="ch">Applying TRM and III-RM in Phase D</h2>
<div class="box green"><div class="box-lbl">The application pattern</div><p>In Phase D, architects use the TRM as a <strong>taxonomy and checklist</strong> — systematically working through the Application Platform service categories to ensure the Technology Architecture covers all required services. The III-RM guides decisions about <strong>cross-system integration and information exchange</strong>.</p></div>
<div class="blist">
  <div class="bi"><div class="bd" style="background:var(--green)"></div><div class="bt"><strong>Step 1:</strong> Use TRM service categories as a structured checklist — have we addressed Data Management? Security? Network services? Each category prompts analysis of what services are needed.</div></div>
  <div class="bi"><div class="bd" style="background:var(--green)"></div><div class="bt"><strong>Step 2:</strong> Use III-RM to assess cross-system integration requirements — how will systems exchange information? What brokerage and connectivity services are needed?</div></div>
  <div class="bi"><div class="bd" style="background:var(--green)"></div><div class="bt"><strong>Step 3:</strong> Map existing technology to TRM categories — identifying gaps where services are missing or duplicated (technology rationalisation)</div></div>
  <div class="bi"><div class="bd" style="background:var(--green)"></div><div class="bt"><strong>Step 4:</strong> Select or recommend technologies that satisfy the required platform services — using the taxonomy as an evaluation framework</div></div>
</div>
<div class="sg">
  <div class="sc"><div class="sn">01</div><div class="st"><strong>TRM</strong> — two layers, Foundation Architecture, taxonomy for Phase D platform design.</div></div>
  <div class="sc"><div class="sn">02</div><div class="st"><strong>III-RM</strong> — distributed cross-enterprise flow, extends TRM, three functional areas.</div></div>
  <div class="sc"><div class="sn">03</div><div class="st"><strong>Boundaryless flow</strong> — authorised, any-time, any-device, any-application access.</div></div>
  <div class="sc"><div class="sn">04</div><div class="st"><strong>Used in Phase D</strong> — TRM as checklist, III-RM for integration architecture.</div></div>
</div>`,
voice:`In Phase D, architects use the TRM as a taxonomy and systematic checklist. Step one: work through TRM service categories to ensure the Technology Architecture covers all required services. Have we addressed Data Management? Security? Network services? Each category prompts structured analysis. Step two: use the III-RM to assess cross-system integration — how will systems exchange information? What brokerage and connectivity services are needed to support boundaryless information flow? Step three: map existing technology to TRM categories, identifying gaps where services are missing or duplicated — this is technology rationalisation. Step four: select or recommend technologies that satisfy the required platform services, using the TRM taxonomy as the evaluation framework. Session summary: TRM has two layers and is a Foundation Architecture used as a taxonomy checklist in Phase D. The III-RM addresses distributed cross-enterprise information flow, extends the TRM, and has three functional areas: brokerage, connectivity, and application platform services. Boundaryless information flow is the conceptual goal. And both models are applied in Phase D.`},

{type:"title",bg:"end",
html:`<div class="eyebrow">Day 18 Complete</div><h1 class="title-h" style="font-size:clamp(22px,5.5vw,38px)">TRM &amp; III-RM — done.</h1><div class="title-rule"></div><p class="title-sub" style="margin-bottom:24px">Next: <strong>Day 19 — Full Review</strong>. A comprehensive recap of all domains — ADM phases, Content Framework, Enterprise Continuum, Governance, and the most common exam traps.</p>

</div>`,
voice:`Day 18 complete. The TRM and III-RM are TOGAF's two built-in Foundation Architectures. The TRM provides a two-layer model and a taxonomy of platform services for Phase D. The III-RM extends it for distributed cross-enterprise information flow, built around the concept of boundaryless information flow. Together they give enterprise architects a proven starting point for technology architecture without building from scratch. Take the quiz. Day 19 is the Full Review — all domains, all key distinctions, all common exam traps. See you there.`},

const BG={navy:"var(--navy2)",blue:"linear-gradient(135deg,#0A1525,#0D1F3A)",teal:"linear-gradient(135deg,#0A1F2F,#0D2A3A)",purple:"linear-gradient(135deg,#120E2A,#1A1235)",amber:"linear-gradient(135deg,#1A1000,#251800)",green:"linear-gradient(135deg,#0A1A10,#0D2218)",end:"linear-gradient(135deg,#080E1A,#0D1526 60%,#152035)"};
let cur=0,play=false,spdIdx=1,utt=null,tx=0,anim=false;
const SPDS=[0.8,1,1.2,1.5];
const wrap=document.getElementById("slides-wrap");
document.getElementById("stotal").textContent=SLIDES.length;
SLIDES.forEach((s,i)=>{const d=document.createElement("div");d.className="slide slide-"+(s.type||"content");d.id="sl"+i;d.style.background=BG[s.bg]||BG.navy;d.innerHTML=`<div class="slide-body">${s.html}</div>`;if(i===0)d.classList.add("active");wrap.appendChild(d);});
function goTo(i,dir){if(anim||i<0||i>=SLIDES.length)return;anim=true;stopSp();const f=document.getElementById("sl"+cur),t=document.getElementById("sl"+i);f.classList.remove("active");t.classList.add("active");f.classList.add(dir>0?"exit-left":"exit-right");t.classList.add(dir>0?"enter-right":"enter-left");t.querySelector(".slide-body").scrollTop=0;setTimeout(()=>{f.classList.remove("exit-left","exit-right","active");t.classList.remove("enter-right","enter-left");anim=false;cur=i;upUI();if(play)spk();},420);}
function nextSlide(){if(cur<SLIDES.length-1)goTo(cur+1,1);}function prevSlide(){if(cur>0)goTo(cur-1,-1);}
function upUI(){document.getElementById("snum").textContent=cur+1;document.getElementById("progress-fill").style.width=((cur+1)/SLIDES.length*100)+"%";document.getElementById("btn-prev").disabled=cur===0;document.getElementById("btn-next").disabled=cur===SLIDES.length-1;}
function spk(){stopSp();if(!("speechSynthesis"in window))return;const txt=SLIDES[cur].voice;if(!txt){if(play)setTimeout(nextSlide,800);return;}utt=new SpeechSynthesisUtterance(txt);utt.rate=SPDS[spdIdx];utt.lang="en-GB";const vs=speechSynthesis.getVoices();const p=vs.find(v=>v.lang.startsWith("en")&&(v.name.includes("Daniel")||v.name.includes("Samantha")||v.name.includes("Google UK")))||vs.find(v=>v.lang.startsWith("en"))||vs[0];if(p)utt.voice=p;utt.onstart=()=>setSt("speaking");utt.onend=()=>{setSt("");if(play&&cur<SLIDES.length-1)setTimeout(nextSlide,600);else{play=false;upPlay();}};utt.onerror=()=>setSt("");speechSynthesis.speak(utt);}
function stopSp(){if("speechSynthesis"in window)speechSynthesis.cancel();utt=null;setSt("");}
function togglePlay(){play=!play;upPlay();if(play)spk();else stopSp();}
function upPlay(){document.getElementById("play-icon").innerHTML=play?'<rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor"/><rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M4 3l11 6-11 6V3z"/>';}
function setSt(s){const el=document.getElementById("vs");el.innerHTML=s==="speaking"?`<div class="vd"><div class="vdot"></div><div class="vdot"></div><div class="vdot"></div></div><span>Narrating…</span>`:(s||"");}
function cycleSpeed(){spdIdx=(spdIdx+1)%SPDS.length;document.getElementById("spdbtn").textContent=SPDS[spdIdx]+"×";if(play){stopSp();setTimeout(spk,100);}}
function markDone(){try{const d=JSON.parse(localStorage.getItem("togaf_done")||"{}");d[18]=true;localStorage.setItem("togaf_done",JSON.stringify(d));}catch(e){}const b=document.getElementById("btn-done");b.style.background="var(--teal3)";b.style.borderColor="var(--teal)";b.querySelector("svg").style.stroke="var(--teal)";goTo(SLIDES.length-1,1);}
document.getElementById("start-btn").addEventListener("click",()=>{document.getElementById("start-overlay").style.display="none";document.getElementById("deck").style.display="flex";upUI();if("speechSynthesis"in window){const p=new SpeechSynthesisUtterance(" ");p.volume=0;speechSynthesis.speak(p);setTimeout(()=>{play=true;upPlay();spk();},400);}});
wrap.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown")nextSlide();if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevSlide();if(e.key===" "){e.preventDefault();togglePlay();}});
</script>
