<script>
const SLIDES=[
{type:"title",bg:"navy",
html:`<div class="title-eyebrow">TOGAF Foundation · Day 8 of 20</div><h1 class="title-h">Phase F:<br>Migration Planning</h1><div class="title-rule"></div><p class="title-sub">Phase E defined the plan. Phase F makes it definitive — prioritised, costed, dependency-mapped, and formally approved to begin delivery.</p><div class="title-tags"><span class="title-tag">📊 5 topics</span><span class="title-tag">🎙 Narrated</span><span class="title-tag">🏁 Week 2 finale</span></div>`,
voice:`Welcome to Day 8 — the final session of Week 2. Today is Phase F, Migration Planning. Phase E gave us the initial plan: work packages, transition architectures, a first Architecture Roadmap. Phase F takes all of that and makes it definitive. We'll cover the Phase E to F distinction, how dependencies, costs and benefits are assessed, the planning techniques used, how the Architecture Roadmap is refined, and finally how stakeholder reviews and sign-off work. Let's finish Week 2 strong.`},

{type:"section",bg:"amber",
html:`<div class="section-num">01</div><div class="section-label">Section One</div><h2 class="section-h">Phase F — From Outline to Definitive Plan</h2><p class="section-desc">The key distinction: Phase E defines what needs to happen. Phase F decides exactly when, how, and at what cost.</p>`,
voice:`Section one: the transition from Phase E to Phase F. The most important thing to understand is what Phase F adds that Phase E didn't have.`},

{type:"content",
html:`<div class="content-label">Phase E vs Phase F</div><h2 class="content-h">What Phase F Adds</h2>
<div class="callout teal"><div class="callout-label">Phase F objective</div><p>Phase F finalises a <strong>detailed, prioritised, and costed Implementation and Migration Plan</strong> — the authoritative delivery document governing the transition from Baseline to Target Architecture.</p></div>
<div class="ef-compare">
  <div class="ef-box"><div class="ef-head e">Phase E gives us…</div><ul class="ef-ul e"><li>Initial Architecture Roadmap</li><li>Work Package definitions</li><li>Transition Architectures</li><li>Initial Migration Plan</li><li>Project Context Diagram</li></ul></div>
  <div class="ef-box"><div class="ef-head f">Phase F refines into…</div><ul class="ef-ul f"><li>Finalised Architecture Roadmap</li><li>Prioritised, sequenced packages</li><li>Confirmed Transition Architectures</li><li>Definitive Migration Plan</li><li>Approved delivery schedule</li></ul></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>Exam tip:</strong> The Implementation and Migration Plan is <strong>finalised in Phase F</strong>, not Phase E. Phase E creates the initial version. Phase F makes it definitive with prioritisation, costing, and formal approval.</div></div>`,
voice:`Phase F's objective is to finalise a detailed, prioritised, and costed Implementation and Migration Plan — the authoritative document that governs the entire delivery. Here's the comparison. Phase E gives us: an initial Architecture Roadmap, work package definitions, transition architecture definitions, an initial migration plan, and the Project Context Diagram. Phase F refines all of these into: a finalised Architecture Roadmap, work packages that are prioritised and sequenced, confirmed transition architectures, the definitive Migration Plan, and an approved delivery schedule. The exam frequently tests this distinction. The Migration Plan is finalised in Phase F — not Phase E.`},

{type:"section",bg:"blue",
html:`<div class="section-num">02</div><div class="section-label">Section Two</div><h2 class="section-h">Dependencies, Costs &amp; Benefits</h2><p class="section-desc">The analytical core of Phase F — understanding what must happen in what order and at what cost.</p>`,
voice:`Section two: assessing dependencies, costs, and benefits. This is the analytical core that allows Phase F to produce a properly sequenced and justified plan.`},

{type:"content",
html:`<div class="content-label">Dependency types</div><h2 class="content-h">Why Sequencing Matters</h2>
<div class="callout blue"><div class="callout-label">Dependency assessment</div><p>Phase F <strong>maps all dependencies</strong> between work packages — establishing which must complete before others can begin, preventing plan failures caused by unresolved dependencies.</p></div>
<div class="dep-list">
  <div class="dep-item"><span class="dep-icon">🔧</span><div><div class="dep-name">Technical Dependencies</div><div class="dep-desc">Infrastructure must exist before applications can be deployed. E.g. cloud platform before CRM migration.</div></div></div>
  <div class="dep-item"><span class="dep-icon">🏢</span><div><div class="dep-name">Business Dependencies</div><div class="dep-desc">Org change must precede capability rollout. E.g. staff training before new service model launch.</div></div></div>
  <div class="dep-item"><span class="dep-icon">🗄</span><div><div class="dep-name">Data Dependencies</div><div class="dep-desc">Data migration must complete before application migration can start. Data quality issues cascade.</div></div></div>
  <div class="dep-item"><span class="dep-icon">👥</span><div><div class="dep-name">Resource Dependencies</div><div class="dep-desc">Two packages competing for the same scarce team, system, or budget. Conflicts resolved in the plan.</div></div></div>
</div>`,
voice:`Phase F maps all dependencies between work packages. Four types matter. Technical dependencies: infrastructure must exist before applications can use it — you can't migrate a CRM to the cloud before the cloud platform is built. Business dependencies: organisational changes must precede capability rollouts — staff must be trained before a new service model launches. Data dependencies: data migrations must complete before application migrations — data quality issues in the baseline cascade into the application layer. And resource dependencies: when two work packages compete for the same scarce team or budget, conflicts must be resolved before the plan is finalised.`},

{type:"content",
html:`<div class="content-label">Cost and benefit</div><h2 class="content-h">The Financial Case</h2>
<div class="callout green"><div class="callout-label">Cost–benefit analysis</div><p>Every work package is assessed for <strong>total cost</strong> (implementation + operations + transition) and <strong>business benefit</strong> (revenue, savings, risk reduction, compliance). Output is a ranked list that drives sequencing.</p></div>
<div class="bullet-list">
  <div class="bullet"><div class="bullet-dot" style="background:var(--coral)"></div><div class="bullet-text"><strong>Costs assessed:</strong> implementation effort, licence fees, infrastructure, training, disruption, ongoing operations</div></div>
  <div class="bullet"><div class="bullet-dot" style="background:var(--green)"></div><div class="bullet-text"><strong>Benefits quantified:</strong> cost reduction, revenue gain, risk mitigation, regulatory compliance, capability improvement</div></div>
  <div class="bullet"><div class="bullet-dot" style="background:var(--teal)"></div><div class="bullet-text"><strong>Financial metrics used:</strong> NPV, ROI, payback period — to justify each package to the sponsoring organisation</div></div>
</div>
<div class="callout amber"><div class="callout-label">Risk per work package</div><p>Phase F adds a <strong>risk score</strong> to each work package — technical risk, business disruption, programme delivery risk. Risk-adjusted scheduling ensures highest-risk packages have mitigation strategies before they begin.</p></div>`,
voice:`Every work package in Phase F receives a full cost-benefit assessment. Costs include: implementation effort, licence fees, infrastructure, training, disruption to operations, and ongoing operational costs. Benefits include: cost reduction, revenue gain, risk mitigation, regulatory compliance, and capability improvement. Financial metrics like Net Present Value, Return on Investment, and payback period are used to justify each package to the sponsoring organisation. Phase F also adds a risk score to each work package — technical risk, business disruption risk, and programme delivery risk — so that the highest-risk packages have mitigation strategies built in before they begin.`},

{type:"section",bg:"purple",
html:`<div class="section-num">03</div><div class="section-label">Section Three</div><h2 class="section-h">Migration Planning Techniques</h2><p class="section-desc">The structured analytical tools that bring rigour to prioritisation.</p>`,
voice:`Section three: migration planning techniques. Phase F isn't just sequencing — it uses several structured analytical techniques to produce a properly justified plan.`},

{type:"content",
html:`<div class="content-label">Analytical toolkit</div><h2 class="content-h">How the Plan Gets Built</h2>
<div class="tech-list">
  <div class="tech-row"><span class="tech-badge" style="background:var(--teal3);color:var(--teal)">Technique</span><div><div class="tech-name">Business Value Assessment</div><div class="tech-desc">Scores each work package against business benefit criteria — produces a value ranking.</div></div></div>
  <div class="tech-row"><span class="tech-badge" style="background:var(--blue2);color:var(--blue)">Technique</span><div><div class="tech-name">Dependency Modelling</div><div class="tech-desc">Maps hard and soft dependencies — establishes sequencing constraints.</div></div></div>
  <div class="tech-row"><span class="tech-badge" style="background:var(--green2);color:var(--green)">Technique</span><div><div class="tech-name">Cost–Benefit Analysis</div><div class="tech-desc">Estimates NPV, ROI, payback period for each package — financial justification.</div></div></div>
  <div class="tech-row"><span class="tech-badge" style="background:var(--coral2);color:var(--coral)">Technique</span><div><div class="tech-name">Risk Assessment Matrix</div><div class="tech-desc">Scores implementation risk vs business impact — risk-based scheduling.</div></div></div>
  <div class="tech-row"><span class="tech-badge" style="background:var(--amber2);color:var(--amber)">Technique</span><div><div class="tech-name">Portfolio Optimisation</div><div class="tech-desc">Balances the mix across time horizons — resource and budget levelling.</div></div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>Exam tip:</strong> The phase that performs <strong>detailed cost–benefit analysis</strong> on work packages is Phase F — not Phase E. Phase E identifies packages; Phase F costs and ranks them.</div></div>`,
voice:`Phase F uses five key techniques. Business Value Assessment scores each work package against business benefit criteria to produce a value ranking. Dependency Modelling maps the hard and soft dependencies that constrain sequencing. Cost-Benefit Analysis estimates Net Present Value, Return on Investment, and payback period to justify each package financially. Risk Assessment Matrix scores each package on implementation risk versus business impact for risk-based scheduling. And Portfolio Optimisation balances the mix of work across time horizons to level resources and budgets. For the exam: Phase F is the phase that performs detailed cost-benefit analysis. Phase E identifies the work packages; Phase F costs and ranks them.`},

{type:"section",bg:"teal",
html:`<div class="section-num">04</div><div class="section-label">Section Four</div><h2 class="section-h">Architecture Roadmap Refinement</h2><p class="section-desc">Turning the Phase E outline into the definitive, time-phased, resourced delivery plan.</p>`,
voice:`Section four: Architecture Roadmap refinement. The roadmap was created in Phase E. Phase F turns it into the definitive plan.`},

{type:"content",
html:`<div class="content-label">Five refinement steps</div><h2 class="content-h">From Initial to Definitive Roadmap</h2>
<div class="step-list">
  <div class="step-row"><div class="step-num">1</div><div class="step-content"><div class="step-title">Confirm Transition Architectures</div><div class="step-desc">Review Phase E transition states against dependency and cost analysis. Adjust if needed.</div></div></div>
  <div class="step-row"><div class="step-num">2</div><div class="step-content"><div class="step-title">Sequence work packages</div><div class="step-desc">Apply dependency constraints and prioritisation rankings to produce the delivery sequence.</div></div></div>
  <div class="step-row"><div class="step-num">3</div><div class="step-content"><div class="step-title">Assign to time horizons</div><div class="step-desc">Group into near-term (0–12m), mid-term (12–24m), and long-term (24m+).</div></div></div>
  <div class="step-row"><div class="step-num">4</div><div class="step-content"><div class="step-title">Resource and budget plan</div><div class="step-desc">Assign resources. Level the plan to avoid overloads. Confirm budget envelope per horizon.</div></div></div>
  <div class="step-row"><div class="step-num">5</div><div class="step-content"><div class="step-title">Finalise the Roadmap</div><div class="step-desc">Produce the definitive Architecture Roadmap — time-phased, resourced, costed, ready for approval.</div></div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text">Roadmap <strong>created</strong> Phase E · Roadmap <strong>finalised</strong> Phase F. Both facts are tested. Don't confuse them.</div></div>`,
voice:`Here are the five steps Phase F uses to refine the initial roadmap into the definitive plan. First: confirm transition architectures — review the Phase E transition states against the detailed dependency and cost analysis and adjust where needed. Second: sequence work packages — apply dependency constraints and prioritisation rankings to produce the actual delivery sequence. Third: assign packages to time horizons — near-term zero to twelve months, mid-term twelve to twenty-four months, long-term beyond that. Fourth: resource and budget plan — assign teams to packages, level the plan to remove resource conflicts, and confirm the budget envelope for each horizon. Fifth: finalise the roadmap — the definitive, time-phased, resourced, costed plan ready for approval. The exam tests both facts: roadmap created in Phase E, roadmap finalised in Phase F.`},

{type:"section",bg:"coral",
html:`<div class="section-num">05</div><div class="section-label">Section Five</div><h2 class="section-h">Sign-off, Outputs &amp; Week 2 Complete</h2><p class="section-desc">Formal approval, the hand-over to Phase G, and a look at what you've achieved this week.</p>`,
voice:`Section five: stakeholder reviews, sign-off, Phase F outputs, and closing out Week 2.`},

{type:"content",
html:`<div class="content-label">Formal approval</div><h2 class="content-h">Sign-off &amp; Hand-over</h2>
<div class="sign-list">
  <div class="sign-item"><div class="sign-name">Architecture Board Review</div><div class="sign-desc">Reviews the finalised Migration Plan against the Architecture Vision and principles. Deviations require formal dispensation before approval is granted.</div></div>
  <div class="sign-item"><div class="sign-name">Executive Sponsor Sign-off</div><div class="sign-desc">The sponsoring executive formally approves the plan — committing budget, staff, and time to the delivery programme.</div></div>
  <div class="sign-item"><div class="sign-name">Hand-over to Phase G</div><div class="sign-desc">Once approved, Phase G — Implementation Governance — takes over. Phase G monitors delivery against the approved Architecture Plan throughout implementation.</div></div>
</div>
<div class="callout teal"><div class="callout-label">Architecture contracts drafted</div><p>Phase F also drafts the <strong>Architecture Contracts</strong> that will be used in Phase G — formal agreements between the architecture team and delivery teams, specifying conformance requirements for each implementation project.</p></div>`,
voice:`Phase F closes with three governance events. First, the Architecture Board reviews the finalised Migration Plan against the Architecture Vision and Architecture Principles. Any deviations must receive formal dispensations before approval. Second, the executive sponsor formally approves the plan — this commits organisational resources: budget, staff, and time. Third, once approved, the plan is handed over to Phase G — Implementation Governance — which monitors delivery against the approved plan throughout implementation. Phase F also drafts the Architecture Contracts that will be used in Phase G — formal agreements specifying exactly how each implementation project must conform to the defined architecture.`},

{type:"content",
html:`<div class="content-label">IO and week 2 summary</div><h2 class="content-h">Phase F Outputs &amp; Week 2 Complete</h2>
<div class="io-grid">
  <div class="io-box"><div class="io-hd in">Key Inputs</div><ul class="io-ul"><li><strong style="color:var(--blue)">Architecture Roadmap (Phase E) ★</strong></li><li><strong style="color:var(--blue)">Work Packages (Phase E) ★</strong></li><li>Transition Architectures (Phase E)</li><li>Architecture Definition Doc</li><li>Architecture Vision and Principles</li></ul></div>
  <div class="io-box"><div class="io-hd out">Key Outputs</div><ul class="io-ul"><li><strong style="color:var(--teal)">Implementation &amp; Migration Plan ★</strong></li><li><strong style="color:var(--teal)">Finalised Architecture Roadmap ★</strong></li><li>Confirmed Transition Architectures</li><li>Architecture Contract drafts (Phase G)</li><li>Approved delivery schedule + budget</li></ul></div>
</div>
<div class="sum-grid">
  <div class="sum-card"><div class="sum-num">E</div><div class="sum-text"><strong>Phase E</strong> — identifies, defines. Initial roadmap. Work packages. Transition architectures.</div></div>
  <div class="sum-card"><div class="sum-num">F</div><div class="sum-text"><strong>Phase F</strong> — prioritises, costs, finalises. Definitive plan. Formal sign-off. Hand to Phase G.</div></div>
  <div class="sum-card"><div class="sum-num">★</div><div class="sum-text"><strong>Prioritisation</strong> — dependencies + business value + cost + risk. All four factors.</div></div>
  <div class="sum-card"><div class="sum-num">✓</div><div class="sum-text"><strong>Week 2 done</strong> — Phases C, D, E, F complete. Architecture designed and delivery planned.</div></div>
</div>`,
voice:`Here's the complete Phase F picture. Primary inputs: the Architecture Roadmap and Work Packages from Phase E. Key outputs: the finalised Implementation and Migration Plan — the definitive delivery document — the finalised Architecture Roadmap, confirmed Transition Architectures, Architecture Contract drafts for Phase G, and the approved delivery schedule and budget. Four summary points. Phase E identifies and defines — initial roadmap, work packages, transition architectures. Phase F prioritises, costs, and finalises — definitive plan, formal sign-off, hand-over to Phase G. Prioritisation uses all four factors: dependencies, business value, cost, and risk. And Week 2 is done — Phases C, D, E, and F complete. The architecture is designed and the delivery is planned.`},

{type:"title",bg:"end",
html:`<div class="title-eyebrow">Day 8 Complete · Week 2 Done! 🎉</div><h1 class="title-h" style="font-size:clamp(22px,5.5vw,38px)">Phase F — done.<br>Week 2 — done!</h1><div class="title-rule"></div><p class="title-sub" style="margin-bottom:24px">You've completed the full ADM delivery cycle through Phase F. Next week: governance, change management, requirements management, and ADM techniques.</p>
<div style="display:flex;flex-direction:column;gap:10px;max-width:320px">
  <a href="togaf-day8.html" style="display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--teal3);border:1px solid rgba(45,212,191,.25);border-radius:10px;text-decoration:none;color:var(--teal);font-size:14px;font-weight:500"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h10"/></svg>Open reading version · Take the quiz</a>
  <button onclick="markDone()" style="display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--teal);border:none;border-radius:10px;color:var(--navy);font-size:14px;font-weight:600;cursor:pointer;justify-content:center"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2.5 8.5l4 4 7-8"/></svg>Mark Day 8 as done</button>
</div>`,
voice:`Congratulations — Day 8 done, Week 2 done! You've covered all four ADM design phases B through D, and both delivery planning phases E and F. Phase C was data and application together. Phase D was the technology layer. Phase E was the pivot to delivery planning with the initial roadmap. And Phase F made the plan definitive, costed, and approved. Take the Day 8 quiz to lock it all in. Week 3 starts with Phase G Implementation Governance — where the approved plan meets reality and architects ensure the delivery teams stay true to the architecture. Excellent work this week. See you in Week 3.`},
];

let cur=0,play=false,spdIdx=1,utt=null,tx=0,anim=false;
const SPDS=[0.8,1,1.2,1.5];
const wrap=document.getElementById("slides-wrap");
document.getElementById("slide-total").textContent=SLIDES.length;
function getBg(b){return{navy:"var(--navy2)",amber:"linear-gradient(135deg,#1A1000,#251800)",teal:"linear-gradient(135deg,#0A1F2F,#0D2A3A)",blue:"linear-gradient(135deg,#0A1525,#0D1F3A)",purple:"linear-gradient(135deg,#120E2A,#1A1235)",green:"linear-gradient(135deg,#0A1A10,#0D2218)",coral:"linear-gradient(135deg,#1A0A0E,#2A0D15)",end:"linear-gradient(135deg,#080E1A,#0D1526 60%,#152035)"}[b]||"var(--navy2)";}
SLIDES.forEach((s,i)=>{const d=document.createElement("div");d.className="slide slide-"+(s.type||"content");d.id="s"+i;d.style.background=getBg(s.bg);d.innerHTML=`<div class="slide-body">${s.html}</div>`;if(i===0)d.classList.add("active");wrap.appendChild(d);});
function goTo(i,dir){if(anim||i<0||i>=SLIDES.length)return;anim=true;stopSp();const f=document.getElementById("s"+cur),t=document.getElementById("s"+i);f.classList.remove("active");t.classList.add("active");f.classList.add(dir>0?"exit-left":"exit-right");t.classList.add(dir>0?"enter-right":"enter-left");t.querySelector(".slide-body").scrollTop=0;setTimeout(()=>{f.classList.remove("exit-left","exit-right","active");t.classList.remove("enter-right","enter-left");anim=false;cur=i;upUI();if(play)spk();},420);}
function nextSlide(){if(cur<SLIDES.length-1)goTo(cur+1,1);}
function prevSlide(){if(cur>0)goTo(cur-1,-1);}
function upUI(){document.getElementById("slide-num").textContent=cur+1;document.getElementById("progress-fill").style.width=((cur+1)/SLIDES.length*100)+"%";document.getElementById("btn-prev").disabled=cur===0;document.getElementById("btn-next").disabled=cur===SLIDES.length-1;}
function spk(){stopSp();if(!("speechSynthesis"in window))return;const txt=SLIDES[cur].voice;if(!txt){if(play)setTimeout(nextSlide,800);return;}utt=new SpeechSynthesisUtterance(txt);utt.rate=SPDS[spdIdx];utt.lang="en-GB";const vs=speechSynthesis.getVoices();const p=vs.find(v=>v.lang.startsWith("en")&&(v.name.includes("Daniel")||v.name.includes("Samantha")||v.name.includes("Karen")||v.name.includes("Google UK")))||vs.find(v=>v.lang.startsWith("en"))||vs[0];if(p)utt.voice=p;utt.onstart=()=>setSt("speaking");utt.onend=()=>{setSt("");if(play&&cur<SLIDES.length-1)setTimeout(nextSlide,600);else if(cur===SLIDES.length-1){play=false;upPlay();}};utt.onerror=()=>setSt("");speechSynthesis.speak(utt);}
function stopSp(){if("speechSynthesis"in window)speechSynthesis.cancel();utt=null;setSt("");}
function togglePlay(){play=!play;upPlay();if(play)spk();else stopSp();}
function upPlay(){document.getElementById("play-icon").innerHTML=play?'<rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor"/><rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M4 3l11 6-11 6V3z"/>';}
function setSt(s){const el=document.getElementById("voice-status");el.innerHTML=s==="speaking"?`<div class="voice-dots"><div class="voice-dot"></div><div class="voice-dot"></div><div class="voice-dot"></div></div><span>Narrating…</span>`:s||"";}
function cycleSpeed(){spdIdx=(spdIdx+1)%SPDS.length;document.getElementById("speed-btn").textContent=SPDS[spdIdx]+"×";if(play){stopSp();setTimeout(spk,100);}}
function markDone(){try{const d=JSON.parse(localStorage.getItem("togaf_done")||"{}");d[8]=true;localStorage.setItem("togaf_done",JSON.stringify(d));}catch(e){}const b=document.getElementById("btn-done");b.style.background="var(--teal3)";b.style.borderColor="var(--teal)";b.querySelector("svg").style.stroke="var(--teal)";goTo(SLIDES.length-1,1);}
document.getElementById("start-btn").addEventListener("click",()=>{document.getElementById("start-overlay").style.display="none";document.getElementById("deck").style.display="flex";upUI();if("speechSynthesis"in window){const p=new SpeechSynthesisUtterance(" ");p.volume=0;speechSynthesis.speak(p);setTimeout(()=>{play=true;upPlay();spk();},400);}});
wrap.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown")nextSlide();if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevSlide();if(e.key===" "){e.preventDefault();togglePlay();}});
if("speechSynthesis"in window)speechSynthesis.onvoiceschanged=()=>{};
</script>
