<script>
const SLIDES=[
{type:"title",bg:"navy",
html:`<div class="title-eyebrow">TOGAF Foundation · Day 10 of 20</div><h1 class="title-h">Phase H:<br>Architecture Change Management</h1><div class="title-rule"></div><p class="title-sub">The last ADM phase — but also the gateway back to Phase A. Phase H ensures the architecture stays relevant as business and technology evolve.</p><div class="title-tags"><span class="title-tag">📊 5 topics</span><span class="title-tag">🎙 Narrated</span><span class="title-tag">🔄 Last phase</span></div>`,
voice:`Welcome to Day 10. Today is Phase H — Architecture Change Management, the last lettered phase in the ADM cycle. But last doesn't mean finished. Phase H is actually the gateway back to Phase A — making architecture management continuous rather than one-time. We'll cover Phase H's objective, change triggers and types, dispensations and exceptions, the Architecture Change Request process, and the critical maintenance versus redesign decision. Let's go.`},

{type:"section",bg:"coral",
html:`<div class="section-num">01</div><div class="section-label">Section One</div><h2 class="section-h">Phase H Objective &amp; Context</h2><p class="section-desc">The last ADM phase — and the one that makes architecture management truly continuous.</p>`,
voice:`Section one: Phase H's objective and context. Understanding where Phase H sits in the bigger picture.`},

{type:"content",
html:`<div class="content-label">The continuous cycle</div><h2 class="content-h">Why Phase H Exists</h2>
<div class="callout teal"><div class="callout-label">Objective</div><p>Phase H establishes and manages an <strong>Architecture Change Management process</strong> to ensure the architecture remains current and fit for purpose as business and technology evolve.</p></div>
<div class="bullet-list">
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text"><strong>After Phase G:</strong> delivery complete, new architecture operational — but the world keeps changing</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text">Business strategies evolve, technologies emerge, regulations change, implementation discovers gaps</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text">Without Phase H, architecture becomes <em>stale</em> — a historical document rather than a living guide</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text">Phase H is the <strong>last lettered phase</strong> — but loops back to Phase A via new Request for Architecture Work</div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>Phase H is the last ADM phase AND loops back to Phase A.</strong> When significant changes occur, Phase H generates a new <strong>Request for Architecture Work</strong> — same document that started everything.</div></div>`,
voice:`Phase H exists because change is constant. After Phase G, the delivery is complete and the new architecture is operational. But business strategies evolve, technologies emerge, regulations change, and sometimes implementation discovers gaps the original architecture didn't anticipate. Without Phase H, the architecture would become stale — a historical document that no longer reflects reality. Phase H is the last lettered ADM phase, but it loops back to Phase A when significant changes occur. It does this by generating a new Request for Architecture Work — the same document that triggered Phase A at the very beginning. This makes the ADM a continuous cycle, not a linear process.`},

{type:"section",bg:"coral",
html:`<div class="section-num">02</div><div class="section-label">Section Two</div><h2 class="section-h">Change Triggers &amp; Types</h2><p class="section-desc">What activates Phase H and how changes are categorised.</p>`,
voice:`Section two: change triggers and types. Phase H is activated by events that suggest the architecture needs to be updated.`},

{type:"content",
html:`<div class="content-label">What triggers Phase H</div><h2 class="content-h">Six Change Triggers</h2>
<div class="trigger-grid">
  <div class="trigger-card"><div class="trigger-icon">📈</div><div class="trigger-name">Business Strategy Change</div><div class="trigger-desc">Mergers, acquisitions, new markets, strategic pivots</div></div>
  <div class="trigger-card"><div class="trigger-icon">📋</div><div class="trigger-name">New Regulations</div><div class="trigger-desc">New laws, standards, or compliance obligations</div></div>
  <div class="trigger-card"><div class="trigger-icon">💻</div><div class="trigger-name">Technology Change</div><div class="trigger-desc">Disruptive tech, end-of-life products, platform migrations</div></div>
  <div class="trigger-card"><div class="trigger-icon">🔍</div><div class="trigger-name">Implementation Discoveries</div><div class="trigger-desc">Phase G findings: gaps, wrong assumptions, unforeseen constraints</div></div>
  <div class="trigger-card"><div class="trigger-icon">⚡</div><div class="trigger-name">Lessons Learned</div><div class="trigger-desc">Better patterns identified, standards to update, reusable building blocks</div></div>
  <div class="trigger-card"><div class="trigger-icon">🌍</div><div class="trigger-name">Market Developments</div><div class="trigger-desc">Competitive shifts, ecosystem changes, industry disruption</div></div>
</div>
<div class="callout teal"><div class="callout-label">Two categories</div><p><strong>Business-driven:</strong> strategy, regulation, market. <strong>Technology-driven:</strong> infrastructure lifecycle, platform evolution, security vulnerabilities. Both flow through the same Architecture Change Request process.</p></div>`,
voice:`Phase H is triggered by six types of change events. Business Strategy Change — mergers, acquisitions, new markets, strategic pivots. New Regulations — new laws or compliance obligations. Technology Change — disruptive technologies, end-of-life products, platform migrations. Implementation Discoveries from Phase G — gaps, wrong assumptions, unforeseen constraints. Lessons Learned — better patterns, standards updates, or new reusable building blocks. And Market Developments — competitive shifts or industry disruption. TOGAF categorises all triggers as either business-driven or technology-driven. Business-driven includes strategy, regulation, and market changes. Technology-driven includes infrastructure lifecycle, platform evolution, and security vulnerabilities. Both categories flow through the same Architecture Change Request process.`},

{type:"section",bg:"amber",
html:`<div class="section-num">03</div><div class="section-label">Section Three</div><h2 class="section-h">Dispensations &amp; Exceptions</h2><p class="section-desc">Controlled departures from the architecture — formal, temporary, and fully auditable.</p>`,
voice:`Section three: dispensations and exceptions. Not all deviations require a full change cycle — some can be handled through the formal dispensation process.`},

{type:"content",
html:`<div class="content-label">Formal exceptions</div><h2 class="content-h">What a Dispensation Is</h2>
<div class="callout amber"><div class="callout-label">Dispensation</div><p>A <strong>formal, time-limited, Architecture Board-approved permission</strong> to deviate from an architecture requirement. Not a permanent change — an auditable, controlled exception with an expiry.</p></div>
<div class="disp-list">
  <div class="disp-item"><div class="disp-term">Why needed</div><div class="disp-desc">Full conformance may be impractical — cost, technical constraints, timelines. A dispensation allows work to proceed while maintaining governance visibility.</div></div>
  <div class="disp-item"><div class="disp-term">Dispensation vs permanent change</div><div class="disp-desc">Dispensation = temporary, expires. If the exception becomes persistent or widespread, it should become a formal Architecture Change Request instead.</div></div>
  <div class="disp-item"><div class="disp-term">Governance Log record</div><div class="disp-desc">Every dispensation is recorded in the <strong>Governance Log</strong> within the Architecture Repository — who requested it, what was permitted, rationale, expiry date, conditions.</div></div>
  <div class="disp-item"><div class="disp-term">Escalation if refused</div><div class="disp-desc">If a dispensation is refused or inadequate, the non-conformance escalates to a full Architecture Change Request — potentially triggering a new ADM cycle.</div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text">Dispensation = <strong>temporary + formal + board-approved</strong>. Recorded in the <strong>Governance Log</strong>. Persistent patterns → formal Architecture Change Request.</div></div>`,
voice:`A dispensation is a formal, time-limited, Architecture Board-approved permission to deviate from an architecture requirement. It is not a permanent change. When a delivery team can't meet a requirement due to cost, technical constraints, or timing, they request a dispensation. If granted, it allows them to proceed while the deviation is documented and controlled. Every dispensation is recorded in the Governance Log within the Architecture Repository — who requested it, what was permitted, the rationale, the expiry date, and any conditions. If a dispensation pattern becomes persistent or widespread, it should become a formal Architecture Change Request rather than an ongoing exception. And if a dispensation request is refused, the situation escalates to a full Architecture Change Request.`},

{type:"section",bg:"purple",
html:`<div class="section-num">04</div><div class="section-label">Section Four</div><h2 class="section-h">Architecture Change Request Process</h2><p class="section-desc">The formal mechanism for proposing, assessing, and deciding on architecture changes.</p>`,
voice:`Section four: the Architecture Change Request process. This is the formal mechanism Phase H uses to manage all proposed changes.`},

{type:"content",
html:`<div class="content-label">The ACR process</div><h2 class="content-h">From Request to Decision</h2>
<div class="flow-list">
  <div class="flow-box">📥 <strong style="color:var(--white)">Change Request received</strong> — from Phase G, business trigger, or technology trigger</div>
  <div class="flow-arrow">↓</div>
  <div class="flow-box">🔍 <strong style="color:var(--white)">Impact Assessment</strong> — scope, cost, risk, affected BDAT domains</div>
  <div class="flow-arrow">↓</div>
  <div class="flow-box">⚖️ <strong style="color:var(--white)">Architecture Board Review</strong> — assess significance, recommend response</div>
  <div class="flow-arrow">↓</div>
  <div class="flow-box">📋 <strong style="color:var(--white)">Decision</strong> — Maintenance update / Redesign / Dispensation / Rejection</div>
  <div class="flow-arrow">↓</div>
  <div class="flow-box">🔄 <strong style="color:var(--teal)">If Redesign → new Request for Architecture Work → new ADM cycle from Phase A</strong></div>
</div>
<div class="callout purple"><div class="callout-label">Impact assessment direction</div><p><strong>Technology-driven:</strong> trace upward D → C → B. <strong>Business-driven:</strong> trace downward B → C → D. Changes ripple through the entire BDAT stack.</p></div>`,
voice:`The Architecture Change Request process flows through five steps. A Change Request is received — from Phase G, a business trigger, or a technology trigger. An Impact Assessment is performed, determining the scope, cost, risk, and which BDAT domains are affected. The Architecture Board reviews the request and recommends a response. A decision is made: maintenance update, full redesign requiring a new ADM cycle, a dispensation, or rejection. If the decision is redesign, a new Request for Architecture Work is generated, restarting the ADM cycle from Phase A. For impact assessment: technology-driven changes trace upward through the stack from D to C to B, because a technology change ripples up to applications and business processes. Business-driven changes trace downward from B to C to D.`},

{type:"section",bg:"teal",
html:`<div class="section-num">05</div><div class="section-label">Section Five</div><h2 class="section-h">Maintenance vs Redesign &amp; Outputs</h2><p class="section-desc">The critical Phase H decision — and the outputs that close the ADM cycle.</p>`,
voice:`Section five: the maintenance versus redesign decision — the most important call Phase H makes — and the Phase H outputs.`},

{type:"content",
html:`<div class="content-label">The key decision</div><h2 class="content-h">Maintenance vs Redesign</h2>
<div class="compare-grid">
  <div class="compare-box"><div class="compare-head maint">Architecture Maintenance</div><ul class="compare-ul"><li>Incremental, non-breaking changes</li><li>Standards and guidelines updates</li><li>Adding building blocks to existing patterns</li><li>Technology version upgrades</li><li>Clarifications and corrections</li><li>Handled within Phase H — no new ADM cycle</li></ul></div>
  <div class="compare-box"><div class="compare-head redesign">Architecture Redesign</div><ul class="compare-ul"><li>Major business transformation</li><li>Fundamental change to principles</li><li>Disruptive technology requiring rethink</li><li>Significant scope changes</li><li>Invalidates transition architectures</li><li>Triggers new ADM cycle from Phase A</li></ul></div>
</div>
<div class="io-grid">
  <div class="io-box"><div class="io-hd in">Key Inputs</div><ul class="io-ul"><li><strong style="color:var(--blue)">Change Requests (Phase G) ★</strong></li><li>Architecture Repository (Governance Log)</li><li>Architecture Definition Document</li><li>Business &amp; technology change drivers</li></ul></div>
  <div class="io-box"><div class="io-hd out">Key Outputs</div><ul class="io-ul"><li><strong style="color:var(--teal)">Architecture updates (maintenance) ★</strong></li><li><strong style="color:var(--teal)">New Request for Architecture Work ★</strong></li><li>Dispensations (approved exceptions)</li><li>Governance Log updates</li></ul></div>
</div>
<div class="sum-grid">
  <div class="sum-card"><div class="sum-num">H</div><div class="sum-text"><strong>Last phase, loops to A</strong> — generates new Request for Architecture Work when redesign needed.</div></div>
  <div class="sum-card"><div class="sum-num">2</div><div class="sum-text"><strong>Two trigger types</strong> — business-driven (strategy, regulation) and technology-driven (platform, lifecycle).</div></div>
  <div class="sum-card"><div class="sum-num">D</div><div class="sum-text"><strong>Dispensation</strong> — temporary + formal + board-approved. Governance Log records all exceptions.</div></div>
  <div class="sum-card"><div class="sum-num">M/R</div><div class="sum-text"><strong>Maintenance</strong> = minor, handled in H. <strong>Redesign</strong> = significant, triggers new ADM cycle.</div></div>
</div>`,
voice:`Here's the Phase H decision and outputs. Maintenance covers incremental changes: standards updates, building block additions, technology version upgrades, and clarifications. These are handled within Phase H without triggering a new ADM cycle. Redesign covers significant changes: major business transformation, fundamental shifts in architecture principles, disruptive technology requiring a rethink, or scope changes that invalidate existing transition architectures. These trigger a new ADM cycle from Phase A. Primary inputs: Change Requests from Phase G and the Architecture Repository. Primary outputs: architecture updates for maintenance decisions, and a new Request for Architecture Work for redesign decisions. Four key takeaways: Phase H is the last phase that loops back to Phase A. It has two trigger types. Dispensations are temporary and formal. And the maintenance-versus-redesign decision determines whether a new ADM cycle begins.`},

{type:"title",bg:"end",
html:`<div class="title-eyebrow">Day 10 Complete</div><h1 class="title-h" style="font-size:clamp(24px,6vw,40px)">Phase H — done.</h1><div class="title-rule"></div><p class="title-sub" style="margin-bottom:24px">Next up: <strong>Day 11 — ADM Requirements Management</strong>. The continuous phase that runs through the entire ADM — not a numbered phase but a central process.</p>
<div style="display:flex;flex-direction:column;gap:10px;max-width:320px">
  <a href="togaf-day10.html" style="display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--teal3);border:1px solid rgba(45,212,191,.25);border-radius:10px;text-decoration:none;color:var(--teal);font-size:14px;font-weight:500"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h10"/></svg>Reading version · Take the quiz</a>
  <button onclick="markDone()" style="display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--teal);border:none;border-radius:10px;color:var(--navy);font-size:14px;font-weight:600;cursor:pointer;justify-content:center"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2.5 8.5l4 4 7-8"/></svg>Mark Day 10 as done</button>
</div>`,
voice:`Day 10 complete. Phase H is the mechanism that keeps architecture alive — managing changes, processing exceptions, and looping the entire ADM cycle back to Phase A when significant evolution is needed. Take the quiz on the reading version. Day 11 covers ADM Requirements Management — a unique aspect of TOGAF that doesn't correspond to a single lettered phase, but runs continuously through the entire ADM as a central process. See you there.`},
];

let cur=0,play=false,spdIdx=1,utt=null,tx=0,anim=false;
const SPDS=[0.8,1,1.2,1.5];
const wrap=document.getElementById("slides-wrap");
document.getElementById("slide-total").textContent=SLIDES.length;
function getBg(b){return{navy:"var(--navy2)",coral:"linear-gradient(135deg,#1A0A0E,#2A0D15)",amber:"linear-gradient(135deg,#1A1000,#251800)",purple:"linear-gradient(135deg,#120E2A,#1A1235)",teal:"linear-gradient(135deg,#0A1F2F,#0D2A3A)",green:"linear-gradient(135deg,#0A1A10,#0D2218)",end:"linear-gradient(135deg,#080E1A,#0D1526 60%,#152035)"}[b]||"var(--navy2)";}
SLIDES.forEach((s,i)=>{const d=document.createElement("div");d.className="slide slide-"+(s.type||"content");d.id="s"+i;d.style.background=getBg(s.bg);d.innerHTML=`<div class="slide-body">${s.html}</div>`;if(i===0)d.classList.add("active");wrap.appendChild(d);});
function goTo(i,dir){if(anim||i<0||i>=SLIDES.length)return;anim=true;stopSp();const f=document.getElementById("s"+cur),t=document.getElementById("s"+i);f.classList.remove("active");t.classList.add("active");f.classList.add(dir>0?"exit-left":"exit-right");t.classList.add(dir>0?"enter-right":"enter-left");t.querySelector(".slide-body").scrollTop=0;setTimeout(()=>{f.classList.remove("exit-left","exit-right","active");t.classList.remove("enter-right","enter-left");anim=false;cur=i;upUI();if(play)spk();},420);}
function nextSlide(){if(cur<SLIDES.length-1)goTo(cur+1,1);}
function prevSlide(){if(cur>0)goTo(cur-1,-1);}
function upUI(){document.getElementById("slide-num").textContent=cur+1;document.getElementById("progress-fill").style.width=((cur+1)/SLIDES.length*100)+"%";document.getElementById("btn-prev").disabled=cur===0;document.getElementById("btn-next").disabled=cur===SLIDES.length-1;}
function spk(){stopSp();if(!("speechSynthesis"in window))return;const txt=SLIDES[cur].voice;if(!txt){if(play)setTimeout(nextSlide,800);return;}utt=new SpeechSynthesisUtterance(txt);utt.rate=SPDS[spdIdx];utt.lang="en-GB";const vs=speechSynthesis.getVoices();const p=vs.find(v=>v.lang.startsWith("en")&&(v.name.includes("Daniel")||v.name.includes("Samantha")||v.name.includes("Karen")||v.name.includes("Google UK")))||vs.find(v=>v.lang.startsWith("en"))||vs[0];if(p)utt.voice=p;utt.onstart=()=>setSt("speaking");utt.onend=()=>{setSt("");if(play&&cur<SLIDES.length-1)setTimeout(nextSlide,600);else if(cur===SLIDES.length-1){play=false;upPlay();}};utt.onerror=()=>setSt("");speechSynthesis.speak(utt);}
function stopSp(){if("speechSynthesis"in window)speechSynthesis.cancel();utt=null;setSt("");}
function togglePlay(){play=!play;upPlay();if(play)spk();else stopSp();}
function upPlay(){document.getElementById("play-icon").innerHTML=play?'<rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor"/><rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M4 3l11 6-11 6V3z"/>';}
function setSt(s){const el=document.getElementById("voice-status");el.innerHTML=s==="speaking"?`<div class="voice-dots"><div class="voice-dot"></div><div class="voice-dot"></div><div class="voice-dot"></div></div><span>Narrating…</span>`:s||"";}
function cycleSpeed(){spdIdx=(spdIdx+1)%SPDS.length;document.getElementById("speed-btn").textContent=SPDS[spdIdx]+"×";if(play){stopSp();setTimeout(spk,100);}}
function markDone(){try{const d=JSON.parse(localStorage.getItem("togaf_done")||"{}");d[10]=true;localStorage.setItem("togaf_done",JSON.stringify(d));}catch(e){}const b=document.getElementById("btn-done");b.style.background="var(--teal3)";b.style.borderColor="var(--teal)";b.querySelector("svg").style.stroke="var(--teal)";goTo(SLIDES.length-1,1);}
document.getElementById("start-btn").addEventListener("click",()=>{document.getElementById("start-overlay").style.display="none";document.getElementById("deck").style.display="flex";upUI();if("speechSynthesis"in window){const p=new SpeechSynthesisUtterance(" ");p.volume=0;speechSynthesis.speak(p);setTimeout(()=>{play=true;upPlay();spk();},400);}});
wrap.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown")nextSlide();if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevSlide();if(e.key===" "){e.preventDefault();togglePlay();}});
if("speechSynthesis"in window)speechSynthesis.onvoiceschanged=()=>{};
</script>
