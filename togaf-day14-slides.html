<script>
const DAY_NUM = 14;
const SLIDES = [{type:"title",bg:"navy",html:`<div class="title-eyebrow">TOGAF Foundation · Day 14 of 20</div><h1 class="title-h">Enterprise Continuum<br>&amp; Repository</h1><div class="title-rule"></div><p class="title-sub">How TOGAF classifies architecture from the most generic to the most specific — and the Repository that stores it all.</p><div class="title-tags"><span class="title-tag">📊 5 topics</span><span class="title-tag">🎙 Narrated</span><span class="title-tag">⭐ Week 4</span></div>`,voice:`Welcome to Day 14 — Tuesday of Week 4. Today is the Enterprise Continuum and Architecture Repository. The Continuum classifies all architecture from the most generic Foundation models through to your organisation's specific architecture. The Repository stores everything. Together they are the backbone of TOGAF's reuse strategy. We cover the four Continuum levels, the Solutions Continuum, the six Repository components, the three Landscape levels, and deep dives on the Reference Library, Standards Library, and Governance Log. Let's go.`},
{type:"section",bg:"teal",html:`<div class="section-num">01</div><div class="section-label">Section One</div><h2 class="section-h">Architecture Continuum: Foundation to Organisation</h2><p class="section-desc">Four levels from the most generic to the most tailored.</p>`,voice:`Section one: the Architecture Continuum. Four levels from most generic to most specific.`},
{type:"content",bg:"navy",html:`<div class="content-label">Four levels</div><h2 class="content-h">Architecture Continuum</h2>
<div class="def-list">
  <div class="def-item"><div class="def-term" style="color:var(--green)">Foundation Architecture (Most Generic)</div><div class="def-text">TOGAF's TRM and III-RM. Applies to all organisations regardless of industry or size. The starting point.</div></div>
  <div class="def-item"><div class="def-term" style="color:var(--blue)">Common Systems Architecture</div><div class="def-text">Architectures applicable across multiple enterprises — cross-enterprise integration patterns, federated identity frameworks.</div></div>
  <div class="def-item"><div class="def-term" style="color:var(--purple)">Industry Architecture</div><div class="def-text">Architectures specific to a sector — BIAN for banking, HL7 for healthcare, ARTS for retail.</div></div>
  <div class="def-item"><div class="def-term" style="color:var(--teal)">Organisation-Specific Architecture (Most Specific)</div><div class="def-text">Architecture tailored to one enterprise's needs, constraints, and context. Built by extending and customising the levels above.</div></div>
</div>
<div class="callout blue"><div class="callout-label">Direction of development</div><p>Architects work from generic to specific — starting with Foundation, extending toward Organisation-Specific. This prevents reinvention. Always check what already exists before creating new architecture elements.</p></div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>Foundation → Common Systems → Industry → Organisation-Specific.</strong> Foundation is most generic; Org-Specific is most tailored. Architecture Continuum contains ABBs.</div></div>`,voice:`The Architecture Continuum has four levels. Foundation Architecture — the TRM and III-RM — applies to all organisations. This is the most generic level. Common Systems Architecture covers patterns applicable across multiple enterprises, like cross-enterprise integration frameworks. Industry Architecture is sector-specific — BIAN for banking, HL7 for healthcare, ARTS for retail. Organisation-Specific Architecture is the most tailored, built by extending and customising everything above. The direction of development is from generic to specific. Always start with Foundation and work toward your organisation's context — this prevents reinvention. The Architecture Continuum contains ABBs, the architecture descriptions.`},
{type:"section",bg:"blue",html:`<div class="section-num">02</div><div class="section-label">Section Two</div><h2 class="section-h">Solutions Continuum</h2><p class="section-desc">The parallel track of actual implementations — SBBs at every level.</p>`,voice:`Section two: the Solutions Continuum. Parallel to the Architecture Continuum but for implementations.`},
{type:"content",bg:"navy",html:`<div class="content-label">Implementations parallel to descriptions</div><h2 class="content-h">Architecture vs Solutions Continuum</h2>
<div class="two-col-grid">
  <div class="col-card"><div class="col-head" style="color:var(--blue)">Architecture Continuum</div><div class="col-body">Contains <strong>ABBs</strong> — architecture descriptions, patterns, reference models. Answers: what should the architecture look like?</div></div>
  <div class="col-card"><div class="col-head" style="color:var(--green)">Solutions Continuum</div><div class="col-body">Contains <strong>SBBs</strong> — products, deployed systems, implemented solutions. Answers: what exists to implement the architecture?</div></div>
</div>
<div class="bullet-list">
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text">Both run <strong>Foundation → Common → Industry → Org-Specific</strong></div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text">Every position in Solutions Continuum <strong>realises</strong> the equivalent in Architecture Continuum</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text">Foundation Solutions: generic COTS products, open-source tools</div></div>
  <div class="bullet"><div class="bullet-dot"></div><div class="bullet-text">Org-Specific Solutions: your enterprise's deployed systems and custom software</div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>Architecture Continuum = descriptions (ABBs). Solutions Continuum = implementations (SBBs).</strong> Parallel structures, both running from Foundation to Org-Specific.</div></div>`,voice:`The Solutions Continuum is the parallel track to the Architecture Continuum. Where the Architecture Continuum contains ABBs — the descriptions of what architecture should look like — the Solutions Continuum contains SBBs — the actual products and deployed systems that implement the architecture. Both run through the same four levels: Foundation, Common Systems, Industry, and Organisation-Specific. Every position in the Solutions Continuum realises the equivalent position in the Architecture Continuum. Foundation Solutions include generic commercial products and open-source tools. Organisation-Specific Solutions are your enterprise's specific deployed systems and custom software.`},
{type:"section",bg:"purple",html:`<div class="section-num">03</div><div class="section-label">Section Three</div><h2 class="section-h">Architecture Repository — 6 Components</h2><p class="section-desc">The enterprise's single source of truth for all architecture assets.</p>`,voice:`Section three: the Architecture Repository. Six components — each with a distinct purpose.`},
{type:"content",bg:"navy",html:`<div class="content-label">Six components</div><h2 class="content-h">Architecture Repository</h2>
<div class="def-list">
  <div class="def-item"><div class="def-term">1. Architecture Metamodel</div><div class="def-text">The enterprise's customised entity types and relationships used for architecture descriptions.</div></div>
  <div class="def-item"><div class="def-term">2. Architecture Landscape</div><div class="def-text">Representations of current, transition, and target states at Strategic, Segment, and Capability levels.</div></div>
  <div class="def-item"><div class="def-term">3. Reference Library</div><div class="def-text">External guidelines, templates, patterns, and reference architectures for reuse.</div></div>
  <div class="def-item"><div class="def-term">4. Standards Library</div><div class="def-text">Approved technology products, versions, and configurations — constrains Phase D choices.</div></div>
  <div class="def-item"><div class="def-term">5. Governance Log</div><div class="def-text">Audit trail of all architecture governance decisions — compliance outcomes, dispensations, change requests, risk acceptances.</div></div>
  <div class="def-item"><div class="def-term">6. Architecture Requirements Repository</div><div class="def-text">All requirements with full traceability, version history, and status tracking.</div></div>
</div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text">Know all 6 components by name. <strong>Standards Library</strong> constrains Phase D. <strong>Governance Log</strong> = audit trail of all Board decisions. <strong>Reference Library</strong> ≠ Standards Library.</div></div>`,voice:`The Architecture Repository has six components. One: the Architecture Metamodel — the customised entity types used for descriptions. Two: the Architecture Landscape — representations of baseline, transition, and target states at three levels. Three: the Reference Library — external patterns, templates, and reference architectures. Four: the Standards Library — approved technology products and configurations that constrain Phase D choices. Five: the Governance Log — the audit trail of every architecture governance decision, including compliance outcomes, dispensations, change requests, and risk acceptances. Six: the Architecture Requirements Repository — all requirements with traceability and version history. Know all six. The most-tested are the Standards Library and Governance Log.`},
{type:"section",bg:"green",html:`<div class="section-num">04</div><div class="section-label">Section Four</div><h2 class="section-h">Architecture Landscape Levels</h2><p class="section-desc">Strategic, Segment, and Capability — three levels of abstraction for different audiences.</p>`,voice:`Section four: the three Architecture Landscape levels. Different scopes for different audiences.`},
{type:"content",bg:"navy",html:`<div class="content-label">Three abstraction levels</div><h2 class="content-h">Landscape Levels</h2>
<div class="def-list">
  <div class="def-item"><div class="def-term" style="color:var(--blue)">Strategic Architecture (Highest abstraction)</div><div class="def-text">Whole-enterprise view. Audience: C-suite, Board. Scope: 3–5 years. Shows strategic direction without implementation detail.</div></div>
  <div class="def-item"><div class="def-term" style="color:var(--purple)">Segment Architecture (Middle)</div><div class="def-text">Business unit or functional domain view. Audience: segment leaders, programme managers. Scope: 1–3 years. More detail than Strategic but not full implementation spec.</div></div>
  <div class="def-item"><div class="def-term" style="color:var(--teal)">Capability Architecture (Lowest abstraction)</div><div class="def-text">Specific capability or solution view. Audience: solution architects, delivery teams. Scope: 0–18 months. Directly supports implementation projects.</div></div>
</div>
<div class="callout green"><div class="callout-label">Connection to ADM iteration</div><p>Strategic Architecture updates through full Architecture Iteration cycles. Segment Architecture through Capability Iterations scoped to a business unit. Capability Architecture through standard ADM cycles for specific projects.</p></div>
<div class="exam-bar"><div class="exam-star">⭐</div><div class="exam-text"><strong>Strategic</strong> (whole enterprise, 3–5yr) · <strong>Segment</strong> (business unit, 1–3yr) · <strong>Capability</strong> (specific project, 0–18 months). Strategic = highest abstraction.</div></div>`,voice:`The Architecture Landscape has three levels. Strategic Architecture is the whole-enterprise view — for the C-suite and Board, covering a 3 to 5 year horizon. It shows strategic direction without implementation detail. Segment Architecture covers a specific business unit or functional domain — for segment leaders and programme managers, covering 1 to 3 years. Capability Architecture is the most detailed level — for solution architects and delivery teams, covering 0 to 18 months. It directly supports implementation projects. Strategic connects to Architecture Iteration cycles. Segment to Capability Iteration cycles. Capability Architecture to standard ADM cycles for specific projects.`},
{type:"section",bg:"amber",html:`<div class="section-num">05</div><div class="section-label">Section Five</div><h2 class="section-h">Reference Library, Standards Library &amp; Governance Log</h2><p class="section-desc">The three most exam-tested Repository components in depth.</p>`,voice:`Section five: deep dives on the three most exam-tested Repository components.`},
{type:"content",bg:"navy",html:`<div class="content-label">The critical three</div><h2 class="content-h">Three Repository Components</h2>
<div class="callout blue"><div class="callout-label">Reference Library</div><p>Stores reusable guidelines, templates, patterns, and reference architectures from external sources — TOGAF TRM, industry reference architectures, vendor reference architectures. Used to avoid reinvention. Does NOT constrain product choices.</p></div>
<div class="callout teal"><div class="callout-label">Standards Library</div><p>Stores the enterprise's APPROVED technology products, versions, and configurations. When architects select physical technology components in Phase D, they must choose from this library. Non-standard = dispensation required from Architecture Board.</p></div>
<div class="callout amber"><div class="callout-label">Governance Log</div><p>The audit trail of ALL Architecture Board decisions: compliance assessment outcomes (Fully/Conditionally/Non-Conformant), all dispensations with rationale, architecture change request outcomes, risk acceptance records. Full accountability and traceability.</p></div>
<div class="sum-grid">
  <div class="sum-card"><div class="sum-num">REF LIB</div><div class="sum-text">Patterns &amp; external reference architectures. Reuse, not constraint.</div></div>
  <div class="sum-card"><div class="sum-num">STD LIB</div><div class="sum-text">Approved products. Constrains Phase D. Non-standard = dispensation.</div></div>
  <div class="sum-card"><div class="sum-num">GOV LOG</div><div class="sum-text">ALL Board decisions. Compliance, dispensations, change requests, risks.</div></div>
  <div class="sum-card"><div class="sum-num">EXAM TIP</div><div class="sum-text">Reference Library ≠ Standards Library. Know the difference cold.</div></div>
</div>`,voice:`Three Repository components to know cold. The Reference Library stores reusable guidelines, templates, patterns, and external reference architectures — from TOGAF's own TRM to industry frameworks like BIAN and HL7. Its purpose is reuse, not constraint. The Standards Library stores the enterprise's approved technology products, versions, and configurations. Its purpose is constraint — when Phase D architects select technology components, they must choose from this approved list. Non-standard selections require a formal dispensation from the Architecture Board. The Governance Log is the audit trail of every Architecture Board decision — compliance outcomes, dispensations with rationale, change request decisions, and risk acceptances. The most common exam mistake: confusing the Reference Library with the Standards Library. Reference Library equals patterns and external architectures. Standards Library equals approved products that constrain Phase D.`},
{type:"title",bg:"end",html:`<div class="title-eyebrow">Day 14 Complete</div>
<h1 class="title-h" style="font-size:clamp(22px,5vw,36px)">Day 14 — done.</h1>
<div class="title-rule"></div>
<p class="title-sub" style="margin-bottom:24px">Next: Day 15 — Architecture Capability Framework.<br>How to establish the organisational practice that makes EA work.</p>

</div>`,voice:`Day 14 complete. The Enterprise Continuum runs from Foundation through Common Systems and Industry to Organisation-Specific. The Architecture Continuum has ABBs; the Solutions Continuum has SBBs. The Repository has six components — know them all, especially the Standards Library constraining Phase D and the Governance Log as the audit trail. The three Landscape levels are Strategic, Segment, and Capability. Take the Day 14 quiz. Day 15 is the Architecture Capability Framework — how you actually set up and run an architecture function. See you there.`}];

let cur=0,play=false,spdIdx=1,utt=null,tx=0,anim=false;
const SPDS=[0.8,1,1.2,1.5];
const wrap=document.getElementById("slides-wrap");
document.getElementById("slide-total").textContent=SLIDES.length;
function getBg(b){const m={navy:"var(--navy2)",teal:"linear-gradient(135deg,#0A1F2F,#0D2A3A)",blue:"linear-gradient(135deg,#0A1525,#0D1F3A)",purple:"linear-gradient(135deg,#120E2A,#1A1235)",green:"linear-gradient(135deg,#0A1A10,#0D2218)",amber:"linear-gradient(135deg,#1A1000,#251800)",coral:"linear-gradient(135deg,#1A0A0E,#2A0D15)",gold:"linear-gradient(135deg,#1A1200,#251A00)",end:"linear-gradient(135deg,#080E1A,#0D1526 60%,#152035)"};return m[b]||"var(--navy2)";}
SLIDES.forEach((s,i)=>{const d=document.createElement("div");d.className="slide slide-"+(s.type||"content");d.id="s"+i;d.style.background=getBg(s.bg);d.innerHTML=`<div class="slide-body">${s.html}</div>`;if(i===0)d.classList.add("active");wrap.appendChild(d);});
function goTo(i,dir){if(anim||i<0||i>=SLIDES.length)return;anim=true;stopSp();const f=document.getElementById("s"+cur),t=document.getElementById("s"+i);f.classList.remove("active");t.classList.add("active");f.classList.add(dir>0?"exit-left":"exit-right");t.classList.add(dir>0?"enter-right":"enter-left");t.querySelector(".slide-body").scrollTop=0;setTimeout(()=>{f.classList.remove("exit-left","exit-right","active");t.classList.remove("enter-right","enter-left");anim=false;cur=i;upUI();if(play)spk();},420);}
function nextSlide(){if(cur<SLIDES.length-1)goTo(cur+1,1);}
function prevSlide(){if(cur>0)goTo(cur-1,-1);}
function upUI(){document.getElementById("slide-num").textContent=cur+1;document.getElementById("progress-fill").style.width=((cur+1)/SLIDES.length*100)+"%";document.getElementById("btn-prev").disabled=cur===0;document.getElementById("btn-next").disabled=cur===SLIDES.length-1;}
function spk(){stopSp();if(!("speechSynthesis"in window))return;const txt=SLIDES[cur].voice;if(!txt){if(play)setTimeout(nextSlide,800);return;}utt=new SpeechSynthesisUtterance(txt);utt.rate=SPDS[spdIdx];utt.lang="en-GB";const vs=speechSynthesis.getVoices();const p=vs.find(v=>v.lang.startsWith("en")&&(v.name.includes("Daniel")||v.name.includes("Samantha")||v.name.includes("Karen")||v.name.includes("Google UK")))||vs.find(v=>v.lang.startsWith("en"))||vs[0];if(p)utt.voice=p;utt.onstart=()=>setSt("speaking");utt.onend=()=>{setSt("");if(play&&cur<SLIDES.length-1)setTimeout(nextSlide,600);else if(cur===SLIDES.length-1){play=false;upPlay();}};utt.onerror=()=>setSt("");speechSynthesis.speak(utt);}
function stopSp(){if("speechSynthesis"in window)speechSynthesis.cancel();utt=null;setSt("");}
function togglePlay(){play=!play;upPlay();if(play)spk();else stopSp();}
function upPlay(){document.getElementById("play-icon").innerHTML=play?'<rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor"/><rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M4 3l11 6-11 6V3z"/>';}
function setSt(s){const el=document.getElementById("voice-status");el.innerHTML=s==="speaking"?`<div class="voice-dots"><div class="voice-dot"></div><div class="voice-dot"></div><div class="voice-dot"></div></div><span>Narrating…</span>`:s||"";}
function cycleSpeed(){spdIdx=(spdIdx+1)%SPDS.length;document.getElementById("speed-btn").textContent=SPDS[spdIdx]+"×";if(play){stopSp();setTimeout(spk,100);}}
function markDone(){try{const d=JSON.parse(localStorage.getItem("togaf_done")||"{}");d[14]=true;localStorage.setItem("togaf_done",JSON.stringify(d));}catch(e){}const b=document.getElementById("btn-done");b.style.background="var(--teal3)";b.style.borderColor="var(--teal)";b.querySelector("svg").style.stroke="var(--teal)";goTo(SLIDES.length-1,1);}
document.getElementById("start-btn").addEventListener("click",()=>{document.getElementById("start-overlay").style.display="none";document.getElementById("deck").style.display="flex";upUI();if("speechSynthesis"in window){const p=new SpeechSynthesisUtterance(" ");p.volume=0;speechSynthesis.speak(p);setTimeout(()=>{play=true;upPlay();spk();},400);}});
wrap.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown")nextSlide();if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevSlide();if(e.key===" "){e.preventDefault();togglePlay();}});
if("speechSynthesis"in window)speechSynthesis.onvoiceschanged=()=>{};

</script>
