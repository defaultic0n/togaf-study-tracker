#progress-track{height:2px;background:var(--navy4);width:100%;flex-shrink:0}

.cbtn svg{width:16px;height:16px}.cbtn.primary{background:var(--teal);border-color:var(--teal);color:var(--navy);width:44px;height:44px}.cbtn.primary svg{width:18px;height:18px}.cbtn:disabled{opacity:.3;cursor:not-allowed}

<script>
const SLIDES=[
{type:"title",bg:"navy",
html:`<div class="eyebrow">TOGAF Foundation · Day 19 of 20</div><h1 class="title-h">Full Review —<br>All Domains</h1><div class="title-rule"></div><p class="title-sub">A comprehensive exam-focused recap of everything across 5 weeks — ADM phases, Content Framework, Enterprise Continuum, Governance, and the traps that catch most candidates.</p><div class="title-tags"><span class="title-tag">🔥 Full recap</span><span class="title-tag">🎙 Narrated</span><span class="title-tag">⚠️ Exam traps</span></div>`,
voice:`Welcome to Day 19 — Wednesday of Week 5, and your penultimate study session. Today is the full review. Everything you've studied over the past 4 weeks compressed into one focused revision session. We'll recap all 10 ADM phases with their key inputs and outputs, cover the Content Framework's three-level structure, recap the Enterprise Continuum and Repository, summarise Governance and Capability frameworks, and finish with the exam traps that catch most candidates. This is the session to do twice. Let's go.`},

{type:"section",bg:"teal",
html:`<div class="sec-num">01</div><div class="sec-lbl">Section One</div><h2 class="sec-h">ADM Phases — Quick Recap</h2><p class="sec-desc">All 10 phases, their objectives, and their key inputs and outputs — in 2 slides.</p>`,
voice:`Section one: the ADM phases quick recap. Ten phases, each with a clear objective. Let's build a complete mental map.`},

{type:"content",
html:`<div class="clbl">Preliminary + Phases A–D</div><h2 class="ch">ADM: First Half</h2>
<div class="phase-grid">
  <div class="phase-card"><span class="p-badge" style="background:var(--slate3);color:var(--slate)">Prelim</span><div class="p-title">Preliminary</div><div class="p-key">Define framework, principles, governance. Output: Architecture Principles, tailored ADM.</div></div>
  <div class="phase-card"><span class="p-badge" style="background:var(--purple2);color:var(--purple)">A</span><div class="p-title">Architecture Vision</div><div class="p-key">Scope, stakeholders, high-level vision. Key output: Statement of Architecture Work, Architecture Vision.</div></div>
  <div class="phase-card"><span class="p-badge" style="background:var(--blue2);color:var(--blue)">B</span><div class="p-title">Business Architecture</div><div class="p-key">Business capabilities, processes, organisation. Baseline and Target Business Architecture.</div></div>
  <div class="phase-card"><span class="p-badge" style="background:var(--teal3);color:var(--teal)">C</span><div class="p-title">IS Architecture</div><div class="p-key">Data + Application architectures. Data entities, application components, interfaces.</div></div>
  <div class="phase-card"><span class="p-badge" style="background:var(--green2);color:var(--green)">D</span><div class="p-title">Technology Architecture</div><div class="p-key">Technology platform services. Uses TRM taxonomy. Output: Target Technology Architecture.</div></div>
  <div class="phase-card"><span class="p-badge" style="background:var(--amber2);color:var(--amber)">E</span><div class="p-title">Opportunities &amp; Solutions</div><div class="p-key">Work packages, transition architectures, initial roadmap. First roadmap produced here.</div></div>
</div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t">Phase E produces the <strong>first Architecture Roadmap</strong> — not Phase A. Phase A produces the Architecture Vision. Phase C covers BOTH Data and Application architectures.</div></div>`,
voice:`First half of the ADM. Preliminary Phase: define the framework, architecture principles, and governance. Outputs are the Architecture Principles and tailored ADM. Phase A, Architecture Vision: scope the engagement, identify stakeholders, develop the high-level vision. Key outputs are the Statement of Architecture Work and Architecture Vision. Phase B, Business Architecture: define business capabilities, processes, and organisation. Produces Baseline and Target Business Architectures. Phase C, Information Systems Architecture: covers both Data Architecture and Application Architecture. Defines data entities, application components, and interfaces. Phase D, Technology Architecture: design the technology platform using TRM taxonomy. Output is the Target Technology Architecture. Phase E, Opportunities and Solutions: develop work packages, transition architectures, and the initial roadmap. Two exam traps here. First: Phase E produces the first Architecture Roadmap — not Phase A. Phase A produces the Architecture Vision. Second: Phase C covers BOTH Data and Application architectures, not just one.`},

{type:"content",
html:`<div class="clbl">Phases F–H + Requirements Management</div><h2 class="ch">ADM: Second Half</h2>
<div class="phase-grid">
  <div class="phase-card"><span class="p-badge" style="background:var(--coral2);color:var(--coral)">F</span><div class="p-title">Migration Planning</div><div class="p-key">Prioritise projects, finalise roadmap, create Implementation &amp; Migration Plan. Contracts drafted here.</div></div>
  <div class="phase-card"><span class="p-badge" style="background:var(--purple2);color:var(--purple)">G</span><div class="p-title">Implementation Governance</div><div class="p-key">Architectural oversight of delivery. Contracts signed, compliance reviews, dispensations, Governance Log.</div></div>
  <div class="phase-card"><span class="p-badge" style="background:var(--blue2);color:var(--blue)">H</span><div class="p-title">Architecture Change Mgmt</div><div class="p-key">Monitor change drivers, assess impact. Maintenance vs redesign decision. Triggers new ADM cycle.</div></div>
  <div class="phase-card" style="grid-column:1/-1;background:linear-gradient(135deg,var(--navy3),var(--navy4));border-color:rgba(45,212,191,.15)"><span class="p-badge" style="background:var(--teal3);color:var(--teal)">Req. Mgmt</span><div class="p-title">Requirements Management</div><div class="p-key">Continuous phase — runs alongside ALL other phases. Never stops. Feeds requirements in and out.</div></div>
</div>
<div class="box teal"><div class="box-lbl">Statement of Architecture Work (SoAW)</div><p>The SoAW is the formal agreement to proceed with the architecture engagement — produced in <strong>Phase A</strong>. It is not an input to Phase A from outside — it is the <strong>output</strong> of Phase A. Common exam confusion.</p></div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t">Architecture Contracts: <strong>drafted Phase F, signed Phase G</strong>. Requirements Management is the <strong>only continuous phase</strong>. SoAW is a Phase A <strong>output</strong>, not input.</div></div>`,
voice:`Second half of the ADM. Phase F, Migration Planning: prioritise work packages, finalise the roadmap, create the Implementation and Migration Plan. Architecture Contracts are drafted here. Phase G, Implementation Governance: architectural oversight of delivery. Contracts are signed, compliance reviews happen, dispensations are granted or refused, all recorded in the Governance Log. Phase H, Architecture Change Management: monitor change drivers, assess impact. The key decision is maintenance versus redesign — does the change need a full new ADM cycle? Requirements Management: the continuous phase that runs alongside all other phases. Never stops. Three exam traps. Architecture Contracts are drafted in Phase F and signed in Phase G — never confuse the two phases. Requirements Management is the only continuous phase — if asked which phase runs throughout the ADM, the answer is Requirements Management. And the Statement of Architecture Work is a Phase A output, not an input. The SoAW formally authorises the architecture engagement — it's produced IN Phase A.`},

{type:"section",bg:"purple",
html:`<div class="sec-num">02</div><div class="sec-lbl">Section Two</div><h2 class="sec-h">Content Framework: Deliverables, Artefacts, BBs</h2><p class="sec-desc">The three levels of architecture output — and the ABB versus SBB distinction.</p>`,
voice:`Section two: the Content Framework. Three levels of output, two types of building block. The exam tests all of these.`},

{type:"content",
html:`<div class="clbl">Three output levels</div><h2 class="ch">Content Framework Hierarchy</h2>
<div class="def-row"><div class="def-term">Deliverable</div><div class="def-body">A formally reviewed and approved work product, contractually specified — e.g. Architecture Vision, Architecture Definition Document. Delivered to a stakeholder. Has formal sign-off.</div></div>
<div class="def-row"><div class="def-term">Artefact</div><div class="def-body">An architectural work product describing an aspect of the architecture — e.g. a diagram, matrix, or catalogue. Artefacts are components of deliverables. More granular, less formal.</div></div>
<div class="def-row"><div class="def-term">Building Block</div><div class="def-body">A reusable component of business, IT, or architectural capability — packaged to combine with other building blocks. Defined in the Architecture Repository.</div></div>
<div style="height:8px"></div>
<div class="def-row"><div class="def-term" style="color:var(--purple)">ABB</div><div class="def-body"><strong style="color:var(--white2)">Architecture Building Block:</strong> defines required capability with no specific implementation detail. What the architecture needs — e.g. "a security service" or "a message broker."</div></div>
<div class="def-row"><div class="def-term" style="color:var(--amber)">SBB</div><div class="def-body"><strong style="color:var(--white2)">Solution Building Block:</strong> a specific, named implementation of an ABB — e.g. "AWS IAM" or "Apache Kafka." Specifies how the capability will actually be delivered.</div></div>
<div class="box teal"><div class="box-lbl">The relationship</div><p>ABBs define <strong>what</strong> is needed. SBBs define <strong>how</strong> it will be implemented. An ABB can be implemented by multiple different SBBs. In Phase D, you design with ABBs; in Phase E/F, you select the SBBs.</p></div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t"><strong>Deliverable &gt; Artefact &gt; Building Block</strong> in formality. <strong>ABB = what (no implementation detail). SBB = how (specific product/solution).</strong> Deliverables have formal sign-off; artefacts do not.</div></div>`,
voice:`The Content Framework has three output levels. A Deliverable is a formally reviewed and approved work product, contractually specified — the Architecture Vision, Architecture Definition Document. It's delivered to a stakeholder with formal sign-off. An Artefact is an architectural work product describing an aspect of the architecture — a diagram, matrix, or catalogue. Artefacts are components within deliverables. More granular, less formal. A Building Block is a reusable component of business, IT, or architectural capability, packaged to combine with others. Two types of building block. An Architecture Building Block — ABB — defines required capability with no specific implementation detail. It says what the architecture needs. A Solution Building Block — SBB — is a specific, named implementation of an ABB. It says how the capability will actually be delivered. ABBs define what is needed. SBBs define how it will be implemented. An ABB can be fulfilled by multiple different SBBs. In Phase D you design with ABBs; in Phases E and F you select the SBBs. Exam summary: Deliverable has formal sign-off. Artefact does not. ABB equals what. SBB equals how.`},

{type:"section",bg:"amber",
html:`<div class="sec-num">03</div><div class="sec-lbl">Section Three</div><h2 class="sec-h">Enterprise Continuum &amp; Repository Recap</h2><p class="sec-desc">The four-level continuum, the Architecture and Solutions sides, and the Repository structure.</p>`,
voice:`Section three: Enterprise Continuum and Repository. This is a common source of exam questions — the two continua and the Repository components.`},

{type:"content",
html:`<div class="clbl">The full structure</div><h2 class="ch">Enterprise Continuum</h2>
<div class="continuum-row">
  <div class="cont-box" style="background:var(--blue2)"><div class="cont-lbl" style="color:var(--blue)">Foundation</div><div class="cont-sub">TRM, III-RM. Universal — any enterprise, any industry.</div></div>
  <div class="cont-box" style="background:var(--teal3)"><div class="cont-lbl" style="color:var(--teal)">Common Systems</div><div class="cont-sub">Reusable patterns across industries. Security, messaging, integration frameworks.</div></div>
  <div class="cont-box" style="background:var(--purple2)"><div class="cont-lbl" style="color:var(--purple)">Industry</div><div class="cont-sub">Industry-specific models. Banking, healthcare, retail reference architectures.</div></div>
  <div class="cont-box" style="background:var(--amber2)"><div class="cont-lbl" style="color:var(--amber)">Organisation</div><div class="cont-sub">This enterprise's specific architecture. Most specific, least reusable.</div></div>
</div>
<div class="box teal"><div class="box-lbl">Two continua</div><p>The <strong>Architecture Continuum</strong> (left to right: Foundation → Organisation) covers architecture descriptions. The <strong>Solutions Continuum</strong> covers the actual implemented solutions that embody those architectures. Both run left to right — Foundation to Organisation-Specific.</p></div>
<div class="def-row"><div class="def-term" style="color:var(--teal)">Architecture Repository</div><div class="def-body">The system of record for all architecture artefacts, organised into 6 classes: Architecture Metamodel, Architecture Capability, Architecture Landscape, Standards Library, Reference Library, Governance Log.</div></div>
<div class="def-row"><div class="def-term" style="color:var(--blue)">Architecture Landscape</div><div class="def-body">The three-level view of current and future architectures: Strategic (long-term, high-level), Segment (domain or programme-level), Capability (specific capability-level).</div></div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t">The Repository has <strong>6 components</strong>: Metamodel, Capability, Landscape, Standards Library, Reference Library, Governance Log. The <strong>Governance Log</strong> records dispensations, compliance reviews, and accepted risks.</div></div>`,
voice:`The Enterprise Continuum has four levels running from left (most generic) to right (most specific): Foundation, Common Systems, Industry, and Organisation-Specific. Foundation contains the TRM and III-RM — universal, applicable to any enterprise. Common Systems contains reusable patterns across industries. Industry contains industry-specific reference architectures. And Organisation-Specific contains this enterprise's own architectures. There are two continua: the Architecture Continuum for architecture descriptions, and the Solutions Continuum for the actual implemented solutions. Both run from Foundation to Organisation-Specific. The Architecture Repository stores everything — six components. Architecture Metamodel: the formal structure for architecture content. Architecture Capability: the capability to do architecture. Architecture Landscape: the three-level view — Strategic, Segment, and Capability levels. Standards Library: approved technology standards. Reference Library: reference materials and external sources. And the Governance Log: records dispensations, compliance review outcomes, and accepted risks. For the exam: know all six Repository components, and know that the Governance Log is where governance decisions live.`},

{type:"section",bg:"green",
html:`<div class="sec-num">04</div><div class="sec-lbl">Section Four</div><h2 class="sec-h">Governance &amp; Capability Framework Recap</h2><p class="sec-desc">The governance hierarchy, key roles, and Architecture Capability Framework essentials.</p>`,
voice:`Section four: governance and capability framework recap. Pulling together the key governance concepts from Weeks 4 and 5.`},

{type:"content",
html:`<div class="clbl">Governance essentials</div><h2 class="ch">Governance &amp; Capability: Key Facts</h2>
<div class="def-row"><div class="def-term" style="color:var(--blue)">Gov hierarchy</div><div class="def-body">Corporate → Technology → IT → Architecture. Architecture governance is the most specific level.</div></div>
<div class="def-row"><div class="def-term" style="color:var(--purple)">Architecture Board</div><div class="def-body">Cross-functional. Real binding authority — not advisory. Reviews, approves, grants dispensations, maintains Governance Log. Chief Architect usually chairs.</div></div>
<div class="def-row"><div class="def-term" style="color:var(--teal)">Conformance</div><div class="def-body">Does it match the approved architecture? Necessary but not sufficient for compliance.</div></div>
<div class="def-row"><div class="def-term" style="color:var(--green)">Compliance</div><div class="def-body">Does it meet all standards and governance obligations? Requires conformance plus all other requirements.</div></div>
<div class="def-row"><div class="def-term" style="color:var(--amber)">Dispensation</div><div class="def-body">Formal permission to deviate from a conformance requirement. Approved by Architecture Board, recorded in Governance Log.</div></div>
<div class="def-row"><div class="def-term" style="color:var(--coral)">Maturity levels</div><div class="def-body">1=Ad Hoc, 2=Under Development, 3=Defined, 4=Managed, 5=Optimising. Most enterprises target Level 3.</div></div>
<div class="def-row"><div class="def-term" style="color:var(--purple)">Skills framework</div><div class="def-body">5 categories: Generic, Business, IT, Legal/regulatory, Architecture-specific.</div></div>
<div class="exam"><div class="exam-s">⭐</div><div class="exam-t"><strong>Conformance ≠ Compliance.</strong> A dispensation permits non-conformance — it doesn't change the architecture. <strong>Architecture Board has real authority</strong> — decisions are binding, not advisory.</div></div>`,
voice:`Governance and capability framework key facts. The governance hierarchy: Corporate, Technology, IT, Architecture — from broadest to most specific. The Architecture Board: cross-functional, real binding authority, not advisory. It reviews and approves, grants dispensations, and maintains the Governance Log. Chief Architect usually chairs. Conformance: does it match the approved architecture? Necessary but not sufficient for compliance. Compliance: does it meet all standards and governance obligations? Requires conformance plus all other requirements. Dispensation: formal permission to deviate from a conformance requirement — approved by the Board, recorded in the Governance Log. Maturity levels one through five: ad hoc, under development, defined, managed, optimising. Most enterprises target level three as a realistic operational goal. Skills framework: five categories — Generic, Business, IT, Legal and regulatory, Architecture-specific. Exam traps: conformance does not equal compliance. A dispensation permits non-conformance without changing the architecture. And the Architecture Board has real, binding authority — not advisory.`},

{type:"section",bg:"coral",
html:`<div class="sec-num">05</div><div class="sec-lbl">Section Five</div><h2 class="sec-h">Common Exam Traps &amp; Tricky Distinctions</h2><p class="sec-desc">The mistakes that fail most TOGAF Foundation candidates — pre-empted and corrected.</p>`,
voice:`Section five: common exam traps. These are the distinctions that catch most candidates. Go through each one carefully.`},

{type:"content",
html:`<div class="clbl">Don't fall for these</div><h2 class="ch">The Traps — Corrected</h2>
<div class="trap-row"><div class="trap-x">⚠</div><div class="trap-text"><span class="trap-wrong">WRONG: Phase A produces the Architecture Roadmap</span><br><span class="trap-right">RIGHT: Phase A produces the Architecture Vision and SoAW. Phase E produces the first Architecture Roadmap.</span></div></div>
<div class="trap-row"><div class="trap-x">⚠</div><div class="trap-text"><span class="trap-wrong">WRONG: SoAW is an input to Phase A</span><br><span class="trap-right">RIGHT: SoAW is an OUTPUT of Phase A — it formally authorises the architecture engagement.</span></div></div>
<div class="trap-row"><div class="trap-x">⚠</div><div class="trap-text"><span class="trap-wrong">WRONG: Architecture Contracts are signed in Phase F</span><br><span class="trap-right">RIGHT: Contracts are DRAFTED in Phase F and SIGNED/FINALISED in Phase G.</span></div></div>
<div class="trap-row"><div class="trap-x">⚠</div><div class="trap-text"><span class="trap-wrong">WRONG: Security is addressed only in Phase D</span><br><span class="trap-right">RIGHT: Security is a cross-cutting concern addressed in every phase from A through H.</span></div></div>
<div class="trap-row"><div class="trap-x">⚠</div><div class="trap-text"><span class="trap-wrong">WRONG: A Viewpoint is what you show to a stakeholder</span><br><span class="trap-right">RIGHT: A View is shown to stakeholders. A Viewpoint is the reusable template used to create Views.</span></div></div>
<div class="trap-row"><div class="trap-x">⚠</div><div class="trap-text"><span class="trap-wrong">WRONG: Conformance = Compliance</span><br><span class="trap-right">RIGHT: Conformance is necessary but not sufficient for compliance. Non-conforming work cannot be compliant.</span></div></div>
<div class="trap-row"><div class="trap-x">⚠</div><div class="trap-text"><span class="trap-wrong">WRONG: ABBs and SBBs are the same thing</span><br><span class="trap-right">RIGHT: ABB = what is needed (no implementation). SBB = how it's implemented (specific product).</span></div></div>`,
voice:`The seven most common exam traps. Trap one: Phase A produces the Architecture Roadmap. Wrong. Phase A produces the Architecture Vision and Statement of Architecture Work. Phase E produces the first Architecture Roadmap. Trap two: the Statement of Architecture Work is an input to Phase A. Wrong. It's an output — produced in Phase A to formally authorise the engagement. Trap three: Architecture Contracts are signed in Phase F. Wrong. Contracts are drafted in Phase F and signed or finalised in Phase G. Trap four: security is addressed only in Phase D. Wrong. Security is a cross-cutting concern addressed in every phase from A through H. Trap five: a Viewpoint is what you show to a stakeholder. Wrong. A View is what you show. A Viewpoint is the reusable template used to create Views. Trap six: conformance equals compliance. Wrong. Conformance is necessary but not sufficient. Non-conforming work cannot be compliant. Trap seven: ABBs and SBBs are the same thing. Wrong. ABB defines what is needed with no implementation detail. SBB is a specific named implementation.`},

html:`<div class="eyebrow">Day 19 Complete</div><h1 class="title-h" style="font-size:clamp(22px,5.5vw,38px)">Full Review — done.</h1><div class="title-rule"></div><p class="title-sub" style="margin-bottom:24px">One session left: <strong>Day 20 — Mock Exam &amp; Exam Strategy</strong>. 40 questions in 60 minutes. You know this. Let's prove it.</p>

</div>`,
voice:`Day 19 complete. That's the full review done — 20 days of content in 19 sessions. The reading quiz for Day 19 will test all the tricky distinctions. Take it. Day 20 is the final session: Mock Exam and Exam Strategy. 40 questions, 60 minutes, 55% to pass. You know this framework. Tomorrow we prove it.`},

const BG={navy:"var(--navy2)",teal:"linear-gradient(135deg,#0A1F2F,#0D2A3A)",purple:"linear-gradient(135deg,#120E2A,#1A1235)",amber:"linear-gradient(135deg,#1A1000,#251800)",green:"linear-gradient(135deg,#0A1A10,#0D2218)",coral:"linear-gradient(135deg,#1A0A0E,#2A0D15)",end:"linear-gradient(135deg,#080E1A,#0D1526 60%,#152035)"};
let cur=0,play=false,spdIdx=1,utt=null,tx=0,anim=false;
const SPDS=[0.8,1,1.2,1.5];
const wrap=document.getElementById("slides-wrap");
document.getElementById("stotal").textContent=SLIDES.length;
SLIDES.forEach((s,i)=>{const d=document.createElement("div");d.className="slide slide-"+(s.type||"content");d.id="sl"+i;d.style.background=BG[s.bg]||BG.navy;d.innerHTML=`<div class="slide-body">${s.html}</div>`;if(i===0)d.classList.add("active");wrap.appendChild(d);});
function goTo(i,dir){if(anim||i<0||i>=SLIDES.length)return;anim=true;stopSp();const f=document.getElementById("sl"+cur),t=document.getElementById("sl"+i);f.classList.remove("active");t.classList.add("active");f.classList.add(dir>0?"exit-left":"exit-right");t.classList.add(dir>0?"enter-right":"enter-left");t.querySelector(".slide-body").scrollTop=0;setTimeout(()=>{f.classList.remove("exit-left","exit-right","active");t.classList.remove("enter-right","enter-left");anim=false;cur=i;upUI();if(play)spk();},420);}
function nextSlide(){if(cur<SLIDES.length-1)goTo(cur+1,1);}function prevSlide(){if(cur>0)goTo(cur-1,-1);}
function upUI(){document.getElementById("snum").textContent=cur+1;document.getElementById("progress-fill").style.width=((cur+1)/SLIDES.length*100)+"%";document.getElementById("btn-prev").disabled=cur===0;document.getElementById("btn-next").disabled=cur===SLIDES.length-1;}
function spk(){stopSp();if(!("speechSynthesis"in window))return;const txt=SLIDES[cur].voice;if(!txt){if(play)setTimeout(nextSlide,800);return;}utt=new SpeechSynthesisUtterance(txt);utt.rate=SPDS[spdIdx];utt.lang="en-GB";const vs=speechSynthesis.getVoices();const p=vs.find(v=>v.lang.startsWith("en")&&(v.name.includes("Daniel")||v.name.includes("Samantha")||v.name.includes("Google UK")))||vs.find(v=>v.lang.startsWith("en"))||vs[0];if(p)utt.voice=p;utt.onstart=()=>setSt("speaking");utt.onend=()=>{setSt("");if(play&&cur<SLIDES.length-1)setTimeout(nextSlide,600);else{play=false;upPlay();}};utt.onerror=()=>setSt("");speechSynthesis.speak(utt);}
function stopSp(){if("speechSynthesis"in window)speechSynthesis.cancel();utt=null;setSt("");}
function togglePlay(){play=!play;upPlay();if(play)spk();else stopSp();}
function upPlay(){document.getElementById("play-icon").innerHTML=play?'<rect x="3" y="2" width="4" height="14" rx="1" fill="currentColor"/><rect x="11" y="2" width="4" height="14" rx="1" fill="currentColor"/>':'<path d="M4 3l11 6-11 6V3z"/>';}
function setSt(s){const el=document.getElementById("vs");el.innerHTML=s==="speaking"?`<div class="vd"><div class="vdot"></div><div class="vdot"></div><div class="vdot"></div></div><span>Narrating…</span>`:(s||"");}
function cycleSpeed(){spdIdx=(spdIdx+1)%SPDS.length;document.getElementById("spdbtn").textContent=SPDS[spdIdx]+"×";if(play){stopSp();setTimeout(spk,100);}}
function markDone(){try{const d=JSON.parse(localStorage.getItem("togaf_done")||"{}");d[19]=true;localStorage.setItem("togaf_done",JSON.stringify(d));}catch(e){}const b=document.getElementById("btn-done");b.style.background="var(--teal3)";b.style.borderColor="var(--teal)";b.querySelector("svg").style.stroke="var(--teal)";goTo(SLIDES.length-1,1);}
document.getElementById("start-btn").addEventListener("click",()=>{document.getElementById("start-overlay").style.display="none";document.getElementById("deck").style.display="flex";upUI();if("speechSynthesis"in window){const p=new SpeechSynthesisUtterance(" ");p.volume=0;speechSynthesis.speak(p);setTimeout(()=>{play=true;upPlay();spk();},400);}});
wrap.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;},{passive:true});
wrap.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?nextSlide():prevSlide();}},{passive:true});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown")nextSlide();if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevSlide();if(e.key===" "){e.preventDefault();togglePlay();}});
</script>
